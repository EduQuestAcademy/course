<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>English Grammar Mastery</title>
<style>

  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap');

  :root{
    --bg:#eef2ff; --surface:#fff; --surface2:#f5f3ff;
    --border:#ddd6fe; --border-md:#c4b5fd;
    --tx:#1e1b4b; --tx-md:#374151; --tx-sm:#6b7280; --tx-xs:#9ca3af;
    --accent:#5b21b6; --accent-mid:#7c3aed; --accent-lt:#ede9fe;
    --ok:#059669; --gold:#b45309;
    --r-sm:8px; --r-md:12px; --r-lg:16px; --r-xl:20px; --r-full:999px;
    --sh-xs:0 1px 2px rgba(0,0,0,0.05);
    --sh-sm:0 1px 4px rgba(0,0,0,0.07),0 1px 2px rgba(0,0,0,0.04);
    --sh-md:0 4px 16px rgba(0,0,0,0.08),0 2px 4px rgba(0,0,0,0.04);
    --sh-lg:0 8px 32px rgba(0,0,0,0.10),0 2px 8px rgba(0,0,0,0.06);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{
    font-family:'Inter',system-ui,sans-serif;
    background:var(--bg); color:var(--tx); min-height:100vh;
    font-size:15px; line-height:1.5;
    -webkit-font-smoothing:antialiased;
  }

  /* ── RESPONSIVE WRAPPER ── */
  .page{max-width:480px;margin:0 auto;padding-bottom:90px;min-height:100vh;}

  @media(min-width:640px){
    body{font-size:15.5px;}
    .page{max-width:700px;}
  }
  @media(min-width:1024px){
    body{
      font-size:15px;
      background:linear-gradient(135deg,#eef2ff 0%,#f5f3ff 50%,#ede9fe 100%);
      background-attachment:fixed;
    }
    .page{
      max-width:1100px;
      display:grid;
      grid-template-columns:320px 1fr;
      grid-template-rows:auto 1fr;
      gap:0;
      padding:32px;
      padding-bottom:32px;
      align-items:start;
    }
    .page-header{
      grid-column:1/-1;
      border-radius:var(--r-xl) var(--r-xl) 0 0;
      margin-bottom:0;
    }
    .left-col{
      border-right:1px solid var(--border);
      border-radius:0 0 0 var(--r-xl);
      overflow:hidden;
      position:sticky; top:32px;
      background:var(--surface);
      box-shadow:var(--sh-lg);
    }
    .right-col{
      background:var(--surface);
      border-radius:0 0 var(--r-xl) 0;
      overflow:hidden;
      box-shadow:var(--sh-lg);
      padding-bottom:32px;
    }
  }

  /* ── HEADER ── */
  .page-header{
    padding:18px 18px 14px;
    background:var(--surface);
    border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50;
    box-shadow:0 2px 10px rgba(99,102,241,0.08);
  }
  @media(min-width:1024px){
    .page-header{position:relative;box-shadow:none;border-bottom:1px solid var(--border);}
  }
  .hdr-top{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
  .logo{display:flex;align-items:center;gap:11px;}
  .logo-icon{
    width:42px;height:42px;flex-shrink:0;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    border-radius:var(--r-md);display:flex;align-items:center;justify-content:center;
    font-size:20px;box-shadow:0 3px 10px rgba(79,70,229,0.3);
  }
  .logo-name{font-size:0.93em;font-weight:800;color:var(--tx);line-height:1.2;}
  .logo-sub{font-size:0.62em;color:var(--tx-sm);margin-top:1px;display:block;}
  .streak-pill{
    display:flex;align-items:center;gap:5px;
    background:#fffbeb;border:1.5px solid #fbbf24;
    border-radius:var(--r-full);padding:5px 12px;
    font-size:0.82em;font-weight:700;color:#92400e;white-space:nowrap;
  }
  .prog-row{display:flex;justify-content:space-between;margin-bottom:6px;}
  .prog-row span{font-size:0.72em;font-weight:600;color:var(--tx-sm);}
  .prog-row strong{font-size:0.72em;font-weight:700;color:#4f46e5;font-family:'JetBrains Mono',monospace;}
  .prog-track{height:7px;background:var(--border);border-radius:var(--r-full);overflow:hidden;}
  .prog-fill{height:100%;background:linear-gradient(90deg,#4f46e5,#7c3aed,#06b6d4);border-radius:var(--r-full);transition:width .9s cubic-bezier(.4,0,.2,1);}

  /* ── LEFT COL CONTENT ── */
  .left-col{background:var(--surface);}

  /* Stats */
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;padding:14px 16px 4px;}
  @media(min-width:1024px){.stats-row{padding:18px 20px 8px;}}
  .stat-card{border-radius:var(--r-lg);padding:13px 8px;text-align:center;border:none;box-shadow:var(--sh-md);}
  .stat-card.s1{background:linear-gradient(135deg,#4f46e5,#6366f1);}
  .stat-card.s2{background:linear-gradient(135deg,#059669,#10b981);}
  .stat-card.s3{background:linear-gradient(135deg,#d97706,#f59e0b);}
  .stat-num{font-size:1.5em;font-weight:800;font-family:'JetBrains Mono',monospace;color:#fff;}
  .stat-lbl{font-size:0.6em;color:rgba(255,255,255,0.82);margin-top:2px;font-weight:600;}

  .sec-label{font-size:0.63em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;color:#6366f1;padding:16px 16px 8px;}
  @media(min-width:1024px){.sec-label{padding:18px 20px 8px;}}

  /* Badges */
  .badges-strip{display:flex;gap:8px;padding:0 16px 4px;overflow-x:auto;scrollbar-width:none;}
  .badges-strip::-webkit-scrollbar{display:none;}
  @media(min-width:1024px){
    .badges-strip{padding:0 20px 8px;flex-wrap:wrap;overflow-x:visible;}
  }
  .badge{
    flex-shrink:0;display:flex;flex-direction:column;align-items:center;
    gap:4px;padding:9px 12px;min-width:64px;
    background:var(--surface);border:1.5px solid var(--border);
    border-radius:var(--r-md);box-shadow:var(--sh-xs);
  }
  .badge-icon{font-size:1.25em;filter:grayscale(1) opacity(.28);}
  .badge-name{font-size:0.58em;color:var(--tx-xs);white-space:nowrap;font-weight:600;}
  .badge.earned.b0{background:#ede9fe;border-color:#a78bfa;}
  .badge.earned.b0 .badge-name{color:#5b21b6;}
  .badge.earned.b1{background:#fef3c7;border-color:#fbbf24;}
  .badge.earned.b1 .badge-name{color:#92400e;}
  .badge.earned.b2{background:#dbeafe;border-color:#60a5fa;}
  .badge.earned.b2 .badge-name{color:#1e40af;}
  .badge.earned.b3{background:#dcfce7;border-color:#4ade80;}
  .badge.earned.b3 .badge-name{color:#065f46;}
  .badge.earned.b4{background:#fee2e2;border-color:#f87171;}
  .badge.earned.b4 .badge-name{color:#7f1d1d;}
  .badge.earned.b5{background:#fce7f3;border-color:#f472b6;}
  .badge.earned.b5 .badge-name{color:#831843;}
  .badge.earned.b6{background:#ecfccb;border-color:#86efac;}
  .badge.earned.b6 .badge-name{color:#3f6212;}
  .badge.earned.b7{background:#cffafe;border-color:#67e8f9;}
  .badge.earned.b7 .badge-name{color:#0e7490;}
  .badge.earned.b8{background:#ffedd5;border-color:#fb923c;}
  .badge.earned.b8 .badge-name{color:#7c2d12;}
  .badge.earned.b9{background:#f0fdf4;border-color:#4ade80;}
  .badge.earned.b9 .badge-name{color:#14532d;}
  .badge.earned .badge-icon{filter:none;}

  /* ── RIGHT COL / MODULE CARDS ── */
  .right-col{background:var(--surface);}
  .modules-grid{display:flex;flex-direction:column;gap:9px;padding:6px 16px;}
  @media(min-width:640px){.modules-grid{gap:10px;}}
  @media(min-width:1024px){.modules-grid{padding:8px 20px 8px;}}

  .module-card{
    display:block;border-radius:var(--r-lg);text-decoration:none;color:#fff;
    overflow:hidden;position:relative;box-shadow:var(--sh-md);border:none;
    transition:transform .18s,box-shadow .18s;
  }
  .module-card:hover{transform:translateY(-2px);box-shadow:var(--sh-lg);}
  .module-card:active{transform:scale(.978);}
  .module-card::before{
    content:'';position:absolute;top:0;left:0;right:0;height:50%;
    background:linear-gradient(180deg,rgba(255,255,255,0.12) 0%,transparent 100%);
    pointer-events:none;z-index:0;
  }
  .mc-inner{padding:13px 15px;position:relative;z-index:1;}
  .mc-top{display:flex;align-items:center;gap:12px;}
  .mc-icon{width:42px;height:42px;flex-shrink:0;border-radius:10px;background:rgba(255,255,255,0.2);display:flex;align-items:center;justify-content:center;font-size:1.2em;}
  .mc-info{flex:1;min-width:0;}
  .mc-num{font-size:0.6em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;color:rgba(255,255,255,0.72);margin-bottom:2px;}
  .mc-title{font-size:0.9em;font-weight:800;color:#fff;line-height:1.25;}
  .mc-meta{font-size:0.63em;color:rgba(255,255,255,0.68);margin-top:2px;font-weight:500;}
  .ring-wrap{position:relative;width:40px;height:40px;flex-shrink:0;}
  .ring-wrap svg{transform:rotate(-90deg);}
  .ring-pct{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;font-size:0.54em;font-weight:700;font-family:'JetBrains Mono',monospace;color:#fff;}
  .mc-bar{margin-top:10px;height:3px;background:rgba(255,255,255,0.22);border-radius:var(--r-full);overflow:hidden;}
  .mc-bar-fill{height:100%;background:rgba(255,255,255,0.78);border-radius:var(--r-full);transition:width .9s cubic-bezier(.4,0,.2,1);}
  .mc-bottom{display:flex;justify-content:space-between;align-items:center;margin-top:7px;}
  .dots{display:flex;gap:3px;flex-wrap:wrap;}
  .dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,0.25);}
  .dot.done{background:rgba(255,255,255,0.82);}
  .mc-status{font-size:0.6em;color:rgba(255,255,255,0.72);font-family:'JetBrains Mono',monospace;font-weight:600;}
  .mc-status.complete{color:#fff;}

  /* ── BOTTOM NAV ── */
  .bottom-nav{
    position:fixed;bottom:0;left:50%;transform:translateX(-50%);
    width:100%;max-width:480px;
    background:var(--surface);border-top:1px solid var(--border);
    box-shadow:0 -2px 12px rgba(99,102,241,0.1);
    display:flex;justify-content:space-around;
    padding:10px 0 max(10px,env(safe-area-inset-bottom));z-index:100;
  }
  @media(min-width:1024px){.bottom-nav{display:none;}}
  .nav-btn{display:flex;flex-direction:column;align-items:center;gap:2px;padding:4px 20px;background:none;border:none;cursor:pointer;color:var(--tx-xs);font-family:'Inter',sans-serif;transition:color .2s;}
  .nav-btn.active{color:#4f46e5;}
  .nav-btn span{font-size:0.58em;font-weight:600;}
  .nav-icon{font-size:1.2em;}

  .toast{position:fixed;bottom:90px;left:50%;transform:translateX(-50%) translateY(10px);background:var(--tx);border-radius:var(--r-full);padding:10px 20px;font-size:0.82em;color:#fff;opacity:0;transition:all .3s;pointer-events:none;z-index:200;white-space:nowrap;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  .module-card{animation:fadeUp .35s ease both;}
  .module-card:nth-child(1){animation-delay:.03s}.module-card:nth-child(2){animation-delay:.06s}
  .module-card:nth-child(3){animation-delay:.09s}.module-card:nth-child(4){animation-delay:.12s}
  .module-card:nth-child(5){animation-delay:.15s}.module-card:nth-child(6){animation-delay:.18s}
  .module-card:nth-child(7){animation-delay:.21s}.module-card:nth-child(8){animation-delay:.24s}
  .module-card:nth-child(9){animation-delay:.27s}.module-card:nth-child(10){animation-delay:.30s}
  .module-card:nth-child(11){animation-delay:.33s}.module-card:nth-child(12){animation-delay:.36s}

</style>
</head>
<body>
<div class="page">

  <!-- Header spans full width on desktop -->
  <div class="page-header">
    <div class="hdr-top">
      <div class="logo">
        <div class="logo-icon">📖</div>
        <div>
          <div class="logo-name">English Grammar Mastery</div>
          <span class="logo-sub">Quizzes · From Foundations to Fluency</span>
        </div>
      </div>
      <div class="streak-pill">🔥 Day <span id="streakCount">1</span></div>
    </div>
    <div>
      <div class="prog-row">
        <span>Overall Progress</span>
        <strong id="overallPct">0%</strong>
      </div>
      <div class="prog-track"><div class="prog-fill" id="overallBar" style="width:0%"></div></div>
    </div>
  </div>

  <!-- LEFT COL: stats + badges -->
  <div class="left-col">
    <div class="stats-row">
      <div class="stat-card s1"><div class="stat-num" id="statQuizzes">0</div><div class="stat-lbl">Quizzes Done</div></div>
      <div class="stat-card s2"><div class="stat-num" id="statBest">—</div><div class="stat-lbl">Best Score</div></div>
      <div class="stat-card s3"><div class="stat-num" id="statBadges">0</div><div class="stat-lbl">Badges</div></div>
    </div>
    <div class="sec-label">Achievements</div>
    <div class="badges-strip" id="badgesStrip"></div>
  </div>

  <!-- RIGHT COL: modules -->
  <div class="right-col">
    <div class="sec-label">Modules</div>
    <div class="modules-grid" id="modulesGrid"></div>
  </div>

</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <span class="nav-icon">🏠</span><span>Home</span>
  </button>
  <button class="nav-btn" onclick="document.getElementById('badgesStrip').scrollIntoView({behavior:'smooth'})">
    <span class="nav-icon">🏆</span><span>Badges</span>
  </button>
  <button class="nav-btn" onclick="document.querySelector('.stats-row').scrollIntoView({behavior:'smooth'})">
    <span class="nav-icon">📊</span><span>Stats</span>
  </button>
  <button class="nav-btn" id="muteBtn" onclick="toggleMute()">
    <span class="nav-icon" id="muteIcon">🔊</span><span>Sound</span>
  </button>
</div>
<div class="toast" id="toast"></div>

<script>
const MODULES=[
  {id:1,title:'The Parts of Speech System',icon:'🔤',bg:'#5b21b6',lessons:8},
  {id:2,title:'The Sentence',icon:'📝',bg:'#1d4ed8',lessons:10},
  {id:3,title:'Articles and Determiners',icon:'🔍',bg:'#b45309',lessons:10},
  {id:4,title:'The Tense System',icon:'⏱️',bg:'#065f46',lessons:15},
  {id:5,title:'Modal Verbs',icon:'💬',bg:'#9d174d',lessons:10},
  {id:6,title:'Active and Passive Voice',icon:'🔄',bg:'#0e7490',lessons:7},
  {id:7,title:'Reported Speech',icon:'🗣️',bg:'#c2410c',lessons:8},
  {id:8,title:'Sentence Structures & Clauses',icon:'🧩',bg:'#4d7c0f',lessons:9},
  {id:9,title:'Conditionals & Hypotheticals',icon:'🤔',bg:'#1e40af',lessons:8},
  {id:10,title:'Transformation and Synthesis',icon:'⚡',bg:'#6b21a8',lessons:7},
  {id:11,title:'Integrated Grammar Mastery',icon:'🎯',bg:'#0f766e',lessons:6},
  {id:12,title:'British and American English',icon:'🌍',bg:'#b91c1c',lessons:5},
];
const BADGES=[
  {id:'first_quiz',icon:'⭐',name:'First Step'},
  {id:'perfect_score',icon:'💯',name:'Perfect!'},
  {id:'mod1_complete',icon:'🔤',name:'Word Master'},
  {id:'mod4_complete',icon:'⏰',name:'Tense Titan'},
  {id:'streak_7',icon:'🔥',name:'On Fire!'},
  {id:'streak_30',icon:'🌟',name:'Dedicated'},
  {id:'half_course',icon:'🎖️',name:'Halfway'},
  {id:'all_complete',icon:'🏆',name:'Grammar Hero'},
  {id:'speed_demon',icon:'⚡',name:'Speed Run'},
  {id:'comeback',icon:'💪',name:'Comeback'},
];
function getData(){try{return JSON.parse(localStorage.getItem('grammar_app')||'{}');}catch(e){return{};}}
function saveData(d){try{localStorage.setItem('grammar_app',JSON.stringify(d));}catch(e){}}
function getStreak(d){if(!d.lastStudy)return 1;const t=new Date().toDateString(),y=new Date(Date.now()-86400000).toDateString();return(d.lastStudy===t||d.lastStudy===y)?(d.streak||1):1;}
function render(){
  const d=getData(),p=d.progress||{},e=d.badges||[];
  document.getElementById('streakCount').textContent=getStreak(d);
  let total=0,done=0,best=0,tdone=0;
  MODULES.forEach(m=>{const q=m.lessons+1;total+=q;for(let l=1;l<=q;l++){const v=p[`m${m.id}_l${l}`];if(v!==undefined){done++;tdone++;if(v>best)best=v;}}});
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('overallPct').textContent=pct+'%';
  document.getElementById('overallBar').style.width=pct+'%';
  document.getElementById('statQuizzes').textContent=tdone;
  document.getElementById('statBest').textContent=tdone?best+'%':'—';
  document.getElementById('statBadges').textContent=e.length;
  document.getElementById('badgesStrip').innerHTML=BADGES.map((b,i)=>
    `<div class="badge ${e.includes(b.id)?`earned b${i}`:''}">`+
    `<div class="badge-icon">${b.icon}</div>`+
    `<div class="badge-name">${b.name}</div></div>`).join('');
  document.getElementById('modulesGrid').innerHTML=MODULES.map(m=>{
    let dl=0;const q=m.lessons+1;
    for(let l=1;l<=q;l++) if(p[`m${m.id}_l${l}`]!==undefined) dl++;
    const mp=Math.round(dl/q*100),hp=dl>0,ic=dl===q;
    const r=15,circ=2*Math.PI*r,dash=circ-(mp/100)*circ;
    const dots=Array.from({length:m.lessons},(_,i)=>
      `<div class="dot ${p[`m${m.id}_l${i+1}`]!==undefined?'done':''}"></div>`).join('');
    return `<a class="module-card" href="modules/module${m.id}.html" style="background:${m.bg}">
      <div class="mc-inner">
        <div class="mc-top">
          <div class="mc-icon">${m.icon}</div>
          <div class="mc-info">
            <div class="mc-num">Module ${m.id}</div>
            <div class="mc-title">${m.title}</div>
            <div class="mc-meta">${m.lessons} lessons + module quiz · ${(m.lessons+1)*20} questions</div>
          </div>
          <div class="ring-wrap">
            <svg width="40" height="40" viewBox="0 0 40 40">
              <circle cx="20" cy="20" r="${r}" fill="none" stroke="rgba(255,255,255,0.22)" stroke-width="3"/>
              <circle cx="20" cy="20" r="${r}" fill="none" stroke="rgba(255,255,255,0.85)"
                stroke-width="3" stroke-linecap="round"
                stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${dash.toFixed(1)}"/>
            </svg>
            <div class="ring-pct">${hp?(ic?'✓':mp+'%'):''}</div>
          </div>
        </div>
        <div class="mc-bar"><div class="mc-bar-fill" style="width:${mp}%"></div></div>
        <div class="mc-bottom">
          <div class="dots">${dots}</div>
          <div class="mc-status ${ic?'complete':''}">${ic?'✓ Complete':hp?`${dl}/${q} done`:`${q} quizzes`}</div>
        </div>
      </div></a>`;
  }).join('');
}
function toggleMute(){
  const d=getData();d.muted=!d.muted;saveData(d);
  document.getElementById('muteIcon').textContent=d.muted?'🔇':'🔊';
  document.getElementById('muteBtn').classList.toggle('active',!d.muted);
  showToast(d.muted?'Sound off':'Sound on');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}
(function(){const d=getData(),today=new Date().toDateString(),yest=new Date(Date.now()-86400000).toDateString();if(d.lastStudy!==today){d.streak=(d.lastStudy===yest)?(d.streak||0)+1:1;d.lastStudy=today;saveData(d);}})();
const d0=getData();document.getElementById('muteIcon').textContent=d0.muted?'🔇':'🔊';
if(!d0.muted)document.getElementById('muteBtn').classList.add('active');
render();
</script>
</body>
</html>
