<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Grammar Mastery — From Foundations to Fluency</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #13131a;
    --surface2: #1c1c26;
    --border: rgba(255,255,255,0.06);
    --text: #f0f0f8;
    --text-dim: #7a7a9a;
    --text-faint: #3a3a55;
    --m1: #6366f1; --m1-bg: rgba(99,102,241,0.12);
    --m2: #14b8a6; --m2-bg: rgba(20,184,166,0.12);
    --m3: #f59e0b; --m3-bg: rgba(245,158,11,0.12);
    --m4: #3b82f6; --m4-bg: rgba(59,130,246,0.12);
    --m5: #a855f7; --m5-bg: rgba(168,85,247,0.12);
    --m6: #22c55e; --m6-bg: rgba(34,197,94,0.12);
    --m7: #f43f5e; --m7-bg: rgba(244,63,94,0.12);
    --m8: #f97316; --m8-bg: rgba(249,115,22,0.12);
    --m9: #06b6d4; --m9-bg: rgba(6,182,212,0.12);
    --m10: #8b5cf6; --m10-bg: rgba(139,92,246,0.12);
    --m11: #10b981; --m11-bg: rgba(16,185,129,0.12);
    --m12: #ef4444; --m12-bg: rgba(239,68,68,0.12);
    --gold: #fbbf24;
    --radius: 16px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    font-family: 'Sora', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Background grid */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(99,102,241,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(99,102,241,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .app { position: relative; z-index: 1; max-width: 480px; margin: 0 auto; padding: 0 0 100px; }

  /* ── HEADER ── */
  .header {
    padding: 28px 20px 20px;
    background: linear-gradient(180deg, rgba(99,102,241,0.15) 0%, transparent 100%);
    border-bottom: 1px solid var(--border);
    position: sticky; top: 0; z-index: 50;
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
  }
  .header-top { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
  .logo { display: flex; align-items: center; gap: 10px; }
  .logo-icon { width: 36px; height: 36px; background: var(--m1); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 18px; }
  .logo-text { font-size: 1em; font-weight: 700; letter-spacing: -0.02em; }
  .logo-sub { font-size: 0.65em; font-weight: 400; color: var(--text-dim); display: block; margin-top: 1px; }
  .header-actions { display: flex; gap: 8px; align-items: center; }

  .streak-pill {
    display: flex; align-items: center; gap: 5px;
    background: rgba(251,191,36,0.12); border: 1px solid rgba(251,191,36,0.25);
    border-radius: 20px; padding: 5px 12px;
    font-size: 0.78em; font-weight: 600; color: var(--gold);
  }

  /* Overall progress bar */
  .overall-progress { padding: 0 20px 20px; }
  .progress-label { display: flex; justify-content: space-between; margin-bottom: 8px; }
  .progress-label span { font-size: 0.72em; color: var(--text-dim); font-family: 'JetBrains Mono', monospace; }
  .progress-label strong { font-size: 0.72em; color: var(--text); font-family: 'JetBrains Mono', monospace; }
  .progress-track { height: 6px; background: var(--surface2); border-radius: 3px; overflow: hidden; }
  .progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--m1), var(--m4), var(--m5));
    border-radius: 3px;
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }

  /* ── BADGES STRIP ── */
  .section-label {
    font-size: 0.65em; font-weight: 600; letter-spacing: 0.12em;
    color: var(--text-faint); text-transform: uppercase;
    padding: 20px 20px 10px;
  }
  .badges-strip {
    display: flex; gap: 10px; padding: 0 20px 4px;
    overflow-x: auto; scrollbar-width: none;
  }
  .badges-strip::-webkit-scrollbar { display: none; }
  .badge {
    flex-shrink: 0; display: flex; flex-direction: column; align-items: center;
    gap: 5px; padding: 10px 14px;
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; cursor: default;
    transition: transform 0.2s;
  }
  .badge.earned { border-color: rgba(251,191,36,0.3); background: rgba(251,191,36,0.06); }
  .badge.earned:active { transform: scale(0.95); }
  .badge-icon { font-size: 1.4em; filter: grayscale(1) opacity(0.3); }
  .badge.earned .badge-icon { filter: none; }
  .badge-name { font-size: 0.6em; color: var(--text-faint); text-align: center; white-space: nowrap; }
  .badge.earned .badge-name { color: var(--gold); }

  /* ── STATS ROW ── */
  .stats-row {
    display: grid; grid-template-columns: repeat(3, 1fr);
    gap: 10px; padding: 10px 20px 4px;
  }
  .stat-card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 12px; padding: 12px 10px; text-align: center;
  }
  .stat-num { font-size: 1.5em; font-weight: 800; font-family: 'JetBrains Mono', monospace; }
  .stat-lbl { font-size: 0.62em; color: var(--text-dim); margin-top: 2px; }

  /* ── MODULE CARDS ── */
  .modules-grid {
    display: flex; flex-direction: column;
    gap: 12px; padding: 10px 20px;
  }

  .module-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    cursor: pointer;
    transition: transform 0.2s, box-shadow 0.2s;
    text-decoration: none; color: inherit;
    display: block;
  }
  .module-card:active { transform: scale(0.98); }
  .module-card.has-progress { border-color: var(--module-color, var(--border)); }

  .module-card-inner { padding: 16px; }
  .module-top { display: flex; align-items: flex-start; gap: 14px; }

  .module-icon {
    width: 46px; height: 46px; flex-shrink: 0;
    border-radius: 12px;
    background: var(--module-bg);
    display: flex; align-items: center; justify-content: center;
    font-size: 1.3em;
  }

  .module-info { flex: 1; min-width: 0; }
  .module-num {
    font-size: 0.62em; font-weight: 600; letter-spacing: 0.1em;
    color: var(--module-color); text-transform: uppercase; margin-bottom: 2px;
    font-family: 'JetBrains Mono', monospace;
  }
  .module-title { font-size: 0.92em; font-weight: 600; line-height: 1.3; }
  .module-meta { font-size: 0.68em; color: var(--text-dim); margin-top: 3px; }

  .module-score {
    flex-shrink: 0; text-align: right;
  }
  .score-ring-wrap { position: relative; width: 42px; height: 42px; }
  .score-ring-wrap svg { transform: rotate(-90deg); }
  .score-ring-wrap circle { transition: stroke-dashoffset 1s cubic-bezier(0.4,0,0.2,1); }
  .score-pct {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.6em; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--module-color);
  }

  .module-progress-bar {
    margin-top: 12px;
    height: 3px; background: var(--surface2); border-radius: 2px; overflow: hidden;
  }
  .module-progress-fill {
    height: 100%; border-radius: 2px;
    background: var(--module-color);
    transition: width 0.8s cubic-bezier(0.4,0,0.2,1);
  }
  .module-lessons-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-top: 8px;
  }
  .lessons-dots { display: flex; gap: 4px; flex-wrap: wrap; }
  .lesson-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--surface2);
    transition: background 0.3s;
  }
  .lesson-dot.done { background: var(--module-color); }
  .lesson-dot.current { background: var(--module-color); box-shadow: 0 0 0 2px var(--bg), 0 0 0 3px var(--module-color); }
  .module-status {
    font-size: 0.62em; color: var(--text-dim);
    font-family: 'JetBrains Mono', monospace;
  }
  .module-status.complete { color: var(--module-color); }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
    width: 100%; max-width: 480px;
    background: rgba(13,13,20,0.92);
    border-top: 1px solid var(--border);
    backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
    display: flex; justify-content: space-around;
    padding: 10px 0 max(10px, env(safe-area-inset-bottom));
    z-index: 100;
  }
  .nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    padding: 4px 20px; background: none; border: none; cursor: pointer;
    color: var(--text-faint); transition: color 0.2s; font-family: 'Sora', sans-serif;
  }
  .nav-btn.active { color: var(--m1); }
  .nav-btn span { font-size: 0.6em; font-weight: 500; }
  .nav-icon { font-size: 1.3em; }

  /* Animations */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(20px); }
    to { opacity: 1; transform: translateY(0); }
  }
  .module-card { animation: fadeUp 0.4s ease both; }
  .module-card:nth-child(1) { animation-delay: 0.05s; }
  .module-card:nth-child(2) { animation-delay: 0.1s; }
  .module-card:nth-child(3) { animation-delay: 0.15s; }
  .module-card:nth-child(4) { animation-delay: 0.2s; }
  .module-card:nth-child(5) { animation-delay: 0.25s; }
  .module-card:nth-child(6) { animation-delay: 0.3s; }
  .module-card:nth-child(7) { animation-delay: 0.35s; }
  .module-card:nth-child(8) { animation-delay: 0.4s; }
  .module-card:nth-child(9) { animation-delay: 0.45s; }
  .module-card:nth-child(10) { animation-delay: 0.5s; }
  .module-card:nth-child(11) { animation-delay: 0.55s; }
  .module-card:nth-child(12) { animation-delay: 0.6s; }

  /* Toast */
  .toast {
    position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 20px; padding: 10px 20px;
    font-size: 0.82em; color: var(--text);
    opacity: 0; transition: all 0.3s;
    pointer-events: none; z-index: 200; white-space: nowrap;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>
<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📖</div>
        <div class="logo-text">
          Grammar Mastery
          <span class="logo-sub">From Foundations to Fluency</span>
        </div>
      </div>
      <div class="header-actions">
        <div class="streak-pill">
          <span>🔥</span>
          <span id="streakCount">0</span>
          <span>day</span>
        </div>
      </div>
    </div>
    <div class="overall-progress">
      <div class="progress-label">
        <span>Overall Progress</span>
        <strong id="overallPct">0%</strong>
      </div>
      <div class="progress-track">
        <div class="progress-fill" id="overallBar" style="width:0%"></div>
      </div>
    </div>
  </div>

  <!-- STATS -->
  <div class="stats-row">
    <div class="stat-card">
      <div class="stat-num" id="statQuizzes">0</div>
      <div class="stat-lbl">Quizzes Done</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statBest">—</div>
      <div class="stat-lbl">Best Score</div>
    </div>
    <div class="stat-card">
      <div class="stat-num" id="statBadges">0</div>
      <div class="stat-lbl">Badges</div>
    </div>
  </div>

  <!-- BADGES -->
  <div class="section-label">Achievements</div>
  <div class="badges-strip" id="badgesStrip">
    <!-- Populated by JS -->
  </div>

  <!-- MODULES -->
  <div class="section-label">Modules</div>
  <div class="modules-grid" id="modulesGrid">
    <!-- Populated by JS -->
  </div>

</div>

<!-- BOTTOM NAV -->
<div class="bottom-nav">
  <button class="nav-btn active" onclick="scrollToTop()">
    <span class="nav-icon">🏠</span>
    <span>Home</span>
  </button>
  <button class="nav-btn" onclick="showBadges()">
    <span class="nav-icon">🏆</span>
    <span>Badges</span>
  </button>
  <button class="nav-btn" onclick="showStats()">
    <span class="nav-icon">📊</span>
    <span>Stats</span>
  </button>
  <button class="nav-btn" id="muteBtn" onclick="toggleMute()">
    <span class="nav-icon" id="muteIcon">🔊</span>
    <span>Sound</span>
  </button>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// MODULE DEFINITIONS
// ═══════════════════════════════════════════════════════
const MODULES = [
  { id:1, title:'The Parts of Speech System', icon:'🔤', color:'#6366f1', bg:'rgba(99,102,241,0.12)', lessons:8, file:'modules/module1.html' },
  { id:2, title:'The Sentence', icon:'📝', color:'#14b8a6', bg:'rgba(20,184,166,0.12)', lessons:10, file:'modules/module2.html' },
  { id:3, title:'Articles and Determiners', icon:'🔍', color:'#f59e0b', bg:'rgba(245,158,11,0.12)', lessons:10, file:'modules/module3.html' },
  { id:4, title:'The Tense System', icon:'⏱️', color:'#3b82f6', bg:'rgba(59,130,246,0.12)', lessons:15, file:'modules/module4.html' },
  { id:5, title:'Modal Verbs', icon:'💬', color:'#a855f7', bg:'rgba(168,85,247,0.12)', lessons:10, file:'modules/module5.html' },
  { id:6, title:'Active and Passive Voice', icon:'🔄', color:'#22c55e', bg:'rgba(34,197,94,0.12)', lessons:7, file:'modules/module6.html' },
  { id:7, title:'Reported Speech', icon:'🗣️', color:'#f43f5e', bg:'rgba(244,63,94,0.12)', lessons:8, file:'modules/module7.html' },
  { id:8, title:'Sentence Structures and Clauses', icon:'🧩', color:'#f97316', bg:'rgba(249,115,22,0.12)', lessons:9, file:'modules/module8.html' },
  { id:9, title:'Conditionals and Hypotheticals', icon:'🤔', color:'#06b6d4', bg:'rgba(6,182,212,0.12)', lessons:8, file:'modules/module9.html' },
  { id:10, title:'Transformation and Synthesis', icon:'⚡', color:'#8b5cf6', bg:'rgba(139,92,246,0.12)', lessons:7, file:'modules/module10.html' },
  { id:11, title:'Integrated Grammar Mastery', icon:'🎯', color:'#10b981', bg:'rgba(16,185,129,0.12)', lessons:6, file:'modules/module11.html' },
  { id:12, title:'British and American English', icon:'🌍', color:'#ef4444', bg:'rgba(239,68,68,0.12)', lessons:5, file:'modules/module12.html' },
];

const BADGES = [
  { id:'first_quiz', icon:'⭐', name:'First Step', desc:'Complete your first quiz' },
  { id:'perfect_score', icon:'💯', name:'Perfect!', desc:'Score 100% on any quiz' },
  { id:'mod1_complete', icon:'🔤', name:'Word Master', desc:'Complete Module 1' },
  { id:'mod4_complete', icon:'⏰', name:'Tense Titan', desc:'Complete Module 4' },
  { id:'streak_7', icon:'🔥', name:'On Fire!', desc:'7-day streak' },
  { id:'streak_30', icon:'🌟', name:'Dedicated', desc:'30-day streak' },
  { id:'half_course', icon:'🎖️', name:'Halfway', desc:'50% course complete' },
  { id:'all_complete', icon:'🏆', name:'Grammar Hero', desc:'Complete the full course' },
  { id:'speed_demon', icon:'⚡', name:'Speed Run', desc:'Finish a quiz in under 2 min' },
  { id:'comeback', icon:'💪', name:'Comeback', desc:'Retry and improve a score' },
];

// ═══════════════════════════════════════════════════════
// STORAGE HELPERS
// ═══════════════════════════════════════════════════════
function getData() {
  try { return JSON.parse(localStorage.getItem('grammar_app') || '{}'); } catch(e) { return {}; }
}
function saveData(d) {
  try { localStorage.setItem('grammar_app', JSON.stringify(d)); } catch(e) {}
}

function getProgress() {
  const d = getData();
  return d.progress || {};
}

function getBadges() {
  const d = getData();
  return d.badges || [];
}

function getStreak() {
  const d = getData();
  if (!d.lastStudy) return 0;
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (d.lastStudy === today) return d.streak || 0;
  if (d.lastStudy === yesterday) return d.streak || 0;
  return 0;
}

// ═══════════════════════════════════════════════════════
// RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const progress = getProgress();
  const earnedBadges = getBadges();
  const streak = getStreak();

  // Streak
  document.getElementById('streakCount').textContent = streak;

  // Overall progress
  let totalQuizzes = 0, doneQuizzes = 0;
  MODULES.forEach(m => {
    totalQuizzes += (m.lessons + 1); // lessons + module quiz
    for (let l = 1; l <= m.lessons + 1; l++) {
      const key = `m${m.id}_l${l}`;
      if (progress[key] !== undefined) doneQuizzes++;
    }
  });
  const pct = totalQuizzes ? Math.round((doneQuizzes / totalQuizzes) * 100) : 0;
  document.getElementById('overallPct').textContent = pct + '%';
  document.getElementById('overallBar').style.width = pct + '%';

  // Stats
  let totalDone = 0, bestScore = 0;
  Object.values(progress).forEach(v => {
    if (v !== undefined) { totalDone++; if (v > bestScore) bestScore = v; }
  });
  document.getElementById('statQuizzes').textContent = totalDone;
  document.getElementById('statBest').textContent = totalDone ? bestScore + '%' : '—';
  document.getElementById('statBadges').textContent = earnedBadges.length;

  // Badges
  const strip = document.getElementById('badgesStrip');
  strip.innerHTML = BADGES.map(b => `
    <div class="badge ${earnedBadges.includes(b.id) ? 'earned' : ''}" title="${b.desc}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>
  `).join('');

  // Modules
  const grid = document.getElementById('modulesGrid');
  grid.innerHTML = MODULES.map(m => {
    let doneLessons = 0;
    let totalScore = 0, scoredLessons = 0;
    for (let l = 1; l <= m.lessons + 1; l++) {
      const key = `m${m.id}_l${l}`;
      if (progress[key] !== undefined) {
        doneLessons++;
        totalScore += progress[key];
        scoredLessons++;
      }
    }
    const total = m.lessons + 1;
    const modPct = total ? Math.round((doneLessons / total) * 100) : 0;
    const avgScore = scoredLessons ? Math.round(totalScore / scoredLessons) : 0;
    const isComplete = doneLessons === total;
    const hasProgress = doneLessons > 0;

    // SVG ring
    const r = 17, circ = 2 * Math.PI * r;
    const dash = circ - (modPct / 100) * circ;

    const dots = Array.from({length: m.lessons}, (_, i) => {
      const key = `m${m.id}_l${i+1}`;
      const isDone = progress[key] !== undefined;
      const isCurrent = !isDone && doneLessons === i;
      return `<div class="lesson-dot ${isDone ? 'done' : ''} ${isCurrent ? 'current' : ''}"></div>`;
    }).join('');

    return `
    <a class="module-card ${hasProgress ? 'has-progress' : ''}"
       style="--module-color:${m.color}; --module-bg:${m.bg};"
       href="${m.file}">
      <div class="module-card-inner">
        <div class="module-top">
          <div class="module-icon">${m.icon}</div>
          <div class="module-info">
            <div class="module-num">Module ${m.id}</div>
            <div class="module-title">${m.title}</div>
            <div class="module-meta">${m.lessons} lessons + 1 module quiz · ${m.lessons * 20 + 20} questions</div>
          </div>
          <div class="module-score">
            <div class="score-ring-wrap">
              <svg width="42" height="42" viewBox="0 0 42 42">
                <circle cx="21" cy="21" r="${r}" fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="3"/>
                <circle cx="21" cy="21" r="${r}" fill="none" stroke="${m.color}"
                  stroke-width="3" stroke-linecap="round"
                  stroke-dasharray="${circ}"
                  stroke-dashoffset="${dash}"/>
              </svg>
              <div class="score-pct">${hasProgress ? (isComplete ? '✓' : modPct+'%') : ''}</div>
            </div>
          </div>
        </div>
        <div class="module-progress-bar">
          <div class="module-progress-fill" style="width:${modPct}%"></div>
        </div>
        <div class="module-lessons-row">
          <div class="lessons-dots">${dots}</div>
          <div class="module-status ${isComplete ? 'complete' : ''}">
            ${isComplete ? '✓ Complete' : hasProgress ? `${doneLessons}/${total} done` : `${total} quizzes`}
          </div>
        </div>
      </div>
    </a>`;
  }).join('');
}

// ═══════════════════════════════════════════════════════
// MUTE
// ═══════════════════════════════════════════════════════
function toggleMute() {
  const d = getData();
  d.muted = !d.muted;
  saveData(d);
  document.getElementById('muteIcon').textContent = d.muted ? '🔇' : '🔊';
  document.getElementById('muteBtn').classList.toggle('active', !d.muted);
  showToast(d.muted ? 'Sound off' : 'Sound on');
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2000);
}

function scrollToTop() { window.scrollTo({top: 0, behavior: 'smooth'}); }
function showBadges() {
  document.querySelector('.badges-strip').scrollIntoView({behavior:'smooth', block:'start'});
}
function showStats() {
  document.querySelector('.stats-row').scrollIntoView({behavior:'smooth', block:'start'});
}

// Init
const d = getData();
document.getElementById('muteIcon').textContent = d.muted ? '🔇' : '🔊';
if (!d.muted) document.getElementById('muteBtn').classList.add('active');
render();

// Update streak on visit
(function() {
  const d = getData();
  const today = new Date().toDateString();
  const yesterday = new Date(Date.now() - 86400000).toDateString();
  if (d.lastStudy !== today) {
    if (d.lastStudy === yesterday) { d.streak = (d.streak || 0) + 1; }
    else if (d.lastStudy) { d.streak = 1; }
    else { d.streak = 1; }
    d.lastStudy = today;
    saveData(d);
  }
})();
</script>
