<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>English Grammar Mastery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap');
  :root {
    --bg:      #e8f0fe;
    --white:   #ffffff;
    --border:  #c7d2fe;
    --text:    #1e1b4b;
    --text-md: #3730a3;
    --text-sm: #6b7280;
    --text-xs: #9ca3af;
    --radius:  14px;
    --shadow:  0 1px 4px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --shadow-md: 0 4px 14px rgba(0,0,0,0.09);
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  html { scroll-behavior:smooth; }
  body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
  .app { max-width:480px; margin:0 auto; padding-bottom:90px; min-height:100vh; }

  /* ── HEADER ── */
  .header {
    padding:18px 16px 14px;
    background:var(--white);
    border-bottom:1px solid var(--border);
    position:sticky; top:0; z-index:50;
    box-shadow:0 2px 10px rgba(99,102,241,0.1);
  }
  .header-top { display:flex; justify-content:space-between; align-items:center; margin-bottom:14px; }
  .logo { display:flex; align-items:center; gap:10px; }
  .logo-icon {
    width:42px; height:42px; flex-shrink:0;
    background:linear-gradient(135deg,#4f46e5,#7c3aed);
    border-radius:12px; display:flex; align-items:center;
    justify-content:center; font-size:20px;
    box-shadow:0 3px 10px rgba(79,70,229,0.35);
  }
  .logo-name { font-size:0.93em; font-weight:800; color:#1e1b4b; line-height:1.2; }
  .logo-sub  { font-size:0.62em; color:var(--text-sm); margin-top:1px; display:block; }

  .streak-pill {
    display:flex; align-items:center; gap:5px;
    background:#fffbeb; border:1.5px solid #fbbf24;
    border-radius:20px; padding:6px 13px;
    font-size:0.83em; font-weight:700; color:#92400e;
  }

  .prog-row { display:flex; justify-content:space-between; margin-bottom:6px; }
  .prog-row span  { font-size:0.72em; font-weight:600; color:var(--text-sm); }
  .prog-row strong{ font-size:0.72em; font-weight:700; color:#4f46e5; font-family:'JetBrains Mono',monospace; }
  .prog-track { height:8px; background:#c7d2fe; border-radius:4px; overflow:hidden; }
  .prog-fill  { height:100%; background:linear-gradient(90deg,#4f46e5,#7c3aed,#06b6d4); border-radius:4px; transition:width 0.9s cubic-bezier(0.4,0,0.2,1); }

  /* ── STATS — colour coded ── */
  .stats-row { display:grid; grid-template-columns:repeat(3,1fr); gap:10px; padding:14px 16px 4px; }
  .stat-card {
    border-radius:var(--radius); padding:14px 8px; text-align:center;
    box-shadow:var(--shadow-md); border:none;
  }
  .stat-card.s1 { background:linear-gradient(135deg,#4f46e5,#6366f1); }
  .stat-card.s2 { background:linear-gradient(135deg,#059669,#10b981); }
  .stat-card.s3 { background:linear-gradient(135deg,#d97706,#f59e0b); }
  .stat-num { font-size:1.55em; font-weight:800; font-family:'JetBrains Mono',monospace; color:#fff; }
  .stat-lbl { font-size:0.62em; color:rgba(255,255,255,0.82); margin-top:3px; font-weight:600; }

  /* ── SECTION LABEL ── */
  .sec-label {
    font-size:0.65em; font-weight:700; letter-spacing:0.1em;
    text-transform:uppercase; color:#6366f1;
    padding:18px 16px 8px;
  }

  /* ── BADGES — colour coded ── */
  .badges-strip { display:flex; gap:9px; padding:0 16px 4px; overflow-x:auto; scrollbar-width:none; }
  .badges-strip::-webkit-scrollbar { display:none; }

  .badge {
    flex-shrink:0; display:flex; flex-direction:column; align-items:center;
    gap:5px; padding:10px 13px;
    background:var(--white); border:1.5px solid var(--border);
    border-radius:12px; box-shadow:var(--shadow);
    min-width:70px;
  }
  .badge-icon { font-size:1.3em; filter:grayscale(1) opacity(0.28); }
  .badge-name { font-size:0.6em; color:var(--text-xs); white-space:nowrap; font-weight:600; }

  /* Each earned badge gets its own colour */
  .badge.earned.b0 { background:#ede9fe; border-color:#a78bfa; }
  .badge.earned.b0 .badge-name { color:#5b21b6; }
  .badge.earned.b1 { background:#fef3c7; border-color:#fbbf24; }
  .badge.earned.b1 .badge-name { color:#92400e; }
  .badge.earned.b2 { background:#dbeafe; border-color:#60a5fa; }
  .badge.earned.b2 .badge-name { color:#1e40af; }
  .badge.earned.b3 { background:#dcfce7; border-color:#4ade80; }
  .badge.earned.b3 .badge-name { color:#065f46; }
  .badge.earned.b4 { background:#fee2e2; border-color:#f87171; }
  .badge.earned.b4 .badge-name { color:#7f1d1d; }
  .badge.earned.b5 { background:#fce7f3; border-color:#f472b6; }
  .badge.earned.b5 .badge-name { color:#831843; }
  .badge.earned.b6 { background:#ecfccb; border-color:#86efac; }
  .badge.earned.b6 .badge-name { color:#3f6212; }
  .badge.earned.b7 { background:#cffafe; border-color:#67e8f9; }
  .badge.earned.b7 .badge-name { color:#0e7490; }
  .badge.earned.b8 { background:#ffedd5; border-color:#fb923c; }
  .badge.earned.b8 .badge-name { color:#7c2d12; }
  .badge.earned.b9 { background:#f0fdf4; border-color:#4ade80; }
  .badge.earned.b9 .badge-name { color:#14532d; }
  .badge.earned .badge-icon { filter:none; }

  /* ── MODULE CARDS — solid colour backgrounds ── */
  .modules-grid { display:flex; flex-direction:column; gap:10px; padding:6px 16px; }

  .module-card {
    display:block; border-radius:var(--radius);
    text-decoration:none; color:#fff;
    overflow:hidden; position:relative;
    box-shadow:var(--shadow-md);
    border:none;
    transition:transform 0.18s, box-shadow 0.18s;
  }
  .module-card:active { transform:scale(0.978); }
  /* Top highlight */
  .module-card::before {
    content:''; position:absolute; top:0; left:0; right:0; height:40%;
    background:linear-gradient(180deg,rgba(255,255,255,0.14) 0%,transparent 100%);
    pointer-events:none; z-index:0;
  }
  .mc-inner { padding:14px 16px; position:relative; z-index:1; }
  .mc-top { display:flex; align-items:center; gap:13px; }
  .mc-icon {
    width:44px; height:44px; flex-shrink:0; border-radius:11px;
    background:rgba(255,255,255,0.22);
    display:flex; align-items:center; justify-content:center; font-size:1.25em;
  }
  .mc-info { flex:1; min-width:0; }
  .mc-num  { font-size:0.62em; font-weight:700; letter-spacing:0.08em; text-transform:uppercase; font-family:'JetBrains Mono',monospace; color:rgba(255,255,255,0.75); margin-bottom:2px; }
  .mc-title{ font-size:0.93em; font-weight:800; color:#fff; line-height:1.25; }
  .mc-meta { font-size:0.66em; color:rgba(255,255,255,0.7); margin-top:2px; font-weight:500; }

  .ring-wrap { position:relative; width:42px; height:42px; flex-shrink:0; }
  .ring-wrap svg { transform:rotate(-90deg); }
  .ring-pct { position:absolute; inset:0; display:flex; align-items:center; justify-content:center; font-size:0.56em; font-weight:700; font-family:'JetBrains Mono',monospace; color:#fff; }

  .mc-bar { margin-top:11px; height:4px; background:rgba(255,255,255,0.25); border-radius:2px; overflow:hidden; }
  .mc-bar-fill { height:100%; background:rgba(255,255,255,0.8); border-radius:2px; transition:width 0.9s cubic-bezier(0.4,0,0.2,1); }

  .mc-bottom { display:flex; justify-content:space-between; align-items:center; margin-top:8px; }
  .dots { display:flex; gap:4px; flex-wrap:wrap; }
  .dot { width:6px; height:6px; border-radius:50%; background:rgba(255,255,255,0.28); }
  .dot.done { background:rgba(255,255,255,0.88); }
  .mc-status { font-size:0.62em; color:rgba(255,255,255,0.75); font-family:'JetBrains Mono',monospace; font-weight:600; }
  .mc-status.complete { color:#fff; }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    position:fixed; bottom:0; left:50%; transform:translateX(-50%);
    width:100%; max-width:480px;
    background:var(--white); border-top:1px solid var(--border);
    box-shadow:0 -2px 12px rgba(99,102,241,0.12);
    display:flex; justify-content:space-around;
    padding:10px 0 max(10px,env(safe-area-inset-bottom)); z-index:100;
  }
  .nav-btn {
    display:flex; flex-direction:column; align-items:center; gap:3px;
    padding:4px 20px; background:none; border:none; cursor:pointer;
    color:var(--text-xs); font-family:'Inter',sans-serif; transition:color 0.2s;
  }
  .nav-btn.active { color:#4f46e5; }
  .nav-btn span { font-size:0.6em; font-weight:600; }
  .nav-icon { font-size:1.25em; }

  .toast {
    position:fixed; bottom:90px; left:50%; transform:translateX(-50%) translateY(10px);
    background:#1e1b4b; border-radius:20px; padding:10px 20px;
    font-size:0.82em; color:#fff;
    opacity:0; transition:all 0.3s; pointer-events:none; z-index:200; white-space:nowrap;
  }
  .toast.show { opacity:1; transform:translateX(-50%) translateY(0); }

  @keyframes fadeUp { from{opacity:0;transform:translateY(14px)} to{opacity:1;transform:translateY(0)} }
  .module-card { animation:fadeUp 0.35s ease both; }
  .module-card:nth-child(1){animation-delay:.03s}.module-card:nth-child(2){animation-delay:.06s}
  .module-card:nth-child(3){animation-delay:.09s}.module-card:nth-child(4){animation-delay:.12s}
  .module-card:nth-child(5){animation-delay:.15s}.module-card:nth-child(6){animation-delay:.18s}
  .module-card:nth-child(7){animation-delay:.21s}.module-card:nth-child(8){animation-delay:.24s}
  .module-card:nth-child(9){animation-delay:.27s}.module-card:nth-child(10){animation-delay:.30s}
  .module-card:nth-child(11){animation-delay:.33s}.module-card:nth-child(12){animation-delay:.36s}
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <div class="header-top">
      <div class="logo">
        <div class="logo-icon">📖</div>
        <div>
          <div class="logo-name">English Grammar Mastery</div>
          <span class="logo-sub">Quizzes · From Foundations to Fluency</span>
        </div>
      </div>
      <div class="streak-pill">🔥 Day <span id="streakCount">1</span></div>
    </div>
    <div>
      <div class="prog-row">
        <span>Overall Progress</span>
        <strong id="overallPct">0%</strong>
      </div>
      <div class="prog-track"><div class="prog-fill" id="overallBar" style="width:0%"></div></div>
    </div>
  </div>

  <div class="stats-row">
    <div class="stat-card s1"><div class="stat-num" id="statQuizzes">0</div><div class="stat-lbl">Quizzes Done</div></div>
    <div class="stat-card s2"><div class="stat-num" id="statBest">—</div><div class="stat-lbl">Best Score</div></div>
    <div class="stat-card s3"><div class="stat-num" id="statBadges">0</div><div class="stat-lbl">Badges</div></div>
  </div>

  <div class="sec-label">Achievements</div>
  <div class="badges-strip" id="badgesStrip"></div>

  <div class="sec-label">Modules</div>
  <div class="modules-grid" id="modulesGrid"></div>
</div>

<div class="bottom-nav">
  <button class="nav-btn active" onclick="window.scrollTo({top:0,behavior:'smooth'})">
    <span class="nav-icon">🏠</span><span>Home</span>
  </button>
  <button class="nav-btn" onclick="document.getElementById('badgesStrip').scrollIntoView({behavior:'smooth'})">
    <span class="nav-icon">🏆</span><span>Badges</span>
  </button>
  <button class="nav-btn" onclick="document.querySelector('.stats-row').scrollIntoView({behavior:'smooth'})">
    <span class="nav-icon">📊</span><span>Stats</span>
  </button>
  <button class="nav-btn" id="muteBtn" onclick="toggleMute()">
    <span class="nav-icon" id="muteIcon">🔊</span><span>Sound</span>
  </button>
</div>
<div class="toast" id="toast"></div>

<script>
const MODULES=[
  {id:1,  title:'The Parts of Speech System',       icon:'🔤', bg:'#5b21b6', lessons:8},
  {id:2,  title:'The Sentence',                      icon:'📝', bg:'#1d4ed8', lessons:10},
  {id:3,  title:'Articles and Determiners',          icon:'🔍', bg:'#b45309', lessons:10},
  {id:4,  title:'The Tense System',                  icon:'⏱️', bg:'#065f46', lessons:15},
  {id:5,  title:'Modal Verbs',                       icon:'💬', bg:'#9d174d', lessons:10},
  {id:6,  title:'Active and Passive Voice',          icon:'🔄', bg:'#0e7490', lessons:7},
  {id:7,  title:'Reported Speech',                   icon:'🗣️', bg:'#c2410c', lessons:8},
  {id:8,  title:'Sentence Structures & Clauses',     icon:'🧩', bg:'#4d7c0f', lessons:9},
  {id:9,  title:'Conditionals & Hypotheticals',      icon:'🤔', bg:'#1e40af', lessons:8},
  {id:10, title:'Transformation and Synthesis',      icon:'⚡', bg:'#6b21a8', lessons:7},
  {id:11, title:'Integrated Grammar Mastery',        icon:'🎯', bg:'#0f766e', lessons:6},
  {id:12, title:'British and American English',      icon:'🌍', bg:'#b91c1c', lessons:5},
];
const BADGES=[
  {id:'first_quiz',    icon:'⭐', name:'First Step'},
  {id:'perfect_score', icon:'💯', name:'Perfect!'},
  {id:'mod1_complete', icon:'🔤', name:'Word Master'},
  {id:'mod4_complete', icon:'⏰', name:'Tense Titan'},
  {id:'streak_7',      icon:'🔥', name:'On Fire!'},
  {id:'streak_30',     icon:'🌟', name:'Dedicated'},
  {id:'half_course',   icon:'🎖️', name:'Halfway'},
  {id:'all_complete',  icon:'🏆', name:'Grammar Hero'},
  {id:'speed_demon',   icon:'⚡', name:'Speed Run'},
  {id:'comeback',      icon:'💪', name:'Comeback'},
];

function getData(){try{return JSON.parse(localStorage.getItem('grammar_app')||'{}');}catch(e){return{};}}
function saveData(d){try{localStorage.setItem('grammar_app',JSON.stringify(d));}catch(e){}}
function getStreak(d){if(!d.lastStudy)return 1;const t=new Date().toDateString(),y=new Date(Date.now()-86400000).toDateString();return(d.lastStudy===t||d.lastStudy===y)?(d.streak||1):1;}

function render(){
  const d=getData(),p=d.progress||{},e=d.badges||[];
  document.getElementById('streakCount').textContent=getStreak(d);
  let total=0,done=0,best=0,tdone=0;
  MODULES.forEach(m=>{const q=m.lessons+1;total+=q;for(let l=1;l<=q;l++){const v=p[`m${m.id}_l${l}`];if(v!==undefined){done++;tdone++;if(v>best)best=v;}}});
  const pct=total?Math.round(done/total*100):0;
  document.getElementById('overallPct').textContent=pct+'%';
  document.getElementById('overallBar').style.width=pct+'%';
  document.getElementById('statQuizzes').textContent=tdone;
  document.getElementById('statBest').textContent=tdone?best+'%':'—';
  document.getElementById('statBadges').textContent=e.length;

  // Badges with colour classes
  document.getElementById('badgesStrip').innerHTML=BADGES.map((b,i)=>`
    <div class="badge ${e.includes(b.id)?`earned b${i}`:''}">
      <div class="badge-icon">${b.icon}</div>
      <div class="badge-name">${b.name}</div>
    </div>`).join('');

  // Module cards
  document.getElementById('modulesGrid').innerHTML=MODULES.map(m=>{
    let dl=0;const q=m.lessons+1;
    for(let l=1;l<=q;l++) if(p[`m${m.id}_l${l}`]!==undefined) dl++;
    const mp=Math.round(dl/q*100),hp=dl>0,ic=dl===q;
    const r=16,circ=2*Math.PI*r,dash=circ-(mp/100)*circ;
    const dots=Array.from({length:m.lessons},(_,i)=>
      `<div class="dot ${p[`m${m.id}_l${i+1}`]!==undefined?'done':''}"></div>`).join('');
    return `
    <a class="module-card" href="modules/module${m.id}.html" style="background:${m.bg};">
      <div class="mc-inner">
        <div class="mc-top">
          <div class="mc-icon">${m.icon}</div>
          <div class="mc-info">
            <div class="mc-num">Module ${m.id}</div>
            <div class="mc-title">${m.title}</div>
            <div class="mc-meta">${m.lessons} lessons + module quiz · ${(m.lessons+1)*20} questions</div>
          </div>
          <div class="ring-wrap">
            <svg width="42" height="42" viewBox="0 0 42 42">
              <circle cx="21" cy="21" r="${r}" fill="none" stroke="rgba(255,255,255,0.25)" stroke-width="3"/>
              <circle cx="21" cy="21" r="${r}" fill="none" stroke="rgba(255,255,255,0.85)"
                stroke-width="3" stroke-linecap="round"
                stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${dash.toFixed(1)}"/>
            </svg>
            <div class="ring-pct">${hp?(ic?'✓':mp+'%'):''}</div>
          </div>
        </div>
        <div class="mc-bar"><div class="mc-bar-fill" style="width:${mp}%"></div></div>
        <div class="mc-bottom">
          <div class="dots">${dots}</div>
          <div class="mc-status ${ic?'complete':''}">${ic?'✓ Complete':hp?`${dl}/${q} done`:`${q} quizzes`}</div>
        </div>
      </div>
    </a>`;
  }).join('');
}

function toggleMute(){
  const d=getData();d.muted=!d.muted;saveData(d);
  document.getElementById('muteIcon').textContent=d.muted?'🔇':'🔊';
  document.getElementById('muteBtn').classList.toggle('active',!d.muted);
  showToast(d.muted?'Sound off':'Sound on');
}
function showToast(msg){const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');setTimeout(()=>t.classList.remove('show'),2000);}

(function(){
  const d=getData(),today=new Date().toDateString(),yest=new Date(Date.now()-86400000).toDateString();
  if(d.lastStudy!==today){d.streak=(d.lastStudy===yest)?(d.streak||0)+1:1;d.lastStudy=today;saveData(d);}
})();
const d0=getData();
document.getElementById('muteIcon').textContent=d0.muted?'🔇':'🔊';
if(!d0.muted)document.getElementById('muteBtn').classList.add('active');
render();
</script>
</body>
</html>
