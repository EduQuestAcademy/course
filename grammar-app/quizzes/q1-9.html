<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lesson 1.Module Quiz — Parts of Speech — Full Assessment | Grammar Mastery</title>
<style>
  /* ═══════════════════════════════════════════════════════════
     GRAMMAR MASTERY — DESIGN SYSTEM
     Responsive: Mobile → Tablet → Desktop (two-panel)
     Fonts: Inter (UI) + JetBrains Mono (numbers/code)
  ═══════════════════════════════════════════════════════════ */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap');

  :root {
    /* Colours */
    --bg:         #eef2ff;
    --surface:    #ffffff;
    --surface2:   #f5f3ff;
    --border:     #ddd6fe;
    --border-md:  #c4b5fd;

    /* Text */
    --tx:         #1e1b4b;
    --tx-md:      #374151;
    --tx-sm:      #6b7280;
    --tx-xs:      #9ca3af;

    /* Brand */
    --accent:     #5b21b6;
    --accent-mid: #7c3aed;
    --accent-lt:  #ede9fe;
    --accent-glow:rgba(124,58,237,0.18);

    /* Feedback */
    --ok:         #059669;
    --ok-lt:      #d1fae5;
    --ok-dk:      #065f46;
    --no:         #dc2626;
    --no-lt:      #fee2e2;
    --no-dk:      #991b1b;

    /* Geometry */
    --r-sm:   8px;
    --r-md:   12px;
    --r-lg:   16px;
    --r-xl:   20px;
    --r-full: 999px;

    /* Shadows */
    --sh-xs: 0 1px 2px rgba(0,0,0,0.05);
    --sh-sm: 0 1px 4px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --sh-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --sh-lg: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    --sh-accent: 0 4px 20px rgba(91,33,182,0.25);

    /* Layout */
    --sidebar-w: 300px;
    --content-max: 660px;
  }

  /* ── RESET & BASE ── */
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  html { scroll-behavior: smooth; height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--tx);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT: MOBILE (default) ── */
  .quiz-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .quiz-sidebar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--sh-sm);
    position: sticky; top: 0; z-index: 50;
  }
  .quiz-main {
    flex: 1;
    padding-bottom: 48px;
  }

  /* ── LAYOUT: TABLET (640px+) ── */
  @media (min-width: 640px) {
    body { font-size: 17px; }
    .quiz-shell {
      max-width: 720px;
      margin: 0 auto;
    }
  }

  /* ── LAYOUT: DESKTOP (1024px+) ── */
  @media (min-width: 1024px) {
    body {
      font-size: 16px;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #ede9fe 100%);
      background-attachment: fixed;
    }
    .quiz-shell {
      max-width: 1080px;
      margin: 32px auto;
      flex-direction: row;
      align-items: flex-start;
      gap: 0;
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--sh-lg);
      min-height: calc(100vh - 64px);
    }
    .quiz-sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: 32px;
      height: calc(100vh - 64px);
      border-bottom: none;
      border-right: 1px solid var(--border);
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .quiz-main {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      min-height: calc(100vh - 64px);
      padding-bottom: 64px;
    }
  }

  /* ── SIDEBAR CONTENT ── */
  .sb-top {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sb-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--accent-mid); font-size: 0.82em; font-weight: 700;
    text-decoration: none; background: none; border: none;
    cursor: pointer; font-family: inherit;
    padding: 6px 10px; border-radius: var(--r-sm);
    transition: background 0.15s;
    margin-bottom: 16px;
  }
  .sb-back:hover { background: var(--accent-lt); }

  .sb-lesson-tag {
    display: inline-flex; align-items: center;
    background: var(--accent-lt); border: 1.5px solid var(--border-md);
    border-radius: var(--r-full); padding: 4px 12px;
    font-size: 0.65em; font-weight: 700; letter-spacing: 0.07em;
    color: var(--accent); text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
  }
  .sb-title {
    font-size: 0.95em; font-weight: 800;
    color: var(--tx); line-height: 1.3;
  }

  /* Progress in sidebar */
  .sb-progress {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sb-prog-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .sb-prog-label { font-size: 0.72em; font-weight: 600; color: var(--tx-sm); }
  .sb-prog-count {
    font-size: 0.78em; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; color: var(--accent-mid);
  }
  .sb-prog-track {
    height: 6px; background: var(--border);
    border-radius: var(--r-full); overflow: hidden;
  }
  .sb-prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-mid));
    border-radius: var(--r-full);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Question dots in sidebar (desktop only) */
  .sb-dots {
    padding: 16px 20px;
    flex: 1;
    display: none;
  }
  @media (min-width: 1024px) { .sb-dots { display: block; } }
  .sb-dots-label {
    font-size: 0.65em; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--tx-xs);
    margin-bottom: 12px;
  }
  .sb-dots-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  }
  .sb-dot {
    aspect-ratio: 1; border-radius: var(--r-sm);
    background: var(--border); border: 1.5px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65em; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; color: var(--tx-xs);
    transition: all 0.2s;
    cursor: default;
  }
  .sb-dot.active {
    background: var(--accent); color: white;
    border-color: var(--accent);
    box-shadow: var(--sh-accent);
    transform: scale(1.08);
  }
  .sb-dot.done-ok  { background: var(--ok-lt);  color: var(--ok);  border-color: var(--ok); }
  .sb-dot.done-no  { background: var(--no-lt);  color: var(--no);  border-color: var(--no); }

  /* Mute + score in sidebar bottom */
  .sb-bottom {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    margin-top: auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sb-score-wrap { display: flex; flex-direction: column; gap: 1px; }
  .sb-score-num {
    font-size: 1.5em; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent-mid));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .sb-score-label { font-size: 0.65em; color: var(--tx-xs); font-weight: 600; }
  .mute-btn {
    background: var(--accent-lt); border: 1.5px solid var(--border-md);
    border-radius: var(--r-md); padding: 8px 12px;
    font-size: 1.1em; cursor: pointer; line-height: 1;
    transition: all 0.15s;
  }
  .mute-btn:hover { background: var(--border-md); }

  /* ── MOBILE HEADER (hidden on desktop) ── */
  .mobile-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
  }
  @media (min-width: 1024px) { .mobile-header { display: none; } }
  .mobile-back {
    color: var(--accent-mid); font-size: 0.85em; font-weight: 700;
    text-decoration: none; background: none; border: none;
    cursor: pointer; font-family: inherit;
  }
  .mobile-counter {
    text-align: center;
  }
  .mobile-count-num {
    font-size: 0.78em; font-family: 'JetBrains Mono', monospace;
    color: var(--accent-mid); font-weight: 700;
  }
  .mobile-count-sub {
    font-size: 0.62em; color: var(--tx-xs); margin-top: 1px;
  }

  /* Progress bar — top on mobile, in sidebar on desktop */
  .top-prog {
    height: 4px; background: var(--border);
  }
  @media (min-width: 1024px) { .top-prog { display: none; } }
  .top-prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-mid));
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── QUESTION AREA ── */
  .q-wrap { padding: 28px 24px 16px; }
  @media (min-width: 640px) { .q-wrap { padding: 32px 32px 20px; } }
  @media (min-width: 1024px) { .q-wrap { padding: 40px 44px 24px; } }

  .q-type-badge {
    display: inline-flex; align-items: center;
    background: var(--accent-lt); border: 1.5px solid var(--border-md);
    border-radius: var(--r-full); padding: 5px 14px;
    font-size: 0.65em; font-weight: 700; letter-spacing: 0.07em;
    color: var(--accent); text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 16px;
  }
  .q-text {
    font-size: 1.15em; font-weight: 700;
    line-height: 1.6; color: var(--tx);
    letter-spacing: -0.01em;
  }
  @media (min-width: 1024px) { .q-text { font-size: 1.2em; } }

  /* ── ANSWER OPTIONS ── */
  .opt-list {
    display: flex; flex-direction: column; gap: 10px;
    padding: 0 24px;
  }
  @media (min-width: 640px) { .opt-list { padding: 0 32px; } }
  @media (min-width: 1024px) { .opt-list { padding: 0 44px; gap: 12px; } }

  .opt-btn {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--r-lg); padding: 14px 16px;
    cursor: pointer; text-align: left; width: 100%;
    font-family: inherit; color: var(--tx);
    box-shadow: var(--sh-sm);
    transition: border-color 0.15s, background 0.15s,
                box-shadow 0.15s, transform 0.1s;
    position: relative; overflow: hidden;
  }
  .opt-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,58,237,0.04), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .opt-btn:hover {
    border-color: var(--border-md);
    background: var(--surface2);
    box-shadow: 0 3px 14px var(--accent-glow);
  }
  .opt-btn:hover::before { opacity: 1; }
  .opt-btn:active { transform: scale(0.985); }
  .opt-btn:disabled { cursor: default; transform: none; }

  .opt-key {
    width: 34px; height: 34px; flex-shrink: 0;
    border-radius: var(--r-sm);
    background: var(--accent-lt);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75em; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent); transition: all 0.15s;
    letter-spacing: 0;
  }
  .opt-text {
    flex: 1; font-size: 0.95em; line-height: 1.45;
    font-weight: 500; color: var(--tx);
  }
  .opt-icon {
    font-size: 1em; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    transform: scale(0.6);
    flex-shrink: 0;
  }

  /* Answer states */
  .opt-btn.correct {
    border-color: var(--ok); background: var(--ok-lt);
    box-shadow: 0 0 0 3px rgba(5,150,105,0.12);
  }
  .opt-btn.correct .opt-key { background: var(--ok); color: white; }
  .opt-btn.correct .opt-icon { opacity: 1; transform: scale(1); }
  .opt-btn.wrong {
    border-color: var(--no); background: var(--no-lt);
    box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
  }
  .opt-btn.wrong .opt-key { background: var(--no); color: white; }
  .opt-btn.wrong .opt-icon { opacity: 1; transform: scale(1); }
  .opt-btn.dimmed { opacity: 0.38; }

  /* T/F grid */
  .tf-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 24px;
  }
  @media (min-width: 640px) { .tf-grid { padding: 0 32px; } }
  @media (min-width: 1024px) { .tf-grid { padding: 0 44px; gap: 14px; } }

  /* Fill input */
  .fill-wrap { padding: 0 24px; }
  @media (min-width: 640px) { .fill-wrap { padding: 0 32px; } }
  @media (min-width: 1024px) { .fill-wrap { padding: 0 44px; } }

  .fill-input {
    width: 100%; background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r-lg); padding: 14px 18px;
    font-family: inherit; font-size: 1em; color: var(--tx);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: var(--sh-sm);
  }
  .fill-input:focus {
    border-color: var(--accent-mid);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
  }
  .fill-input.correct { border-color: var(--ok); background: var(--ok-lt); color: var(--ok-dk); }
  .fill-input.wrong   { border-color: var(--no); background: var(--no-lt); color: var(--no-dk); }
  .fill-hint { font-size: 0.75em; color: var(--tx-xs); margin-top: 6px; padding-left: 2px; }

  .fill-submit {
    margin-top: 10px; width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent-mid));
    border: none; border-radius: var(--r-lg); padding: 14px;
    font-family: inherit; font-size: 0.95em; font-weight: 700;
    color: white; cursor: pointer;
    box-shadow: var(--sh-accent);
    transition: opacity 0.15s, transform 0.1s;
  }
  .fill-submit:hover   { opacity: 0.9; }
  .fill-submit:active  { transform: scale(0.98); }
  .fill-submit:disabled { opacity: 0.45; cursor: default; }

  /* ── EXPLANATION BOX ── */
  .expl-box {
    margin: 16px 24px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent-mid);
    border-radius: var(--r-lg); padding: 16px 18px;
    font-size: 0.88em; line-height: 1.75; color: var(--tx-md);
    display: none; box-shadow: var(--sh-sm);
  }
  @media (min-width: 640px) { .expl-box { margin: 16px 32px 0; } }
  @media (min-width: 1024px) { .expl-box { margin: 20px 44px 0; font-size: 0.9em; } }
  .expl-box.show { display: block; animation: fadeIn 0.3s ease; }
  .expl-box.correct-box { border-left-color: var(--ok); }
  .expl-box.wrong-box   { border-left-color: var(--no); }

  .expl-label {
    font-size: 0.7em; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px;
  }
  .expl-label.correct { color: var(--ok); }
  .expl-label.wrong   { color: var(--no); }

  /* ── NEXT BUTTON ── */
  .next-btn {
    display: none; margin: 16px 24px 0;
    width: calc(100% - 48px);
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
    border: none; border-radius: var(--r-lg); padding: 16px;
    font-family: inherit; font-size: 1em; font-weight: 700;
    color: white; cursor: pointer;
    box-shadow: var(--sh-accent);
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }
  .next-btn:hover   { opacity: 0.92; }
  .next-btn:active  { transform: scale(0.985); }
  .next-btn.show    { display: block; animation: fadeUp 0.3s ease; }
  @media (min-width: 640px) {
    .next-btn { margin: 16px 32px 0; width: calc(100% - 64px); }
  }
  @media (min-width: 1024px) {
    .next-btn { margin: 20px 44px 0; width: calc(100% - 88px); padding: 17px; }
  }

  /* ── RESULTS SCREEN ── */
  .results {
    display: none; flex-direction: column; align-items: center;
    padding: 48px 24px 40px;
  }
  .results.show { display: flex; animation: fadeUp 0.5s ease; }
  @media (min-width: 640px) { .results { padding: 48px 48px 40px; } }
  @media (min-width: 1024px) { .results { padding: 60px 80px 60px; } }

  .res-trophy { font-size: 5em; margin-bottom: 12px; animation: bounce 0.7s ease; }
  .res-score {
    font-size: 4em; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), #2563eb);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1; margin-bottom: 6px;
  }
  .res-msg { font-size: 0.95em; color: var(--tx-sm); margin-bottom: 28px; font-weight: 500; }

  .res-badge-wrap {
    background: #fffbeb; border: 1.5px solid #fde68a;
    border-radius: var(--r-lg); padding: 14px 18px;
    width: 100%; display: flex; align-items: center;
    gap: 14px; margin-bottom: 14px; box-shadow: var(--sh-sm);
  }
  .res-stats {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 4px 18px; margin-bottom: 24px; box-shadow: var(--sh-sm);
  }
  .res-stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #f3f4f6;
    font-size: 0.88em; color: var(--tx-md);
  }
  .res-stat-row:last-child { border-bottom: none; }
  .res-correct { color: var(--ok); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .res-wrong   { color: var(--no); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .res-mono    { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

  .res-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .res-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-mid));
    border: none; border-radius: var(--r-lg); padding: 16px;
    font-family: inherit; font-size: 1em; font-weight: 700;
    color: white; cursor: pointer; text-align: center;
    text-decoration: none; display: block;
    box-shadow: var(--sh-accent);
    transition: opacity 0.15s;
  }
  .res-primary:hover { opacity: 0.9; }
  .res-secondary {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--r-lg); padding: 14px;
    font-family: inherit; font-size: 0.92em; font-weight: 600;
    color: var(--tx-sm); cursor: pointer; text-align: center;
    text-decoration: none; display: block; box-shadow: var(--sh-xs);
    transition: border-color 0.15s, background 0.15s;
  }
  .res-secondary:hover { border-color: var(--border-md); background: var(--surface2); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp  { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
  @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
  @keyframes bounce  { 0%,100%{transform:scale(1)} 40%{transform:scale(1.2)} 70%{transform:scale(0.95)} }
  @keyframes shake   { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  .shake { animation: shake 0.35s ease; }

  /* Card entrance stagger */
  .opt-btn { animation: fadeUp 0.25s ease both; }
  .opt-btn:nth-child(1){animation-delay:.04s}
  .opt-btn:nth-child(2){animation-delay:.08s}
  .opt-btn:nth-child(3){animation-delay:.12s}
  .opt-btn:nth-child(4){animation-delay:.16s}

  /* ── MOBILE RESPONSIVE TWEAKS ── */
  @media (max-width: 400px) {
    body { font-size: 15px; }
    .q-wrap { padding: 20px 16px 12px; }
    .opt-list { padding: 0 16px; }
    .tf-grid  { padding: 0 16px; }
    .fill-wrap{ padding: 0 16px; }
    .expl-box { margin: 12px 16px 0; }
    .next-btn { margin: 12px 16px 0; width: calc(100% - 32px); }
  }


  /* ── EMBED MODE (?embed=1) ──────────────────────────────────
     Activated when URL contains ?embed=1 or &embed=1
     Hides sidebar, removes desktop two-panel, compact header
  ─────────────────────────────────────────────────────────── */
  body.embed-mode {
    background: var(--bg) !important;
    font-size: 15.5px;
  }
  body.embed-mode .quiz-shell {
    max-width: 100% !important;
    width: 100% !important;
    margin: 0 !important;
    border-radius: 0 !important;
    box-shadow: none !important;
    flex-direction: column !important;
    min-height: unset !important;
  }
  body.embed-mode {
    overflow-x: hidden !important;
  }
  body.embed-mode .quiz-main {
    width: 100% !important;
    max-width: 100% !important;
  }
  body.embed-mode .q-wrap,
  body.embed-mode .opt-list,
  body.embed-mode .tf-grid,
  body.embed-mode .fill-wrap,

var Q=[{"type": "mcq", "q": "Which sentence contains a proper noun, a personal pronoun, and an action verb?", "options": ["The city was beautiful and calm.", "She visited Paris last spring.", "Everyone arrived on time.", "Running through the park is enjoyable."], "answer": 1, "explanation": "'Paris' is a proper noun (specific city), 'She' is a personal pronoun, and 'visited' is an action verb. This sentence contains all three elements."}, {"type": "mcq", "q": "Which sentence contains a linking verb and a predicative adjective?", "options": ["She played the piano beautifully.", "The music sounds peaceful.", "He wrote a long letter.", "They built a large house."], "answer": 1, "explanation": "'Sounds' is a linking verb connecting 'music' to the predicative adjective 'peaceful'. The other sentences use action verbs."}, {"type": "mcq", "q": "Identify the part of speech of 'however' in: 'He studied hard; however, he did not pass.'", "options": ["Coordinating conjunction", "Preposition", "Conjunctive adverb", "Subordinating conjunction"], "answer": 2, "explanation": "'However' is a conjunctive adverb — it connects two independent clauses and shows contrast. It requires a semicolon before it and a comma after."}, {"type": "mcq", "q": "Which sentence uses a reflexive pronoun for emphasis (intensive use)?", "options": ["She hurt herself on the door.", "The director herself reviewed every application.", "They enjoyed theirselves at the party.", "He did it hisself."], "answer": 1, "explanation": "'Herself' here adds emphasis — the director PERSONALLY reviewed. This is the intensive (emphatic) use. The other options are either correct reflexive use or non-standard forms."}, {"type": "mcq", "q": "Which sentence uses adjectives in the correct order?", "options": ["A Chinese ancient large gorgeous golden vase.", "A gorgeous large ancient golden Chinese vase.", "A large gorgeous golden ancient Chinese vase.", "A golden gorgeous large Chinese ancient vase."], "answer": 1, "explanation": "Correct adjective order: opinion (gorgeous) – size (large) – age (ancient) – colour (golden) – origin (Chinese). This is the standard sequence in English."}, {"type": "mcq", "q": "Which sentence uses both a preposition of time and a preposition of place correctly?", "options": ["She arrived in the café at noon.", "She arrived at the café in noon.", "She arrived at the café at noon.", "She arrived on the café at noon."], "answer": 2, "explanation": "'At' is correct for specific locations ('at the café') and specific times ('at noon'). 'In noon' and 'on the café' are both incorrect."}, {"type": "tf", "q": "In English, 'hard' and 'hardly' have the same meaning when used as adverbs.", "answer": false, "explanation": "False. 'Hard' (adverb) = with great effort: 'She worked hard.' 'Hardly' = almost not: 'She hardly worked.' These are nearly opposite in meaning! This is a common confusion."}, {"type": "mcq", "q": "Which sentence uses a subordinating conjunction and an adverb of frequency correctly?", "options": ["Whenever it rains, she carries usually an umbrella.", "Whenever it rains, she usually carries an umbrella.", "She usually carries an umbrella whenever rains.", "Usually whenever it rains she carries an umbrella."], "answer": 1, "explanation": "'Whenever' introduces the subordinate clause; 'usually' (adverb of frequency) correctly precedes the main verb 'carries'. The subordinate clause followed by a comma is also correct."}, {"type": "mcq", "q": "Which sentence contains an interjection, a collective noun, and a modal verb?", "options": ["Well, everyone arrived on time for the meeting.", "Wow! The team should celebrate this victory.", "Hmm, she runs every morning before work.", "The group finished their work quickly."], "answer": 1, "explanation": "'Wow' is an interjection, 'team' is a collective noun, and 'should' is a modal verb. Option A has 'everyone' (indefinite pronoun, not collective noun); option C has no modal; option D has no interjection."}, {"type": "mcq", "q": "Which sentence uses ALL parts of speech correctly?", "options": ["Neither the driver nor the passengers was prepared for the delay.", "Although the journey was extremely long, the passengers remained remarkably calm.", "Between you and I, the plan is not good in all.", "The team celebrated their victory, but everyone were exhausted."], "answer": 1, "explanation": "Option B is fully correct: 'Although' (subordinating conjunction), 'extremely' (adverb modifying adjective 'long'), 'remained' (linking verb), 'remarkably calm' (adverb + adjective). The other options contain agreement errors or wrong pronoun/preposition forms."}, {"type": "tf", "q": "Adverbs can only appear immediately after the verb they modify.", "answer": false, "explanation": "False. Adverbs are highly flexible in position: 'Quietly, she left the room' / 'She quietly left the room' / 'She left the room quietly'. All are correct. Some adverbs have preferred positions, but they are not restricted to immediately after the verb."}, {"type": "fill", "q": "The eight traditional parts of speech in English are: noun, pronoun, verb, adjective, adverb, preposition, conjunction, and ________.", "answer": "interjection", "hint": "The last one expresses emotion...", "explanation": "The eight traditional parts of speech are: noun, pronoun, verb, adjective, adverb, preposition, conjunction, and INTERJECTION. Every word in English belongs to one or more of these categories depending on how it functions in a sentence."}, {"type": "mcq", "q": "In which sentence does every word serve a different grammatical function?", "options": ["Run quickly.", "She always runs very quickly.", "The exhausted runner suddenly collapsed.", "Hurray! She ran."], "answer": 2, "explanation": "'The' (article/determiner), 'exhausted' (participial adjective), 'runner' (noun/subject), 'suddenly' (adverb of manner), 'collapsed' (intransitive action verb) — five words, five different grammatical functions."}, {"type": "mcq", "q": "Which sentence demonstrates incorrect use of multiple parts of speech?", "options": ["She spoke eloquently and with great passion.", "He was very tiredly after the long run.", "The committee, which met on Friday, reached a unanimous decision.", "Neither the students nor the teacher was informed."], "answer": 1, "explanation": "'Very tiredly' is incorrect — 'tired' is an adjective (predicative) and should follow 'was': 'He was very tired'. 'Tiredly' is an adverb and cannot be a subject complement after 'was'."}, {"type": "mcq", "q": "Identify the part of speech of 'that' in: 'The book that I recommended has been sold out.'", "options": ["Demonstrative pronoun", "Relative pronoun", "Demonstrative adjective", "Subordinating conjunction"], "answer": 1, "explanation": "'That' introduces a relative clause ('that I recommended') modifying 'the book' — it is a relative pronoun. Compare: 'That book is good' (demonstrative adjective) / 'I know that she left' (subordinating conjunction)."}, {"type": "mcq", "q": "Which sentence uses a gerund, an infinitive, and a participle correctly?", "options": ["Running is healthy, to walk is also good, and she runs daily.", "Swimming regularly, she hoped to improve, having trained for months.", "I enjoy reading, I want to write, and having published a book already.", "To succeed, working hard is essential; having failed once, she tried again."], "answer": 1, "explanation": "'Swimming regularly' = present participle (participial phrase), 'hoped to improve' = infinitive after verb, 'having trained' = perfect participle. All three non-finite verb forms are correctly used in context."}, {"type": "tf", "q": "The word 'well' can function as an adjective, adverb, and interjection depending on context.", "answer": true, "explanation": "True. 'Well' as adjective: 'She is well' (healthy). As adverb: 'She speaks well.' As interjection: 'Well, that's surprising.' Context determines the function. This is an excellent example of how the same word can belong to multiple parts of speech."}, {"type": "fill", "q": "An adjective formed from a verb's -ing or -ed form (e.g., 'a broken window', 'the running water') is called a ________ adjective.", "answer": "participial", "hint": "It participates in both verb and adjective functions...", "explanation": "A PARTICIPIAL adjective is derived from a verb's participle form: past participle (broken, exhausted, excited) or present participle (running, growing, terrifying). They describe nouns just like regular adjectives. Note: 'an exciting match' vs 'the excited crowd'."}, {"type": "mcq", "q": "Which analysis of parts of speech is CORRECT for the sentence: 'Remarkably, even the quietest members spoke confidently.'", "options": ["Remarkably = adjective; even = conjunction; quietest = adverb; confidently = adjective", "Remarkably = sentence adverb; even = focusing adverb; quietest = superlative adjective; confidently = adverb of manner", "Remarkably = noun; even = preposition; quietest = pronoun; confidently = noun", "Remarkably = conjunction; even = adjective; quietest = noun; confidently = verb"], "answer": 1, "explanation": "'Remarkably' = sentence adverb (commenting on the whole statement), 'even' = focusing adverb (adding emphasis/surprise), 'quietest' = superlative adjective, 'confidently' = adverb of manner. This is the correct grammatical analysis."}, {"type": "mcq", "q": "Which sentence demonstrates the most accurate and sophisticated command of all major parts of speech?", "options": ["Not only had the committee thoroughly reviewed the proposals, but it had also unanimously rejected several highly problematic ones.", "The committee, which reviewed all proposals thorough, rejected ones that were high problematic.", "Not only the committee reviewed thorough the proposals but also rejected them high problematically.", "The committee thorough reviewed the proposals, they also rejected the most problematic."], "answer": 0, "explanation": "Option A correctly uses: 'not only…but also' (correlative conjunctions with inversion), 'thoroughly/unanimously/highly' (precise adverbs), 'problematic' (adjective), 'it' (pronoun with clear reference), 'had reviewed/had rejected' (past perfect). All parts of speech are correctly deployed."}];

function selTF(v){

      '<div><div style="font-size:.82em;font-weight:700;color:#b45309">Badge Unlocked!</div>'+
      '<div style="font-size:.75em;color:#6b7280">'+n.split(' ').slice(1).join(' ')+'</div></div></div>';
  }).join('');

  var sc=document.getElementById('rs');
  sc.innerHTML=
    '<div class="res-trophy">'+trophy+'</div>'+
    '<div class="res-score">'+pct+'%</div>'+
    '<div class="res-msg">'+msg+' — '+cor+'/'+tot+' correct</div>'+
    bH+
    '<div class="res-stats">'+
      '<div class="res-stat-row"><span>Correct</span><span class="res-correct">✓ '+cor+'</span></div>'+
      '<div class="res-stat-row"><span>Incorrect</span><span class="res-wrong">✗ '+(tot-cor)+'</span></div>'+
      '<div class="res-stat-row"><span>Score</span><span class="res-mono">'+pct+'%</span></div>'+
      '<div class="res-stat-row"><span>Time</span><span class="res-mono">'+Math.floor(tt/60)+'m '+tt%60+'s</span></div>'+
    '</div>'+
    '<div class="res-actions">'+
      '<a class="res-primary" href="'+NEXT+'">Next Lesson →</a>'+
      '<button class="res-secondary" onclick="retryQuiz()">↺ Retry this quiz</button>'+
      '<a class="res-secondary" href="'+HUB+'">← Back to Module 1</a>'+
    '</div>';
  sc.classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryQuiz(){
  cur=0;cor=0;answered=false;st=Date.now();dotStates=[];
  document.getElementById('rs').classList.remove('show');
  document.getElementById('qa').style.display='';
  rQ();window.scrollTo({top:0,behavior:'smooth'});
}

// Init
updDots();
rQ();
</script>
