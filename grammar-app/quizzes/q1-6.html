<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Lesson 1.6 — Prepositions: Showing Relationship | Grammar Mastery</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap');
  :root{
    --bg:#e8f0fe;--white:#fff;--border:#c7d2fe;
    --text:#1e1b4b;--text-md:#374151;--text-sm:#6b7280;--text-xs:#9ca3af;
    --accent:#5b21b6;--accent-mid:#7c3aed;--accent-lt:#ede9fe;
    --ok:#059669;--ok-lt:#d1fae5;--ok-dk:#065f46;
    --no:#dc2626;--no-lt:#fee2e2;--no-dk:#7f1d1d;
    --radius:14px;
    --shadow:0 1px 4px rgba(0,0,0,0.08),0 1px 2px rgba(0,0,0,0.04);
    --shadow-md:0 4px 14px rgba(0,0,0,0.09);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:16px;}
  .app{max-width:540px;margin:0 auto;padding-bottom:40px;background:var(--bg);min-height:100vh;}

  /* HEADER */
  .qh{
    padding:14px 18px;display:flex;align-items:center;justify-content:space-between;
    background:var(--white);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50;
    box-shadow:0 2px 10px rgba(99,102,241,0.1);
  }
  .back{color:var(--accent-mid);font-size:0.87em;font-weight:700;background:none;border:none;
    cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;letter-spacing:-0.01em;}
  .qm{text-align:right;}
  .qc{font-size:0.78em;font-family:'JetBrains Mono',monospace;color:var(--accent-mid);font-weight:700;}
  .ql{font-size:0.68em;color:var(--text-xs);margin-top:2px;}
  .mt{background:var(--accent-lt);border:1.5px solid #c4b5fd;border-radius:10px;
    padding:7px 10px;font-size:1.1em;cursor:pointer;line-height:1;}

  /* PROGRESS */
  .qp{height:5px;background:#c7d2fe;}
  .qpf{height:100%;background:linear-gradient(90deg,#5b21b6,#7c3aed);
    transition:width .4s cubic-bezier(.4,0,.2,1);}

  /* QUESTION AREA */
  .qa{padding:24px 18px 16px;}
  .qtb{
    display:inline-flex;align-items:center;
    background:var(--accent-lt);border:1.5px solid #c4b5fd;
    border-radius:20px;padding:5px 15px;
    font-size:0.68em;font-weight:700;letter-spacing:0.07em;
    color:var(--accent);text-transform:uppercase;
    font-family:'JetBrains Mono',monospace;margin-bottom:14px;
  }
  .qt{font-size:1.1em;font-weight:700;line-height:1.55;color:var(--text);}

  /* OPTIONS */
  .ol{display:flex;flex-direction:column;gap:10px;padding:0 18px;}
  .ob{
    display:flex;align-items:center;gap:14px;
    background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:15px 16px;
    cursor:pointer;transition:all .15s;text-align:left;
    font-family:'Inter',sans-serif;width:100%;color:var(--text);
    box-shadow:var(--shadow);
  }
  .ob:hover{border-color:#a78bfa;background:#faf5ff;box-shadow:0 3px 12px rgba(124,58,237,0.13);}
  .ob:active{transform:scale(.98);}
  .ob:disabled{cursor:default;}
  .ok2{
    width:33px;height:33px;flex-shrink:0;border-radius:9px;
    background:var(--accent-lt);
    display:flex;align-items:center;justify-content:center;
    font-size:0.78em;font-weight:700;font-family:'JetBrains Mono',monospace;
    color:var(--accent);transition:all .15s;
  }
  .ot{font-size:0.95em;line-height:1.4;flex:1;font-weight:500;color:var(--text);}
  .oi{font-size:1.1em;opacity:0;transition:opacity .2s;}

  /* States */
  .ob.correct{border-color:var(--ok);background:var(--ok-lt);}
  .ob.correct .ok2{background:var(--ok);color:white;}
  .ob.correct .oi{opacity:1;}
  .ob.wrong{border-color:var(--no);background:var(--no-lt);}
  .ob.wrong .ok2{background:var(--no);color:white;}
  .ob.wrong .oi{opacity:1;}
  .ob.dimmed{opacity:.38;}

  /* TRUE/FALSE */
  .tfo{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 18px;}

  /* FILL IN BLANK */
  .fb{padding:0 18px;}
  .fi{
    width:100%;background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:14px 16px;
    font-family:'Inter',sans-serif;font-size:1em;color:var(--text);
    outline:none;transition:border-color .2s;box-shadow:var(--shadow);
  }
  .fi:focus{border-color:var(--accent-mid);box-shadow:0 0 0 3px rgba(124,58,237,0.1);}
  .fi.correct{border-color:var(--ok);background:var(--ok-lt);color:var(--ok-dk);}
  .fi.wrong{border-color:var(--no);background:var(--no-lt);color:var(--no-dk);}
  .hint{font-size:0.75em;color:var(--text-xs);margin-top:6px;padding-left:2px;}
  .fs{
    margin-top:10px;width:100%;
    background:linear-gradient(135deg,#5b21b6,#7c3aed);
    border:none;border-radius:var(--radius);padding:14px;
    font-family:'Inter',sans-serif;font-size:1em;font-weight:700;color:white;cursor:pointer;
    box-shadow:0 3px 10px rgba(91,33,182,0.28);
  }
  .fs:disabled{opacity:.5;cursor:default;}

  /* EXPLANATION */
  .eb{
    margin:14px 18px 0;background:var(--white);
    border:1px solid var(--border);border-left:4px solid var(--accent-mid);
    border-radius:var(--radius);padding:14px 16px;
    font-size:0.88em;line-height:1.7;color:var(--text-md);
    display:none;box-shadow:var(--shadow);
  }
  .eb.show{display:block;animation:fadeIn .3s ease;}
  .el{font-size:0.72em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;
    font-family:'JetBrains Mono',monospace;margin-bottom:5px;}
  .el.correct{color:var(--ok);}
  .el.wrong{color:var(--no);}

  /* NEXT BUTTON */
  .nb2{
    display:none;margin:14px 18px 0;width:calc(100% - 36px);
    background:linear-gradient(135deg,#5b21b6,#7c3aed);
    border:none;border-radius:var(--radius);
    padding:15px;font-family:'Inter',sans-serif;font-size:1em;
    font-weight:700;color:white;cursor:pointer;
    box-shadow:0 3px 10px rgba(91,33,182,0.28);
  }
  .nb2.show{display:block;animation:fadeUp .3s ease;}
  .nb2:active{transform:scale(.98);}

  /* RESULTS */
  .rs{display:none;padding:30px 18px;flex-direction:column;align-items:center;}
  .rs.show{display:flex;animation:fadeUp .5s ease;}
  .rtr{font-size:4em;margin-bottom:10px;animation:bounce .6s ease;}
  .rsb{
    font-size:3.5em;font-weight:800;font-family:'JetBrains Mono',monospace;
    background:linear-gradient(135deg,#5b21b6,#2563eb);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;
  }
  .rl{font-size:0.9em;color:var(--text-sm);margin-bottom:24px;font-weight:500;}
  .rbd{
    width:100%;background:var(--white);border:1px solid var(--border);
    border-radius:var(--radius);padding:16px;margin-bottom:20px;
    box-shadow:var(--shadow);
  }
  .bdr{display:flex;justify-content:space-between;align-items:center;
    padding:8px 0;border-bottom:1px solid #f3f4f6;font-size:0.88em;color:var(--text-md);}
  .bdr:last-child{border-bottom:none;}
  .bdc{color:var(--ok);font-weight:700;font-family:'JetBrains Mono',monospace;}
  .bdw{color:var(--no);font-weight:700;font-family:'JetBrains Mono',monospace;}
  .nbp{background:#fffbeb;border:1.5px solid #fde68a;border-radius:12px;
    padding:12px 16px;width:100%;display:flex;align-items:center;gap:12px;margin-bottom:14px;
    box-shadow:var(--shadow);}
  .rbs{display:flex;flex-direction:column;gap:10px;width:100%;}
  .bp{
    background:linear-gradient(135deg,#5b21b6,#7c3aed);border:none;
    border-radius:var(--radius);padding:15px;
    font-family:'Inter',sans-serif;font-size:1em;font-weight:700;
    color:white;cursor:pointer;text-align:center;text-decoration:none;display:block;
    box-shadow:0 3px 10px rgba(91,33,182,0.28);
  }
  .bs{
    background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:14px;
    font-family:'Inter',sans-serif;font-size:0.92em;font-weight:600;
    color:var(--text-sm);cursor:pointer;text-align:center;
    text-decoration:none;display:block;box-shadow:var(--shadow);
  }

  .qcard{animation:fadeUp .3s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fadeIn{from{opacity:0}to{opacity:1}}
  @keyframes bounce{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .shake{animation:shake .3s ease;}

  /* MOBILE RESPONSIVE */
  @media(max-width:420px){
    body{font-size:17px;}
    .qt{font-size:1.05em;}
    .ob{padding:16px;}
    .ot{font-size:0.97em;}
  }
</style>
</head>

</div>

<script>
var Q=[{"type": "mcq", "q": "Which of the following is a preposition?", "options": ["Quickly", "Beautiful", "Beneath", "Run"], "answer": 2, "explanation": "Prepositions show the relationship between a noun/pronoun and other elements. 'Beneath' is a preposition of place. 'Quickly' is an adverb, 'beautiful' is an adjective, 'run' is a verb."}, {"type": "mcq", "q": "Which sentence uses a preposition of time correctly?", "options": ["She wakes up in six o'clock.", "She wakes up on six o'clock.", "She wakes up at six o'clock.", "She wakes up by six o'clock every morning."], "answer": 2, "explanation": "'At' is used for specific times (at 6 o'clock, at noon). 'In' is used for months, years, seasons. 'On' is used for days and dates. Option D with 'by' means 'no later than six' — also correct but changes meaning."}, {"type": "mcq", "q": "Which sentence uses a preposition of place correctly?", "options": ["We will meet in the station platform.", "We will meet on the station.", "We will meet at the station.", "We will meet by inside the station."], "answer": 2, "explanation": "'At' is used for specific locations and meeting points (at the station, at the corner, at the airport). 'In' is for enclosed spaces. 'On' is for surfaces."}, {"type": "mcq", "q": "Choose the correct preposition: 'She has been working here ___ 2019.'", "options": ["for", "from", "since", "during"], "answer": 2, "explanation": "'Since' marks a specific start point of an ongoing action: 'since 2019'. 'For' marks duration: 'for five years'. 'From' needs a corresponding 'to/until'. 'During' is used with a period, not a specific year alone."}, {"type": "mcq", "q": "Which sentence uses a prepositional phrase as an adjective?", "options": ["He walked through the park slowly.", "She arrived before noon.", "The woman in the red coat is my aunt.", "They sat beside the river."], "answer": 2, "explanation": "'In the red coat' is a prepositional phrase modifying the noun 'woman' (telling us which woman). In the other sentences, the prepositional phrases modify verbs (acting as adverbs of manner, time, or place)."}, {"type": "tf", "q": "In formal English, ending a sentence with a preposition is always a grammatical error.", "answer": false, "explanation": "False. Ending a sentence with a preposition is entirely acceptable in modern English, even formally. Winston Churchill's famous (possibly apocryphal) quote: 'This is something up with which I will not put' mocks the awkwardness of forced preposition avoidance."}, {"type": "mcq", "q": "Which sentence contains a compound preposition?", "options": ["The cat sat on the mat.", "She arrived at midnight.", "He stood in front of the door.", "They passed by the old church."], "answer": 2, "explanation": "'In front of' is a compound preposition (multiple words functioning as one preposition). Other compound prepositions: because of, instead of, on behalf of, in addition to, in spite of."}, {"type": "mcq", "q": "Identify the error: 'She is good in mathematics.'", "options": ["'She' should be 'Her'", "'Is' should be 'are'", "'In' should be 'at' — 'good at' is the correct collocation", "No error"], "answer": 2, "explanation": "The correct collocation is 'good AT' a subject or skill: 'good at mathematics', 'good at sport', 'good at cooking'. 'Good in' is a very common learner error."}, {"type": "mcq", "q": "Which sentence correctly uses 'between' and 'among'?", "options": ["The argument was among the two brothers.", "The prize was shared between the five winners.", "The prize was shared among the five winners.", "The secret was among just the two of them."], "answer": 2, "explanation": "'Between' is used with two, 'among' with three or more. 'Among five winners' is correct. However, 'between' can also be used for more than two when each is considered individually (e.g., 'a treaty between four countries')."}, {"type": "fill", "q": "The preposition used before specific times of day (like 'noon', 'midnight', '3 o'clock') is ________.", "answer": "at", "hint": "AT what time...", "explanation": "'AT' is used with specific clock times and certain times of day: at 3 o'clock, at noon, at midnight, at dawn, at dusk, at the weekend (British English). Compare: 'in the morning/afternoon/evening' (parts of day) and 'on Monday' (days)."}, {"type": "mcq", "q": "Which sentence uses the correct preposition with the adjective?", "options": ["She is afraid from spiders.", "He is interested on history.", "They are fond of classical music.", "We are tired from doing the same thing."], "answer": 2, "explanation": "'Fond of' is the correct collocation. 'Afraid OF', 'interested IN', 'tired OF' are the correct prepositions. Preposition collocations with adjectives must be learned — they often don't follow logical patterns."}, {"type": "mcq", "q": "Which sentence uses 'in' and 'on' correctly with time expressions?", "options": ["I was born on 1995.", "The meeting is in Monday.", "She graduated in June on 2019.", "The conference is on Monday, 15 March, in spring."], "answer": 3, "explanation": "'On' is used for days and dates ('on Monday', 'on 15 March'); 'in' is used for months, years, and seasons ('in spring'). 'On 1995' and 'in Monday' are errors. 'On Monday, 15 March, in spring' correctly uses both."}, {"type": "tf", "q": "'During' and 'for' can always be used interchangeably in time expressions.", "answer": false, "explanation": "False. 'During' refers to a specific time period and emphasises WHEN: 'during the war'. 'For' measures the DURATION of time: 'for five years'. 'I slept during the lecture' (WHEN) vs 'I slept for two hours' (HOW LONG). They are not interchangeable."}, {"type": "mcq", "q": "Which sentence uses a preposition of movement correctly?", "options": ["She walked until the park.", "He ran across the road.", "They swam along of the river.", "We drove until the city."], "answer": 1, "explanation": "'Across' correctly shows movement from one side to the other. 'Until' expresses time, not movement — 'towards the park' or 'to the park' is correct. 'Along of' is not a standard preposition."}, {"type": "mcq", "q": "Which sentence is a correct example of a phrasal verb used with the right preposition?", "options": ["She looked up into the word in the dictionary.", "He gave up on trying to solve the problem.", "They carried out in the experiment successfully.", "We came across to an interesting article."], "answer": 1, "explanation": "'Gave up on trying' is correct — 'give up on' means to stop trying with something/someone. 'Look up' doesn't need 'into'. 'Carry out' doesn't need 'in'. 'Come across' doesn't need 'to'."}, {"type": "mcq", "q": "Choose the correct prepositions: 'She was praised ___ her work ___ the whole team.'", "options": ["She was praised of her work before the whole team.", "She was praised for her work in front of the whole team.", "She was praised by her work in front of the whole team.", "She was praised about her work among the whole team."], "answer": 1, "explanation": "'Praised for' (reason for praise) + 'in front of' (compound preposition meaning 'before/in the presence of') = 'praised for her work in front of the whole team'. 'Praised by' introduces the agent (person who praised), not the reason."}, {"type": "fill", "q": "The preposition used to show something is touching and supported by a surface (e.g., 'the book ___ the table') is ________.", "answer": "on", "hint": "The book is resting on...", "explanation": "'ON' indicates contact with and support by a surface: 'on the table', 'on the floor', 'on the wall', 'on the ceiling'. Compare: 'in the drawer' (inside), 'above the table' (higher than, not touching), 'under the table' (below)."}, {"type": "mcq", "q": "Which sentence shows the most precise use of multiple prepositions?", "options": ["She walked to the park with her dog in the morning on a Monday.", "She walked to the park with her dog at dawn on a quiet Monday in March.", "She walked in the park by her dog during the morning at a Monday.", "She walked at the park with her dog in Monday morning."], "answer": 1, "explanation": "'To the park' (destination), 'with her dog' (accompaniment), 'at dawn' (specific time), 'on a quiet Monday' (day), 'in March' (month) — all prepositions are correctly and precisely deployed. Option C uses 'by' incorrectly and 'at a Monday'. Option D uses 'at the park' and 'in Monday' incorrectly."}, {"type": "mcq", "q": "Identify all preposition errors in: 'She arrived to London in a Friday during two days ago.'", "options": ["Only 'to London' is wrong — should be 'in London' or 'arrived at London'", "'To London', 'in a Friday', and 'during two days ago' are all wrong", "Only 'during two days ago' is wrong", "'In a Friday' and 'during' are wrong, but 'arrived to London' is acceptable"], "answer": 1, "explanation": "Three errors: (1) 'arrived in/at London' not 'arrived to'; (2) 'on a Friday' not 'in a Friday'; (3) 'two days ago' does not take 'during' — 'two days ago' is a complete time expression needing no preposition."}, {"type": "mcq", "q": "Which sentence demonstrates the most sophisticated use of prepositional phrases?", "options": ["The report, submitted on behalf of the committee and in lieu of the annual audit, was reviewed by all stakeholders within the allocated timeframe.", "The report was done for the committee instead of the audit and looked at by people in the time given.", "The report, which was about the committee, was done instead of the audit within the time.", "The report on behalf the committee in lieu to the audit was reviewed by all the stakeholders."], "answer": 0, "explanation": "Option A uses: 'on behalf of' (correct compound preposition), 'in lieu of' (formal compound preposition meaning 'instead of'), 'by all stakeholders' (correct passive agent preposition), 'within the allocated timeframe' (precise time preposition). All prepositions are grammatically accurate and contextually precise."}];
var SKEY="m1_l6";
var NEXT="q1-7.html";
var HUB="../modules/module1.html";
var cur=0,cor=0,answered=false,st=Date.now(),ac=null;

function gAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function gD(){try{return JSON.parse(localStorage.getItem('grammar_app')||'{}');}catch(e){return{};}}
function sD(d){try{localStorage.setItem('grammar_app',JSON.stringify(d));}catch(e){}}

function tM(){
  var d=gD();d.muted=!d.muted;sD(d);
  document.getElementById('mb').textContent=d.muted?'🔇':'🔊';
}

function pT(t){
  var d=gD();if(d.muted)return;
  try{var c=gAC();if(c.state==='suspended')c.resume();
    if(t==='c')pC(c);else if(t==='w')pW(c);else pF(c);}catch(e){}
}
function pC(c){[[523,0],[659,.1],[784,.2]].forEach(function(a){
  var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);});}
function pW(c){[[240,0],[200,.1]].forEach(function(a){
  var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.frequency.value=a[0];o.type='sawtooth';var t=c.currentTime+a[1];
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.08,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}
function pF(c){[[523,0],[659,.15],[784,.3],[1047,.45]].forEach(function(a){
  var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.03);
  g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);});}

function rQ(){
  var q=Q[cur];answered=false;
  document.getElementById('pf').style.width=(cur/Q.length*100)+'%';
  document.getElementById('qc').textContent='Q '+(cur+1)+' of '+Q.length;
  var area=document.getElementById('qa');
  var labels={mcq:'Multiple Choice',tf:'True or False',fill:'Fill in the Blank',transform:'Sentence Transformation'};
  var lbl=labels[q.type]||'Question';
  var oh='';
  if(q.type==='mcq'){
    oh='<div class="ol">'+q.options.map(function(opt,i){
      return '<button class="ob" onclick="selOpt('+i+')" data-i="'+i+'">'+
        '<div class="ok2">'+String.fromCharCode(65+i)+'</div>'+
        '<div class="ot">'+opt+'</div>'+
        '<div class="oi">'+(i===q.answer?'✓':'✗')+'</div></button>';
    }).join('')+'</div>';
  } else if(q.type==='tf'){
    oh='<div class="tfo">'+
      '<button class="ob" onclick="selTF(true)" data-v="true">'+
        '<div class="ok2">T</div><div class="ot">True</div>'+
        '<div class="oi">'+(q.answer?'✓':'✗')+'</div></button>'+
      '<button class="ob" onclick="selTF(false)" data-v="false">'+
        '<div class="ok2">F</div><div class="ot">False</div>'+
        '<div class="oi">'+(!q.answer?'✓':'✗')+'</div></button>'+
    '</div>';
  } else {
    var ph=q.type==='transform'?'Rewrite the sentence...':'Type your answer...';
    oh='<div class="fb">'+
      '<input class="fi" id="fi" type="text" placeholder="'+ph+'" '+
        'autocomplete="off" autocapitalize="none" spellcheck="false" '+
        'onkeydown="if(event.keyCode===13)subFill()">'+
      (q.hint?'<div class="hint">💡 Hint: '+q.hint+'</div>':'')+
      '<button class="fs" id="fsb" onclick="subFill()">Check Answer</button>'+
    '</div>';
  }
  area.innerHTML='<div class="qcard">'+
    '<div class="qa"><div class="qtb">'+lbl+'</div><div class="qt">'+q.q+'</div></div>'+
    oh+
    '<div class="eb" id="eb"></div>'+
    '<button class="nb2" id="nb" onclick="nextQ()">'+
      (cur+1<Q.length?'Next Question →':'See Results 🎯')+
    '</button></div>';
  if(q.type==='fill'||q.type==='transform'){
    setTimeout(function(){var e=document.getElementById('fi');if(e)e.focus();},150);
  }
  var d=gD();document.getElementById('mb').textContent=d.muted?'🔇':'🔊';
}

function selOpt(i){
  if(answered)return;answered=true;
  var q=Q[cur];var ok=i===q.answer;if(ok)cor++;pT(ok?'c':'w');
  document.querySelectorAll('.ob').forEach(function(b,j){
    if(j===q.answer)b.classList.add('correct');
    else if(j===i&&!ok){b.classList.add('wrong');b.classList.add('shake');}
    else b.classList.add('dimmed');
    b.disabled=true;
  });
  showExpl(ok,q.explanation);
  document.getElementById('nb').classList.add('show');
}

function selTF(v){
  if(answered)return;answered=true;
  var q=Q[cur];var ok=v===q.answer;if(ok)cor++;pT(ok?'c':'w');
  document.querySelectorAll('.ob').forEach(function(b){
    var bv=b.dataset.v==='true';
    if(bv===q.answer)b.classList.add('correct');
    else if(bv===v&&!ok)b.classList.add('wrong');
    else b.classList.add('dimmed');
    b.disabled=true;
  });
  showExpl(ok,q.explanation);
  document.getElementById('nb').classList.add('show');
}

function subFill(){
  if(answered)return;
  var inp=document.getElementById('fi');
  if(!inp||!inp.value.trim())return;
  answered=true;
  var q=Q[cur];var v=inp.value.trim().toLowerCase();
  var ans=(q.answer||'').toLowerCase().split('|');
  var ok=ans.some(function(a){return v===a.trim();});
  if(ok)cor++;pT(ok?'c':'w');
  inp.classList.add(ok?'correct':'wrong');
  inp.disabled=true;document.getElementById('fsb').disabled=true;
  if(!ok){
    var cd=document.createElement('div');
    cd.style.cssText='font-size:.82em;color:#059669;margin-top:7px;font-weight:600;';
    cd.textContent='✓ Answer: '+q.answer;
    inp.parentNode.insertBefore(cd,document.getElementById('fsb'));
    inp.classList.add('shake');
  }
  showExpl(ok,q.explanation);
  document.getElementById('nb').classList.add('show');
}

function showExpl(ok,text){
  var b=document.getElementById('eb');
  b.innerHTML='<div class="el '+(ok?'correct':'wrong')+'">'+(ok?'✓ Correct!':'✗ Incorrect')+'</div><div>'+text+'</div>';
  b.classList.add('show');
  setTimeout(function(){b.scrollIntoView({behavior:'smooth',block:'nearest'});},120);
}

function nextQ(){
  cur++;
  if(cur>=Q.length)showResults();
  else{rQ();window.scrollTo({top:0,behavior:'smooth'});}
}

function showResults(){
  pT('complete');
  document.getElementById('pf').style.width='100%';
  document.getElementById('qa').style.display='none';
  document.getElementById('qc').textContent='Complete!';
  var tot=Q.length,pct=Math.round(cor/tot*100),tt=Math.round((Date.now()-st)/1000);
  var d=gD();if(!d.progress)d.progress={};
  var prev=d.progress[SKEY];var isFirst=prev===undefined;var isImproved=!isFirst&&pct>prev;
  d.progress[SKEY]=Math.max(pct,prev||0);
  if(!d.badges)d.badges=[];var newBadges=[];
  if(isFirst&&!d.badges.includes('first_quiz')){d.badges.push('first_quiz');newBadges.push('⭐ First Step');}
  if(pct===100&&!d.badges.includes('perfect_score')){d.badges.push('perfect_score');newBadges.push('💯 Perfect Score!');}
  if(isImproved&&!d.badges.includes('comeback')){d.badges.push('comeback');newBadges.push('💪 Comeback!');}
  if(tt<120&&!d.badges.includes('speed_demon')){d.badges.push('speed_demon');newBadges.push('⚡ Speed Run!');}
  sD(d);
  var trophy=pct>=90?'🏆':pct>=70?'🥇':pct>=50?'🥈':'📚';
  var msg=pct>=90?'Outstanding!':pct>=70?'Great work!':pct>=50?'Good effort!':'Keep practising!';
  var badgeHTML=newBadges.map(function(n){
    return '<div class="nbp"><span style="font-size:1.8em">'+n.split(' ')[0]+'</span>'+
      '<div><div style="font-size:.82em;font-weight:700;color:#b45309">Badge Unlocked!</div>'+
      '<div style="font-size:.75em;color:#6b7280">'+n.split(' ').slice(1).join(' ')+'</div></div></div>';
  }).join('');
  var sc=document.getElementById('rs');
  sc.innerHTML=
    '<div class="rtr">'+trophy+'</div>'+
    '<div class="rsb">'+pct+'%</div>'+
    '<div class="rl">'+msg+' — '+cor+'/'+tot+' correct</div>'+
    badgeHTML+
    '<div class="rbd">'+
      '<div class="bdr"><span>Correct</span><span class="bdc">✓ '+cor+'</span></div>'+
      '<div class="bdr"><span>Incorrect</span><span class="bdw">✗ '+(tot-cor)+'</span></div>'+
      '<div class="bdr"><span>Score</span><span style="font-weight:700;font-family:JetBrains Mono,monospace">'+pct+'%</span></div>'+
      '<div class="bdr"><span>Time</span><span style="font-family:JetBrains Mono,monospace;color:#6b7280">'+Math.floor(tt/60)+'m '+tt%60+'s</span></div>'+
    '</div>'+
    '<div class="rbs">'+
      '<a class="bp" href="'+NEXT+'">Next Lesson →</a>'+
      '<button class="bs" onclick="retryQuiz()">↺ Retry this quiz</button>'+
      '<a class="bs" href="'+HUB+'">← Back to Module 1</a>'+
    '</div>';
  sc.classList.add('show');window.scrollTo({top:0,behavior:'smooth'});
}

function retryQuiz(){
  cur=0;cor=0;answered=false;st=Date.now();
  document.getElementById('rs').classList.remove('show');
  document.getElementById('qa').style.display='';
  rQ();window.scrollTo({top:0,behavior:'smooth'});
}

var d0=gD();
document.getElementById('mb').textContent=d0.muted?'🔇':'🔊';
rQ();
</script>
</body>
</html>
