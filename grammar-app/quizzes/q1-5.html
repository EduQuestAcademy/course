<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600&display=swap');
  :root{
    --bg:#e8f0fe;--white:#ffffff;--border:#d1d5db;
    --text:#111827;--text-md:#374151;--text-sm:#6b7280;--text-xs:#9ca3af;
    --accent:#5b21b6;--accent-lt:#ede9fe;--accent-mid:#7c3aed;
    --ok:#059669;--ok-lt:#d1fae5;--ok-dk:#065f46;
    --no:#dc2626;--no-lt:#fee2e2;--no-dk:#7f1d1d;
    --gold:#b45309;--radius:14px;
    --shadow:0 1px 4px rgba(0,0,0,0.08),0 1px 2px rgba(0,0,0,0.04);
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html{scroll-behavior:smooth;}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;}
  .app{max-width:480px;margin:0 auto;padding-bottom:40px;background:var(--bg);min-height:100vh;}
  .qh{
    padding:14px 16px;display:flex;align-items:center;justify-content:space-between;
    background:var(--white);border-bottom:1px solid var(--border);
    position:sticky;top:0;z-index:50;
    box-shadow:0 2px 8px rgba(0,0,0,0.07);
  }
  .back{color:var(--accent-mid);font-size:0.83em;font-weight:700;background:none;border:none;cursor:pointer;font-family:'Inter',sans-serif;text-decoration:none;}
  .qm{text-align:right;}
  .qc{font-size:0.72em;font-family:'JetBrains Mono',monospace;color:var(--accent-mid);font-weight:700;}
  .ql{font-size:0.62em;color:var(--text-xs);margin-top:1px;}
  .mt{background:#f3f4f6;border:1px solid var(--border);border-radius:9px;padding:7px 9px;font-size:1em;cursor:pointer;}
  .qp{height:5px;background:#c7d2fe;}
  .qpf{height:100%;background:linear-gradient(90deg,#5b21b6,#2563eb);transition:width .4s cubic-bezier(.4,0,.2,1);}
  .qa{padding:22px 16px 14px;}
  .qtb{
    display:inline-flex;align-items:center;
    background:var(--accent-lt);border:1.5px solid #c4b5fd;
    border-radius:20px;padding:5px 14px;
    font-size:0.62em;font-weight:700;letter-spacing:0.06em;
    color:var(--accent);text-transform:uppercase;
    font-family:'JetBrains Mono',monospace;margin-bottom:13px;
  }
  .qt{font-size:1.05em;font-weight:700;line-height:1.55;color:var(--text);}
  .ol{display:flex;flex-direction:column;gap:9px;padding:0 16px;}
  .ob{
    display:flex;align-items:center;gap:13px;
    background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:14px 15px;
    cursor:pointer;transition:all .15s;text-align:left;
    font-family:'Inter',sans-serif;width:100%;color:var(--text);
    box-shadow:var(--shadow);
  }
  .ob:hover{border-color:#a78bfa;background:#faf5ff;box-shadow:0 3px 10px rgba(124,58,237,0.12);}
  .ob:active{transform:scale(.98);}
  .ob:disabled{cursor:default;}
  .ok2{
    width:31px;height:31px;flex-shrink:0;border-radius:9px;
    background:var(--accent-lt);
    display:flex;align-items:center;justify-content:center;
    font-size:0.73em;font-weight:700;font-family:'JetBrains Mono',monospace;
    color:var(--accent);transition:all .15s;
  }
  .ot{font-size:0.9em;line-height:1.4;flex:1;font-weight:500;color:var(--text);}
  .oi{font-size:1em;opacity:0;transition:opacity .2s;}
  .ob.correct{border-color:var(--ok);background:var(--ok-lt);}
  .ob.correct .ok2{background:var(--ok);color:white;}
  .ob.correct .oi{opacity:1;}
  .ob.wrong{border-color:var(--no);background:var(--no-lt);}
  .ob.wrong .ok2{background:var(--no);color:white;}
  .ob.wrong .oi{opacity:1;}
  .ob.dimmed{opacity:.38;}
  .fb{padding:0 16px;}
  .fi{
    width:100%;background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:13px 15px;
    font-family:'Inter',sans-serif;font-size:0.95em;color:var(--text);
    outline:none;transition:border-color .2s;box-shadow:var(--shadow);
  }
  .fi:focus{border-color:var(--accent-mid);box-shadow:0 0 0 3px rgba(124,58,237,0.1);}
  .fi.correct{border-color:var(--ok);background:var(--ok-lt);color:var(--ok-dk);}
  .fi.wrong{border-color:var(--no);background:var(--no-lt);color:var(--no-dk);}
  .fs{
    margin-top:9px;width:100%;
    background:linear-gradient(135deg,#5b21b6,#7c3aed);
    border:none;border-radius:var(--radius);padding:13px;
    font-family:'Inter',sans-serif;font-size:0.9em;font-weight:700;color:white;cursor:pointer;
    box-shadow:0 3px 10px rgba(91,33,182,0.3);
  }
  .fs:disabled{opacity:.5;cursor:default;}
  .tfo{display:grid;grid-template-columns:1fr 1fr;gap:9px;padding:0 16px;}
  .eb{
    margin:13px 16px 0;background:var(--white);border:1px solid var(--border);
    border-left:4px solid var(--accent-mid);
    border-radius:var(--radius);padding:13px 15px;
    font-size:0.83em;line-height:1.65;color:var(--text-md);
    display:none;box-shadow:var(--shadow);
  }
  .eb.show{display:block;animation:fi2 .3s ease;}
  .el{font-size:0.7em;font-weight:700;letter-spacing:.08em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:5px;}
  .el.correct{color:var(--ok);}
  .el.wrong{color:var(--no);}
  .nb2{
    display:none;margin:13px 16px 0;width:calc(100% - 32px);
    background:linear-gradient(135deg,#5b21b6,#7c3aed);
    border:none;border-radius:var(--radius);
    padding:14px;font-family:'Inter',sans-serif;font-size:0.95em;
    font-weight:700;color:white;cursor:pointer;
    box-shadow:0 3px 10px rgba(91,33,182,0.3);
  }
  .nb2.show{display:block;animation:fu .3s ease;}
  .nb2:active{transform:scale(.98);}
  .rs{display:none;padding:28px 16px;flex-direction:column;align-items:center;}
  .rs.show{display:flex;animation:fu .5s ease;}
  .rtr{font-size:3.8em;margin-bottom:8px;animation:bn .6s ease;}
  .rsb{
    font-size:3.2em;font-weight:800;font-family:'JetBrains Mono',monospace;
    background:linear-gradient(135deg,#5b21b6,#2563eb);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:4px;
  }
  .rl{font-size:0.88em;color:var(--text-sm);margin-bottom:22px;font-weight:500;}
  .rbd{
    width:100%;background:var(--white);border:1px solid var(--border);
    border-radius:var(--radius);padding:14px;margin-bottom:18px;box-shadow:var(--shadow);
  }
  .bdr{display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:1px solid #f3f4f6;font-size:0.83em;color:var(--text-md);}
  .bdr:last-child{border-bottom:none;}
  .bdc{color:var(--ok);font-weight:700;font-family:'JetBrains Mono',monospace;}
  .bdw{color:var(--no);font-weight:700;font-family:'JetBrains Mono',monospace;}
  .nbp{background:#fffbeb;border:1px solid #fde68a;border-radius:12px;padding:12px 15px;width:100%;display:flex;align-items:center;gap:11px;margin-bottom:14px;box-shadow:var(--shadow);}
  .rbs{display:flex;flex-direction:column;gap:9px;width:100%;}
  .bp{
    background:linear-gradient(135deg,#5b21b6,#7c3aed);border:none;border-radius:var(--radius);
    padding:14px;font-family:'Inter',sans-serif;font-size:0.95em;font-weight:700;
    color:white;cursor:pointer;text-align:center;text-decoration:none;display:block;
    box-shadow:0 3px 10px rgba(91,33,182,0.3);
  }
  .bs{
    background:var(--white);border:1.5px solid var(--border);
    border-radius:var(--radius);padding:13px;
    font-family:'Inter',sans-serif;font-size:0.88em;font-weight:600;
    color:var(--text-sm);cursor:pointer;text-align:center;text-decoration:none;display:block;
    box-shadow:var(--shadow);
  }
  .qcard{animation:fu .3s ease;}
  @keyframes fu{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
  @keyframes fi2{from{opacity:0}to{opacity:1}}
  @keyframes bn{0%,100%{transform:scale(1)}50%{transform:scale(1.15)}}
  @keyframes sk{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .shake{animation:sk .3s ease;}
</style>

<script>
var Q=[
{
"type": "mcq",
"q": "Which of the following is an adverb?",
"options": [
"Careful",
"Care",
"Carefully",
"Caring"
],
"answer": 2,
"explanation": "'Carefully' is an adverb of manner — it describes how an action is performed. 'Careful' is an adjective, 'care' is a noun, and 'caring' can be a verb or adjective."
},
{
"type": "mcq",
"q": "What type of adverb is used in: 'She will call you tomorrow.'?",
"options": [
"Adverb of manner",
"Adverb of place",
"Adverb of frequency",
"Adverb of time"
],
"answer": 3,
"explanation": "'Tomorrow' tells when the action will happen — it's an adverb of time. Manner = how, place = where, frequency = how often, time = when."
},
{
"type": "mcq",
"q": "Which sentence places the adverb of frequency correctly?",
"options": [
"Always she arrives early.",
"She always arrives early.",
"She arrives always early.",
"She arrives early always."
],
"answer": 1,
"explanation": "Adverbs of frequency (always, usually, often, sometimes, rarely, never) come before the main verb but after auxiliary verbs and 'to be'. 'She always arrives early' is correct."
},
{
"type": "mcq",
"q": "In which sentence does the adverb modify an adjective?",
"options": [
"He ran quickly to catch the bus.",
"She speaks very softly.",
"The exam was extremely difficult.",
"They arrived late to the meeting."
],
"answer": 2,
"explanation": "'Extremely' modifies the adjective 'difficult'. In the other sentences: 'quickly' modifies 'ran' (verb), 'softly' modifies 'speaks' (verb), 'late' modifies 'arrived' (verb)."
},
{
"type": "mcq",
"q": "Which sentence uses a conjunctive adverb correctly?",
"options": [
"He was tired, however he continued working.",
"He was tired; however, he continued working.",
"He was tired however, he continued working.",
"He was tired however he continued working."
],
"answer": 1,
"explanation": "Conjunctive adverbs connecting two independent clauses need a semicolon before and a comma after: 'tired; however, he'. A comma alone creates a comma splice error."
},
{
"type": "tf",
"q": "The word 'hard' can function as both an adjective and an adverb.",
"answer": true,
"explanation": "True. 'A hard question' (adjective) and 'She worked hard' (adverb). Note: 'hardly' means 'almost not' — a very different meaning. 'She worked hardly' would mean she barely worked at all!"
},
{
"type": "mcq",
"q": "Which sentence contains an adverb modifying another adverb?",
"options": [
"The dog barked loudly at the stranger.",
"She finished the task quite quickly.",
"He is an extremely talented painter.",
"They moved slowly down the road."
],
"answer": 1,
"explanation": "'Quite' (adverb of degree) modifies 'quickly' (adverb of manner). In option C, 'extremely' modifies the adjective 'talented', not another adverb."
},
{
"type": "mcq",
"q": "Identify the error in: 'He drives more careful than his brother.'",
"options": [
"'Drives' should be 'is driving'",
"'More careful' should be 'more carefully' — an adverb is needed to modify the verb",
"'His brother' should be 'him'",
"No error"
],
"answer": 1,
"explanation": "To modify the verb 'drives', an adverb is needed: 'more carefully'. 'Careful' is an adjective and cannot modify a verb directly. Adjective/adverb confusion is a common error."
},
{
"type": "mcq",
"q": "Which sentence demonstrates correct adverb placement?",
"options": [
"She is enough tall to reach the shelf.",
"She is tall enough to reach the shelf.",
"She is tall too to reach the shelf.",
"She is very enough tall to reach the shelf."
],
"answer": 1,
"explanation": "'Enough' follows the adjective it modifies: 'tall enough'. 'Too' and 'very' precede adjectives. 'She is too tall', 'She is very tall', 'She is tall enough' — these are the correct patterns."
},
{
"type": "fill",
"q": "An adverb that expresses how often something happens (e.g., always, never, sometimes) is called an adverb of ________.",
"answer": "frequency",
"hint": "How often does it happen?",
"explanation": "Adverbs of FREQUENCY tell us how often an action occurs: always, usually, often, sometimes, rarely, never. They typically come before the main verb but after 'to be' and auxiliary verbs."
},
{
"type": "mcq",
"q": "Which word is NOT an adverb?",
"options": [
"Quite",
"Although",
"Very",
"Never"
],
"answer": 1,
"explanation": "'Although' is a subordinating conjunction, not an adverb. 'Quite', 'very', and 'never' are all adverbs. 'Although' introduces a subordinate clause of concession."
},
{
"type": "mcq",
"q": "Which sentence uses 'yet' as an adverb correctly?",
"options": [
"I have yet finished the report.",
"I haven't finished the report yet.",
"Yet I haven't finished the report.",
"I haven't yet finish the report."
],
"answer": 1,
"explanation": "'Yet' used as a time adverb meaning 'up to now' goes at the END of a negative sentence or question: 'I haven't finished yet.' 'I haven't finished the report yet' is correct."
},
{
"type": "tf",
"q": "Adverbs can only modify verbs — they cannot modify adjectives or other adverbs.",
"answer": false,
"explanation": "False. Adverbs can modify: (1) verbs: 'He runs quickly'; (2) adjectives: 'She is extremely talented'; (3) other adverbs: 'He ran very quickly'; (4) whole sentences: 'Fortunately, she passed.'"
},
{
"type": "mcq",
"q": "Which sentence uses an adverb of degree correctly?",
"options": [
"She is too much intelligent.",
"The coffee is enough hot for me.",
"The music is far too loud for this small room.",
"He is pretty very talented."
],
"answer": 2,
"explanation": "'Far too + adjective' is a correct intensifying structure. 'Too much' before an adjective is wrong (use 'too' alone). 'Enough' follows adjectives (not before them). 'Pretty very' combines two degree adverbs incorrectly."
},
{
"type": "mcq",
"q": "What is the function of 'frankly' in: 'Frankly, I don't care about the result.'?",
"options": [
"Adverb of manner",
"Adverb of time",
"Sentence adverb (commenting adverb)",
"Adverb of degree"
],
"answer": 2,
"explanation": "'Frankly' is a sentence adverb (or commenting adverb) — it modifies the entire statement and expresses the speaker's attitude rather than describing how the verb is performed. Other examples: honestly, clearly, unfortunately, surprisingly."
},
{
"type": "mcq",
"q": "Identify the adverb in: 'The nearly finished project impressed everyone.'",
"options": [
"Project",
"Nearly",
"Impressed",
"Finished"
],
"answer": 1,
"explanation": "'Nearly' is an adverb of degree modifying the participial adjective 'finished'. It tells us how close to finished the project is. 'Finished' functions as a participial adjective here."
},
{
"type": "mcq",
"q": "Which sentence avoids the common error of using an adjective instead of an adverb?",
"options": [
"She speaks English very good.",
"He did terrible on the exam.",
"The team played brilliantly in the final.",
"She felt badly about the mistake."
],
"answer": 2,
"explanation": "'Brilliantly' correctly modifies the verb 'played'. 'Good' should be 'well', 'terrible' should be 'terribly'. Note: 'felt bad' (not 'badly') is correct after a linking verb — 'feel' is a linking verb here, so an adjective (not adverb) is needed."
},
{
"type": "fill",
"q": "The adverb 'however' used to connect two contrasting independent clauses is called a ________ adverb.",
"answer": "conjunctive",
"hint": "It joins clauses like a conjunction...",
"explanation": "A CONJUNCTIVE adverb connects two independent clauses and shows a logical relationship. Examples: however, therefore, moreover, furthermore, consequently, nevertheless. They need a semicolon before them and a comma after when connecting clauses."
},
{
"type": "mcq",
"q": "Which sentence uses multiple adverb types correctly?",
"options": [
"She carefully always speaks very softly.",
"She always speaks very carefully and quite softly.",
"She very speaks always carefully and soft.",
"Always carefully she very speaks softly."
],
"answer": 1,
"explanation": "'Always' (frequency) correctly precedes the main verb 'speaks'. 'Very carefully' (degree + manner) and 'quite softly' (degree + manner) are correctly placed after the verb. The word order follows standard adverb placement rules."
},
{
"type": "mcq",
"q": "Which sentence demonstrates the most sophisticated use of adverbs?",
"options": [
"He spoke really very loudly and very quickly.",
"Characteristically, the diplomat spoke with measured precision, choosing each word extraordinarily carefully so as to inadvertently commit to nothing.",
"He always speaks loudly and fast.",
"She speaks loudly always and very fast usually."
],
"answer": 1,
"explanation": "Option B uses: 'characteristically' (sentence adverb), 'extraordinarily carefully' (adverb of degree + manner), 'inadvertently' (adverb of manner). The adverbs add precise nuance. Options A and C overuse 'very'; option D has incorrect adverb placement."
}
];
var cur=0,cor=0,ans=false,st=Date.now(),ac=null;
function gAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function gD(){try{return JSON.parse(localStorage.getItem('grammar_app')||'{}');}catch(e){return{};}}
function sD(d){try{localStorage.setItem('grammar_app',JSON.stringify(d));}catch(e){}}
function tM(){var d=gD();d.muted=!d.muted;sD(d);document.getElementById('mb').textContent=d.muted?'&#128263;':'&#128266;';}
function pT(t){var d=gD();if(d.muted)return;try{var c=gAC();if(c.state==='suspended')c.resume();if(t==='c')pC(c);else if(t==='w')pW(c);else pF(c);}catch(e){}}
function pC(c){[[523,0],[659,.1],[784,.2]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);});}
function pW(c){[[240,0],[200,.1]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sawtooth';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.08,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}
function pF(c){[[523,0],[659,.15],[784,.3],[1047,.45]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);});}
function rQ(){
  var q=Q[cur];ans=false;
  document.getElementById('pf').style.width=(cur/Q.length*100)+'%';
  document.getElementById('qc').textContent='Q '+(cur+1)+' of '+Q.length;
  var area=document.getElementById('qa');
  var lbs={mcq:'Multiple Choice',tf:'True or False',fill:'Fill in the Blank',transform:'Sentence Transformation'};
  var lbl=lbs[q.type]||'Question';
  var oh='';
  if(q.type==='mcq'){
    oh='<div class="ol">'+q.options.map(function(o,i){return '<button class="ob" onclick="sO('+i+')" data-i="'+i+'"><div class="ok2">'+String.fromCharCode(65+i)+'</div><div class="ot">'+o+'</div><div class="oi">'+(i===q.answer?'&#10003;':'&#10007;')+'</div></button>';}).join('')+'</div>';
  }else if(q.type==='tf'){
    oh='<div class="tfo"><button class="ob" onclick="sT(true)" data-v="true"><div class="ok2">T</div><div class="ot">True</div><div class="oi">'+(q.answer?'&#10003;':'&#10007;')+'</div></button><button class="ob" onclick="sT(false)" data-v="false"><div class="ok2">F</div><div class="ot">False</div><div class="oi">'+(!q.answer?'&#10003;':'&#10007;')+'</div></button></div>';
  }else{
    oh='<div class="fb"><input class="fi" id="fi" type="text" placeholder="'+(q.type==='transform'?'Rewrite the sentence...':'Type your answer...')+'" autocomplete="off" autocapitalize="none" spellcheck="false" onkeydown="if(event.keyCode===13)sF()">'+(q.hint?'<div style="font-size:.7em;color:#9ca3af;margin-top:6px;">&#128161; '+q.hint+'</div>':'')+'<button class="fs" id="fsb" onclick="sF()">Check Answer</button></div>';
  }
  area.innerHTML='<div class="qcard"><div class="qa"><div class="qtb">'+lbl+'</div><div class="qt">'+q.q+'</div></div>'+oh+'<div class="eb" id="eb"></div><button class="nb2" id="nb" onclick="nQ()">'+(cur+1<Q.length?'Next Question &rarr;':'See Results &#127919;')+'</button></div>';
  if(q.type==='fill'||q.type==='transform')setTimeout(function(){var e=document.getElementById('fi');if(e)e.focus();},100);
  var d=gD();document.getElementById('mb').textContent=d.muted?'&#128263;':'&#128266;';
}
function sO(i){if(ans)return;ans=true;var q=Q[cur];var ok=i===q.answer;if(ok)cor++;pT(ok?'c':'w');document.querySelectorAll('.ob').forEach(function(b,j){if(j===q.answer)b.classList.add('correct');else if(j===i&&!ok){b.classList.add('wrong');b.classList.add('shake');}else b.classList.add('dimmed');b.disabled=true;});shE(ok,q.explanation);document.getElementById('nb').classList.add('show');}
