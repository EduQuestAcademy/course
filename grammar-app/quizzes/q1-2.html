var Q=[
{
"type": "mcq",
"q": "Which of the following is a personal pronoun?",
"options": [
"This",
"He",
"Who",
"Each"
],
"answer": 1,
"explanation": "Personal pronouns refer to specific people. 'He' is a third-person singular personal pronoun. 'This' is demonstrative, 'who' is interrogative/relative, and 'each' is indefinite."
},
{
"type": "mcq",
"q": "Which sentence uses a reflexive pronoun correctly?",
"options": [
"He did it hisself.",
"She hurt herself.",
"They finished theirselves.",
"We enjoyed ourself."
],
"answer": 1,
"explanation": "Reflexive pronouns are used when subject and object refer to the same person. 'She hurt herself' is correct. 'Hisself' and 'theirselves' are not standard English forms."
},
{
"type": "mcq",
"q": "Identify the demonstrative pronoun in: 'These are the best results we have seen.'",
"options": [
"Best",
"Results",
"These",
"Seen"
],
"answer": 2,
"explanation": "'These' stands alone as the subject, replacing a noun — making it a demonstrative pronoun. Demonstrative pronouns: this, that, these, those."
},
{
"type": "mcq",
"q": "Which sentence uses a relative pronoun correctly?",
"options": [
"The book who I read was fascinating.",
"The book which I read was fascinating.",
"The book what I read was fascinating.",
"The book whom I read was fascinating."
],
"answer": 1,
"explanation": "'Which' introduces a relative clause referring to a thing ('the book'). 'Who/whom' refers to people. 'What' cannot introduce a relative clause modifying a noun this way."
},
{
"type": "mcq",
"q": "Which of the following is an indefinite pronoun?",
"options": [
"She",
"Herself",
"Which",
"Everyone"
],
"answer": 3,
"explanation": "Indefinite pronouns refer to non-specific people or things. 'Everyone' is an indefinite pronoun. 'She' is personal, 'herself' is reflexive, 'which' is relative."
},
{
"type": "tf",
"q": "The pronoun 'whom' is used as the subject of a verb.",
"answer": false,
"explanation": "False. 'Whom' is the OBJECT form of 'who'. Use 'who' as subject (Who did this?) and 'whom' as object (To whom did you speak?). A test: if you can replace it with 'him', use 'whom'."
},
{
"type": "mcq",
"q": "In which sentence is the pronoun used incorrectly?",
"options": [
"She gave the book to him.",
"Between you and I, this is wrong.",
"They invited us to the party.",
"He and I went to the market."
],
"answer": 1,
"explanation": "After a preposition, the object form must be used. 'Between you and I' is wrong — it should be 'between you and me'. 'Between' is a preposition requiring the object pronoun 'me'."
},
{
"type": "mcq",
"q": "Which sentence uses a possessive pronoun correctly?",
"options": [
"The decision is their's.",
"The decision is theirs.",
"The decision is her's.",
"The decision is mines."
],
"answer": 1,
"explanation": "Possessive pronouns (mine, yours, his, hers, ours, theirs) never take an apostrophe. 'Theirs' is correct. 'Their's', 'her's', and 'mines' are all incorrect forms."
},
{
"type": "mcq",
"q": "What is the function of 'it' in: 'It is raining heavily outside.'?",
"options": [
"Personal pronoun replacing a noun",
"Reflexive pronoun",
"Dummy subject pronoun",
"Demonstrative pronoun"
],
"answer": 2,
"explanation": "'It' here is a dummy (empty) subject — it doesn't refer to any noun but fills the grammatical subject position when talking about weather, time, or environment."
},
{
"type": "mcq",
"q": "Which sentence has clear and correct pronoun reference?",
"options": [
"After James spoke to David, he felt better.",
"When Sarah called the office, it was closed.",
"The manager submitted her report on time.",
"They say it will rain tomorrow."
],
"answer": 2,
"explanation": "'The manager submitted her report' has clear, unambiguous pronoun reference — 'her' clearly refers to 'the manager'. The other options have unclear or vague pronoun reference."
},
{
"type": "fill",
"q": "The pronouns myself, yourself, himself, herself, itself, ourselves, yourselves, and themselves are called ________ pronouns.",
"answer": "reflexive",
"hint": "They reflect back to the subject...",
"explanation": "These are REFLEXIVE pronouns. They are used when the subject and object refer to the same person/thing, or for emphasis (intensive use). Never say 'hisself' or 'theirselves'."
},
{
"type": "mcq",
"q": "Which sentence uses an interrogative pronoun correctly?",
"options": [
"Who's jacket is this?",
"Whose jacket is this?",
"Whom jacket is this?",
"Which jacket is her's?"
],
"answer": 1,
"explanation": "'Whose' asks about possession. 'Who's' is a contraction of 'who is'. 'Whose jacket is this?' is correct. Possessive pronouns never have apostrophes."
},
{
"type": "mcq",
"q": "Choose the correct pronoun: 'Neither the students nor the teacher ___ ready.'",
"options": [
"were",
"are",
"is",
"am"
],
"answer": 2,
"explanation": "With 'neither...nor', the verb agrees with the closest subject. 'Teacher' is singular and closest, so we use 'is'. This is the proximity rule for subject-verb agreement with correlative conjunctions."
},
{
"type": "tf",
"q": "Pronouns must always agree with their antecedents in number and gender.",
"answer": true,
"explanation": "True. Pronoun-antecedent agreement is essential. 'Each student must submit their assignment' (singular antecedent, generic 'their') and 'The girls finished their work' (plural) both show agreement."
},
{
"type": "mcq",
"q": "Which sentence avoids sexist pronoun usage most effectively?",
"options": [
"Every student must bring his textbook.",
"Every student must bring their textbook.",
"Every student must bring her textbook.",
"Every student must bring his or her textbook."
],
"answer": 1,
"explanation": "'Their' used with a singular antecedent ('every student') is now widely accepted as a gender-neutral option, endorsed by major style guides. It avoids the assumption that all students are male."
},
{
"type": "mcq",
"q": "Identify the pronoun type in: 'One must do one's best at all times.'",
"options": [
"Personal pronoun",
"Demonstrative pronoun",
"Impersonal/indefinite pronoun",
"Reflexive pronoun"
],
"answer": 2,
"explanation": "'One' is an impersonal/indefinite pronoun used in formal or literary contexts to refer to people in general without specifying who. 'One's' is its possessive form."
},
{
"type": "mcq",
"q": "Which sentence uses a reciprocal pronoun correctly?",
"options": [
"They helped each other during the crisis.",
"They helped themselves during the crisis.",
"They helped one another by themselves.",
"They helped theirselves during the crisis."
],
"answer": 0,
"explanation": "Reciprocal pronouns (each other, one another) express a mutual action. 'They helped each other' correctly shows two people helping one another. 'Theirselves' is not a standard English form."
},
{
"type": "fill",
"q": "In the sentence 'It was she who solved the problem,' the pronoun 'she' is in the ________ case.",
"answer": "nominative|subjective",
"hint": "It comes after a linking verb...",
"explanation": "After a linking verb like 'was', the subject form (nominative/subjective case) is used: 'It was she', 'It was he', 'It was I'. Informally, object forms are often used, but formally the nominative is correct."
},
{
"type": "mcq",
"q": "Which sentence contains an error in pronoun case?",
"options": [
"He and I completed the project.",
"The prize was given to her and me.",
"Between you and me, this is confidential.",
"The teacher asked she and I to stay."
],
"answer": 3,
"explanation": "'The teacher asked she and I to stay' is incorrect. After a verb ('asked'), object pronouns are needed: 'her and me'. 'She' and 'I' are subject pronouns wrongly used as objects."
},
{
"type": "mcq",
"q": "Which sentence demonstrates the most sophisticated and accurate pronoun use?",
"options": [
"Everyone in the office did their best, but the project, which nobody anticipated would fail, disappointed those who had invested themselves fully in it.",
"Everyone in the office did his best, but the project which nobody anticipated would fail, disappointed those who invested theirselves fully in it.",
"Everyone in the office did their best, but the project, whom nobody anticipated would fail, disappointed those who had invested themselves fully into it.",
"Everyone in the offices did their best, but the project which nobody anticipated would fail, disappointed those who had invested themselves fully in it."
],
"answer": 0,
"explanation": "Option A correctly uses: 'their' (gender-neutral with 'everyone'), 'which' (not 'whom' for a non-person antecedent), 'themselves' (not 'theirselves'), and 'in it' (not 'into it'). All pronoun choices are accurate."
}
];

function pT(t){var d=gD();if(d.muted)return;try{var c=gAC();if(c.state==='suspended')c.resume();if(t==='c')pC(c);else if(t==='w')pW(c);else pF(c);}catch(e){}}
function pC(c){[[523,0],[659,.1],[784,.2]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);});}
function pW(c){[[240,0],[200,.1]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sawtooth';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.08,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}
function pF(c){[[523,0],[659,.15],[784,.3],[1047,.45]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);});}
function rQ(){

function sO(i){if(ans)return;ans=true;var q=Q[cur];var ok=i===q.answer;if(ok)cor++;pT(ok?'c':'w');document.querySelectorAll('.ob').forEach(function(b,j){if(j===q.answer)b.classList.add('correct');else if(j===i&&!ok){b.classList.add('wrong');b.classList.add('shake');}else b.classList.add('dimmed');b.disabled=true;});shE(ok,q.explanation);document.getElementById('nb').classList.add('show');}
function sT(v){if(ans)return;ans=true;var q=Q[cur];var ok=v===q.answer;if(ok)cor++;pT(ok?'c':'w');document.querySelectorAll('.ob').forEach(function(b){var bv=b.dataset.v==='true';if(bv===q.answer)b.classList.add('correct');else if(bv===v&&!ok)b.classList.add('wrong');else b.classList.add('dimmed');b.disabled=true;});shE(ok,q.explanation);document.getElementById('nb').classList.add('show');}
function sF(){if(ans)return;var inp=document.getElementById('fi');if(!inp||!inp.value.trim())return;ans=true;var q=Q[cur];var v=inp.value.trim().toLowerCase();var aa=(q.answer||'').toLowerCase().split('|');var ok=aa.some(function(a){return v===a.trim();});if(ok)cor++;pT(ok?'c':'w');inp.classList.add(ok?'correct':'wrong');inp.disabled=true;document.getElementById('fsb').disabled=true;if(!ok){var cd=document.createElement('div');cd.style.cssText='font-size:.78em;color:var(--ok);margin-top:6px;';cd.textContent='Answer: '+q.answer;inp.parentNode.insertBefore(cd,document.getElementById('fsb'));inp.classList.add('shake');}shE(ok,q.explanation);document.getElementById('nb').classList.add('show');}

function shR(){

  sc.classList.add('show');window.scrollTo({top:0,behavior:'smooth'});
