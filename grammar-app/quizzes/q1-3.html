<style>

*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
body{font-family:'Sora',sans-serif;background:var(--bg);color:var(--tx);min-height:100vh;overflow-x:hidden;}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(99,102,241,.03) 1px,transparent 1px),linear-gradient(90deg,rgba(99,102,241,.03) 1px,transparent 1px);background-size:40px 40px;pointer-events:none;z-index:0;}
.app{position:relative;z-index:1;max-width:480px;margin:0 auto;padding-bottom:40px;}
.qh{padding:16px 20px;display:flex;align-items:center;justify-content:space-between;border-bottom:1px solid var(--br);position:sticky;top:0;z-index:50;background:rgba(10,10,15,.92);backdrop-filter:blur(20px);}
.back{color:var(--ac);font-size:.82em;font-weight:600;background:none;border:none;cursor:pointer;font-family:'Sora',sans-serif;text-decoration:none;}
.qm{text-align:right;}
.qc{font-size:.7em;font-family:'JetBrains Mono',monospace;color:var(--ac);}
.ql{font-size:.62em;color:var(--tf);margin-top:1px;}
.mt{background:var(--sf2);border:1px solid var(--br);border-radius:8px;padding:6px 8px;font-size:1em;cursor:pointer;}
.qp{height:4px;background:var(--sf2);}
.qpf{height:100%;background:linear-gradient(90deg,var(--ac),#818cf8);transition:width .4s cubic-bezier(.4,0,.2,1);}
.qa{padding:24px 20px 16px;}
.qtb{display:inline-flex;align-items:center;background:var(--ab);border:1px solid rgba(99,102,241,.2);border-radius:20px;padding:4px 12px;font-size:.62em;font-weight:600;letter-spacing:.05em;color:var(--ac);text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:14px;}
.qt{font-size:1.02em;font-weight:600;line-height:1.55;color:var(--tx);margin-bottom:8px;}
.ol{display:flex;flex-direction:column;gap:10px;padding:0 20px;}
.ob{display:flex;align-items:center;gap:14px;background:var(--sf);border:1.5px solid var(--br);border-radius:var(--r);padding:14px 16px;cursor:pointer;transition:all .15s;text-align:left;font-family:'Sora',sans-serif;width:100%;color:var(--tx);}

.ob:disabled{cursor:default;}
.ok2{width:28px;height:28px;flex-shrink:0;border-radius:8px;background:var(--sf2);display:flex;align-items:center;justify-content:center;font-size:.72em;font-weight:700;font-family:'JetBrains Mono',monospace;color:var(--td);transition:all .15s;}

.oi{font-size:1em;opacity:0;transition:opacity .2s;}
.ob.correct{border-color:var(--ok);background:var(--ob);}
.ob.correct .ok2{background:var(--ok);color:white;}
.ob.correct .oi{opacity:1;}
.ob.wrong{border-color:var(--no);background:var(--nb);}
.ob.wrong .ok2{background:var(--no);color:white;}
.ob.wrong .oi{opacity:1;}
.ob.dimmed{opacity:.35;}
.fb{padding:0 20px;}
.fi{width:100%;background:var(--sf);border:1.5px solid var(--br);border-radius:var(--r);padding:14px 16px;font-family:'Sora',sans-serif;font-size:.95em;color:var(--tx);outline:none;transition:border-color .2s;}

.fi.correct{border-color:var(--ok);background:var(--ob);}
.fi.wrong{border-color:var(--no);background:var(--nb);}
.fs{margin-top:10px;width:100%;background:var(--ac);border:none;border-radius:var(--r);padding:13px;font-family:'Sora',sans-serif;font-size:.9em;font-weight:600;color:white;cursor:pointer;}
.fs:disabled{opacity:.5;cursor:default;}
.tfo{display:grid;grid-template-columns:1fr 1fr;gap:10px;padding:0 20px;}
.eb{margin:14px 20px 0;background:var(--sf2);border:1px solid var(--br);border-radius:var(--r);padding:14px 16px;font-size:.82em;line-height:1.6;color:var(--td);display:none;}
.eb.show{display:block;animation:fi2 .3s ease;}
.el{font-size:.7em;font-weight:700;letter-spacing:.1em;text-transform:uppercase;font-family:'JetBrains Mono',monospace;margin-bottom:6px;}
.el.correct{color:var(--ok);}
.el.wrong{color:var(--no);}
.nb2{display:none;margin:16px 20px 0;width:calc(100% - 40px);background:var(--ac);border:none;border-radius:var(--r);padding:15px;font-family:'Sora',sans-serif;font-size:.95em;font-weight:700;color:white;cursor:pointer;}
.nb2.show{display:block;animation:fu .3s ease;}
.nb2:active{transform:scale(.98);}
.rs{display:none;padding:30px 20px;flex-direction:column;align-items:center;}
.rs.show{display:flex;animation:fu .5s ease;}
.rtr{font-size:4em;margin-bottom:10px;animation:bn .6s ease;}

.rl{font-size:.88em;color:var(--td);margin-bottom:24px;}
.rbd{width:100%;background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:16px;margin-bottom:20px;}

.bdr:last-child{border-bottom:none;}
.bdc{color:var(--ok);font-weight:600;font-family:'JetBrains Mono',monospace;}
.bdw{color:var(--no);font-weight:600;font-family:'JetBrains Mono',monospace;}
.nbp{background:rgba(251,191,36,.1);border:1px solid rgba(251,191,36,.3);border-radius:12px;padding:12px 16px;width:100%;display:flex;align-items:center;gap:12px;margin-bottom:16px;}
.rbs{display:flex;flex-direction:column;gap:10px;width:100%;}
.bp{background:var(--ac);border:none;border-radius:var(--r);padding:15px;font-family:'Sora',sans-serif;font-size:.95em;font-weight:700;color:white;cursor:pointer;text-align:center;text-decoration:none;display:block;}
.bs{background:var(--sf);border:1px solid var(--br);border-radius:var(--r);padding:14px;font-family:'Sora',sans-serif;font-size:.88em;font-weight:600;color:var(--td);cursor:pointer;text-align:center;text-decoration:none;display:block;}
.qcard{animation:fu .3s ease;}

@keyframes fi2{from{opacity:0}to{opacity:1}}
@keyframes bn{0%,100%{transform:scale(1)}50%{transform:scale(1.2)}}

.shake{animation:sk .35s ease;}
</style>

<script>
var Q=[
{
"type": "mcq",
"q": "Which of the following is an action verb?",
"options": [
"Seem",
"Is",
"Climb",
"Appear"
],
"answer": 2,
"explanation": "Action verbs describe physical or mental actions. 'Climb' is a physical action. 'Seem' and 'appear' are linking verbs. 'Is' is a form of 'to be' — also a linking verb."
},
{
"type": "mcq",
"q": "Which sentence contains a linking verb?",
"options": [
"She wrote a long letter.",
"The soup smells delicious.",
"He kicked the ball hard.",
"They built a new house."
],
"answer": 1,
"explanation": "'Smells' links 'soup' to the predicate adjective 'delicious'. Linking verbs connect the subject to a complement rather than expressing action. Other linking verbs: be, seem, appear, feel, taste, look."
},
{
"type": "mcq",
"q": "Identify the auxiliary verb in: 'She has finished her homework.'",
"options": [
"She",
"Has",
"Finished",
"Homework"
],
"answer": 1,
"explanation": "'Has' is the auxiliary (helping) verb forming the present perfect tense. 'Finished' is the main verb. Auxiliary verbs include: be, have, do, will, shall, would, could, may, might, must, should."
},
{
"type": "mcq",
"q": "Which of the following is a modal verb?",
"options": [
"Have",
"Run",
"Should",
"Been"
],
"answer": 2,
"explanation": "Modal verbs express possibility, ability, permission, or obligation. 'Should' is a modal verb. 'Have' is a primary auxiliary, 'run' is a main verb, and 'been' is a past participle."
},
{
"type": "mcq",
"q": "Which sentence uses a transitive verb correctly?",
"options": [
"She arrived at noon.",
"The artist painted a beautiful mural.",
"He slept soundly.",
"The baby laughed."
],
"answer": 1,
"explanation": "A transitive verb requires a direct object. 'Painted' acts on 'a beautiful mural' (the direct object). 'Arrived', 'slept', and 'laughed' are intransitive — they do not take direct objects."
},
{
"type": "mcq",
"q": "Which sentence contains an intransitive verb?",
"options": [
"She wrote the letter quickly.",
"He drives a fast car.",
"The birds sang beautifully.",
"They cooked dinner together."
],
"answer": 2,
"explanation": "'Sang' has no direct object — 'beautifully' is an adverb. Intransitive verbs do not take direct objects. 'Wrote', 'drives', and 'cooked' all have direct objects (letter, car, dinner)."
},
{
"type": "tf",
"q": "Stative verbs such as 'know', 'believe', and 'love' can normally be used in continuous tenses.",
"answer": false,
"explanation": "False. Stative verbs describe states rather than actions and are NOT normally used in continuous tenses. 'I am knowing' is incorrect; 'I know' is correct. Some stative verbs can be used in continuous tenses with a change in meaning (e.g., 'I'm thinking about it')."
},
{
"type": "mcq",
"q": "What verb form is used in: 'She was reading when I called.'?",
"options": [
"Simple past",
"Past continuous",
"Present perfect",
"Past perfect"
],
"answer": 1,
"explanation": "'Was reading' is the past continuous (past progressive), formed with was/were + present participle (-ing). It describes an action in progress at a specific past moment."
},
{
"type": "mcq",
"q": "Which of the following is a phrasal verb?",
"options": [
"Quickly run",
"Give up",
"Slowly walk",
"Very speak"
],
"answer": 1,
"explanation": "A phrasal verb combines a verb with a particle to create a new meaning. 'Give up' (= stop trying) is a phrasal verb. The meaning differs from the individual words. Other examples: look after, put off, carry out."
},
{
"type": "mcq",
"q": "In which sentence is the verb form used correctly?",
"options": [
"She don't know the answer.",
"He have finished the task.",
"By the time she arrived, they had already left.",
"They was waiting for an hour."
],
"answer": 2,
"explanation": "'Had already left' correctly uses the past perfect to show that leaving occurred before arriving — two past events in sequence. The other options have subject-verb agreement errors."
},
{
"type": "fill",
"q": "A verb that requires a direct object to complete its meaning is called a ________ verb.",
"answer": "transitive",
"hint": "It transfers the action to an object...",
"explanation": "A TRANSITIVE verb transfers its action to a direct object. Example: 'She reads books.' 'Books' is the direct object. Without the object, the sentence feels incomplete: 'She reads' is still grammatical, but 'She kicked' needs an object."
},
{
"type": "mcq",
"q": "Which sentence uses the causative verb correctly?",
"options": [
"I cut my hair yesterday.",
"I had my hair cut yesterday.",
"I was cutting my hair yesterday.",
"I got cutting my hair yesterday."
],
"answer": 1,
"explanation": "'Had my hair cut' is the causative construction: have + object + past participle. It means someone else did the action for you. 'Get + object + past participle' is also correct: 'I got my hair cut.'"
},
{
"type": "mcq",
"q": "Identify the error in: 'He suggested to go to the cinema.'",
"options": [
"'He' should be 'Him'",
"'Suggested' should be followed by a gerund, not an infinitive",
"'Cinema' should be 'movies'",
"No error — the sentence is correct"
],
"answer": 1,
"explanation": "'Suggest' is followed by a gerund (-ing) or a that-clause, NOT an infinitive. Correct: 'He suggested going to the cinema' or 'He suggested that we go to the cinema'. Common verbs + gerund: suggest, recommend, enjoy, avoid."
},
{
"type": "tf",
"q": "The verb 'to be' can function as both a main verb and an auxiliary verb.",
"answer": true,
"explanation": "True. As a main verb: 'She is a doctor.' As an auxiliary: 'She is working.' (present continuous) or 'The report was written.' (passive). 'To be' is the most versatile verb in English."
},
{
"type": "mcq",
"q": "Which sentence uses a reporting verb correctly?",
"options": [
"He said me that he was tired.",
"She told that she would come.",
"He mentioned that he was tired.",
"They discussed about the problem."
],
"answer": 2,
"explanation": "'Mentioned + that-clause' is correct. 'Said + me' is wrong (say does not take a person as indirect object — use 'told me'). 'Told + that' without a person is wrong. 'Discussed about' is wrong — 'discuss' doesn't need 'about'."
},
{
"type": "mcq",
"q": "Which sentence correctly uses a verb in the subjunctive mood?",
"options": [
"It is essential that he attends the meeting.",
"It is essential that he attend the meeting.",
"It is essential that he attended the meeting.",
"It is essential that he is attending the meeting."
],
"answer": 1,
"explanation": "The subjunctive mood uses the base form of the verb (without -s) after expressions of necessity, recommendation, or importance: 'It is essential that he attend' (not 'attends'). Common triggers: suggest, recommend, insist, require, demand + that."
},
{
"type": "mcq",
"q": "In which sentence does a verb function as a noun (gerund)?",
"options": [
"Running is excellent exercise.",
"She was running when I called.",
"He runs every morning.",
"Run faster!"
],
"answer": 0,
"explanation": "'Running' in 'Running is excellent exercise' is a gerund — a verb form (-ing) functioning as the subject of the sentence (a noun). In the other sentences, 'running'/'runs'/'run' function as verbs."
},
{
"type": "fill",
"q": "The verb form used after auxiliary verbs like 'have' to form perfect tenses is called the ________ participle.",
"answer": "past",
"hint": "Have + ___ + participle: I have walked",
"explanation": "The PAST participle is used with 'have' to form perfect tenses (have walked, has finished, had left) and with 'be' to form the passive voice (was written, is known). Regular past participles end in -ed; irregular ones vary (written, gone, taken)."
},
{
"type": "mcq",
"q": "Which sentence contains an error with a verb and its preposition?",
"options": [
"She insisted on attending the meeting.",
"He apologised for being late.",
"They succeeded in completing the task.",
"We discussed about the new policy."
],
"answer": 3,
"explanation": "'Discuss' is a transitive verb that does NOT take 'about'. Correct: 'We discussed the new policy.' Confusingly, 'talk about' and 'argue about' do take 'about', but 'discuss' directly governs its object."
},
{
"type": "mcq",
"q": "Which sentence demonstrates the most sophisticated and accurate use of verb forms?",
"options": [
"Not until she had left the office did she realise that she forgot her keys.",
"Not until she left the office did she realise that she had forgotten her keys.",
"Not until she had left the office did she realise that she had forgot her keys.",
"Not until she was leaving the office did she realise she forget her keys."
],
"answer": 1,
"explanation": "'Realised' (simple past) is the main discovery event. 'Had forgotten' (past perfect) correctly places the forgetting before the realising. 'Left' (simple past) works here because the 'not until' construction naturally implies sequence. 'Had forgot' is grammatically incorrect."
}
];
var cur=0,cor=0,ans=false,st=Date.now(),ac=null;
function gAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function gD(){try{return JSON.parse(localStorage.getItem('grammar_app')||'{}');}catch(e){return{};}}
function sD(d){try{localStorage.setItem('grammar_app',JSON.stringify(d));}catch(e){}}
function tM(){var d=gD();d.muted=!d.muted;sD(d);document.getElementById('mb').textContent=d.muted?'&#128263;':'&#128266;';}
function pT(t){var d=gD();if(d.muted)return;try{var c=gAC();if(c.state==='suspended')c.resume();if(t==='c')pC(c);else if(t==='w')pW(c);else pF(c);}catch(e){}}
function pC(c){[[523,0],[659,.1],[784,.2]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);});}
function pW(c){[[240,0],[200,.1]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sawtooth';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.08,t+.02);g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}
function pF(c){[[523,0],[659,.15],[784,.3],[1047,.45]].forEach(function(a){var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.03);g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);});}
function rQ(){
  var q=Q[cur];ans=false;
  document.getElementById('pf').style.width=(cur/Q.length*100)+'%';
  document.getElementById('qc').textContent='Q '+(cur+1)+' of '+Q.length;
  var area=document.getElementById('qa');
  var lbs={mcq:'Multiple Choice',tf:'True or False',fill:'Fill in the Blank',transform:'Sentence Transformation'};
  var lbl=lbs[q.type]||'Question';
  var oh='';
  if(q.type==='mcq'){
    oh='<div class="ol">'+q.options.map(function(o,i){return '<button class="ob" onclick="sO('+i+')" data-i="'+i+'"><div class="ok2">'+String.fromCharCode(65+i)+'</div><div class="ot">'+o+'</div><div class="oi">'+(i===q.answer?'&#10003;':'&#10007;')+'</div></button>';}).join('')+'</div>';
  }else if(q.type==='tf'){
    oh='<div class="tfo"><button class="ob" onclick="sT(true)" data-v="true"><div class="ok2">T</div><div class="ot">True</div><div class="oi">'+(q.answer?'&#10003;':'&#10007;')+'</div></button><button class="ob" onclick="sT(false)" data-v="false"><div class="ok2">F</div><div class="ot">False</div><div class="oi">'+(!q.answer?'&#10003;':'&#10007;')+'</div></button></div>';
  }else{
    oh='<div class="fb"><input class="fi" id="fi" type="text" placeholder="'+(q.type==='transform'?'Rewrite the sentence...':'Type your answer...')+'" autocomplete="off" autocapitalize="none" spellcheck="false" onkeydown="if(event.key==='Enter')sF()">'+(q.hint?'<div style="font-size:.7em;color:var(--tf);margin-top:6px;">&#128161; '+q.hint+'</div>':'')+'<button class="fs" id="fsb" onclick="sF()">Check Answer</button></div>';
  }
  area.innerHTML='<div class="qcard"><div class="qa"><div class="qtb">'+lbl+'</div><div class="qt">'+q.q+'</div></div>'+oh+'<div class="eb" id="eb"></div><button class="nb2" id="nb" onclick="nQ()">'+(cur+1<Q.length?'Next Question &rarr;':'See Results &#127919;')+'</button></div>';
  if(q.type==='fill'||q.type==='transform')setTimeout(function(){var e=document.getElementById('fi');if(e)e.focus();},100);
  var d=gD();document.getElementById('mb').textContent=d.muted?'&#128263;':'&#128266;';
}
function sO(i){if(ans)return;ans=true;var q=Q[cur];var ok=i===q.answer;if(ok)cor++;pT(ok?'c':'w');document.querySelectorAll('.ob').forEach(function(b,j){if(j===q.answer)b.classList.add('correct');else if(j===i&&!ok){b.classList.add('wrong');b.classList.add('shake');}else b.classList.add('dimmed');b.disabled=true;});shE(ok,q.explanation);document.getElementById('nb').classList.add('show');}
function sT(v){if(ans)return;ans=true;var q=Q[cur];var ok=v===q.answer;if(ok)cor++;pT(ok?'c':'w');document.querySelectorAll('.ob').forEach(function(b){var bv=b.dataset.v==='true';if(bv===q.answer)b.classList.add('correct');else if(bv===v&&!ok)b.classList.add('wrong');else b.classList.add('dimmed');b.disabled=true;});shE(ok,q.explanation);document.getElementById('nb').classList.add('show');}
function sF(){if(ans)return;var inp=document.getElementById('fi');if(!inp||!inp.value.trim())return;ans=true;var q=Q[cur];var v=inp.value.trim().toLowerCase();var aa=(q.answer||'').toLowerCase().split('|');var ok=aa.some(function(a){return v===a.trim();});if(ok)cor++;pT(ok?'c':'w');inp.classList.add(ok?'correct':'wrong');inp.disabled=true;document.getElementById('fsb').disabled=true;if(!ok){var cd=document.createElement('div');cd.style.cssText='font-size:.78em;color:var(--ok);margin-top:6px;';cd.textContent='Answer: '+q.answer;inp.parentNode.insertBefore(cd,document.getElementById('fsb'));inp.classList.add('shake');}shE(ok,q.explanation);document.getElementById('nb').classList.add('show');}
function shE(ok,text){var b=document.getElementById('eb');b.innerHTML='<div class="el '+(ok?'correct':'wrong')+'">'+(ok?'&#10003; Correct!':'&#10007; Incorrect')+'</div><div>'+text+'</div>';b.classList.add('show');setTimeout(function(){b.scrollIntoView({behavior:'smooth',block:'nearest'});},100);}
function nQ(){cur++;if(cur>=Q.length)shR();else{rQ();window.scrollTo({top:0,behavior:'smooth'});}}
function shR(){
  pT('complete');
  document.getElementById('pf').style.width='100%';
  document.getElementById('qa').style.display='none';
  document.getElementById('qc').textContent='Complete!';
  var tot=Q.length,pct=Math.round(cor/tot*100),tt=Math.round((Date.now()-st)/1000);
  var d=gD();if(!d.progress)d.progress={};
