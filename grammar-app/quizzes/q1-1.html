<script>
// ═══════════════════════════════════════════════════════
// AUDIO ENGINE
// ═══════════════════════════════════════════════════════
let audioCtx = null;
function getAudioCtx() {
  if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  return audioCtx;
}
function playTone(type) {
  const d = getData();
  if (d.muted) return;
  try {
    const ctx = getAudioCtx();
    if (ctx.state === 'suspended') ctx.resume();
    if (type === 'correct') playCorrect(ctx);
    else if (type === 'wrong') playWrong(ctx);
    else if (type === 'complete') playFanfare(ctx);
  } catch(e) {}
}

function playCorrect(ctx) {
  // Rising happy arpeggio C-E-G
  [[523,0],[659,0.1],[784,0.2]].forEach(([freq,delay]) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.18, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.3);
    osc.start(t); osc.stop(t + 0.3);
  });
}

function playWrong(ctx) {
  // Descending minor buzz
  [[240,0],[200,0.1]].forEach(([freq,delay]) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sawtooth';
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.08, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
    osc.start(t); osc.stop(t + 0.25);
  });
}

function playFanfare(ctx) {
  // Victory fanfare C-E-G-C
  [[523,0],[659,0.15],[784,0.3],[1047,0.45]].forEach(([freq,delay]) => {
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.connect(gain); gain.connect(ctx.destination);
    osc.frequency.value = freq;
    osc.type = 'sine';
    const t = ctx.currentTime + delay;
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.2, t + 0.03);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.5);
    osc.start(t); osc.stop(t + 0.5);
  });
}

function saveData(d) { try{localStorage.setItem('grammar_app',JSON.stringify(d));}catch(e){} }
function toggleMute() {

// ═══════════════════════════════════════════════════════
// QUESTIONS — LESSON 1.1: NOUNS
// ═══════════════════════════════════════════════════════
const QUIZ = {
  module: 1, lesson: 1,
  title: 'Nouns: People, Places, Things, and Ideas',
  storageKey: 'm1_l1',
  nextQuiz: 'q1-2.html',
  moduleHub: '../modules/module1.html',
  questions: [
    {
      type: 'mcq',
      q: 'Which of the following is a noun?',
      options: ['Running','Quickly','Beautiful','Happiness'],
      answer: 3,
      explanation: "'Happiness' is a noun — it names an abstract idea or concept. 'Running' is a verb, 'quickly' is an adverb, and 'beautiful' is an adjective."
    },
    {
      type: 'mcq',
      q: 'Which sentence contains a proper noun?',
      options: ['The city is very busy.','She is a good teacher.','I visited London last summer.','The river flows quickly.'],
      answer: 2,
      explanation: "A proper noun names a specific person, place, or thing and is always capitalised. 'London' is a specific city, making it a proper noun. The other sentences contain only common nouns."
    },
    {
      type: 'mcq',
      q: 'Which of the following is an abstract noun?',
      options: ['Mountain','Dog','Freedom','Chair'],
      answer: 2,
      explanation: "Abstract nouns name ideas, qualities, or states that cannot be physically seen or touched. 'Freedom' is abstract. 'Mountain', 'dog', and 'chair' are concrete nouns you can perceive with your senses."
    },
    {
      type: 'mcq',
      q: "Identify the collective noun in: 'A flock of birds flew over the house.'",
      options: ['Birds','Flock','House','Over'],
      answer: 1,
      explanation: "A collective noun names a group treated as one unit. 'Flock' names a group of birds. 'Birds' is a common plural noun, 'house' is a concrete noun, and 'over' is a preposition."
    },
    {
      type: 'mcq',
      q: 'Which of the following is a compound noun?',
      options: ['Quickly','Toothbrush','Bright','Run'],
      answer: 1,
      explanation: "A compound noun is formed by combining two or more words to create a new noun. 'Toothbrush' (tooth + brush) is a compound noun. The others are an adverb, adjective, and verb."
    },
    {
      type: 'tf',
      q: "A noun can function as the subject, object, or complement of a sentence.",
      answer: true,
      explanation: "True. Nouns are highly versatile — they can be the subject performing an action, the object receiving it, or the complement renaming/describing the subject after a linking verb."
    },
    {
      type: 'mcq',
      q: "In 'The children played in the garden,' which word is a plural noun?",
      options: ['Garden','Played','The','Children'],
      answer: 3,
      explanation: "'Children' is the irregular plural of 'child'. It does not follow the regular -s/-es pattern. 'Garden' is singular, 'played' is a verb, and 'the' is a definite article."
    },
    {
      type: 'mcq',
      q: 'Which sentence uses a noun as the direct object of the verb?',
      options: ['The dog barked loudly.','She reads books every night.','Silence filled the room.','The teacher arrived late.'],
      answer: 1,
      explanation: "In 'She reads books every night,' 'books' receives the action of 'reads' — making it the direct object. In the other sentences, the nouns function as subjects."
    },
    {
      type: 'mcq',
      q: 'Which of the following nouns is uncountable?',
      options: ['Idea','Book','Water','City'],
      answer: 2,
      explanation: "Uncountable nouns cannot be counted individually and have no plural form. 'Water' is uncountable — we cannot say 'one water, two waters'. 'Idea', 'book', and 'city' are all countable."
    },
    {
      type: 'tf',
      q: "The word 'news' is a plural noun because it ends in -s.",
      answer: false,
      explanation: "False. 'News' ends in -s but is an uncountable singular noun. We say 'The news is' not 'The news are'. Many nouns ending in -s are singular (physics, mathematics, economics, series)."
    },
    {
      type: 'mcq',
      q: "In which sentence is the noun functioning as a subject complement (predicate noun)?",
      options: ['We visited the museum yesterday.','The storm destroyed the bridge.','Marie is a scientist.','He gave her a gift.'],
      answer: 2,
      explanation: "A predicate noun follows a linking verb and renames the subject. In 'Marie is a scientist,' 'scientist' follows 'is' and renames 'Marie'. The other sentences use nouns as direct objects or subjects."
    },
    {
      type: 'fill',
      q: "A noun that names a group of people or things acting as one unit is called a ________ noun.",
      answer: 'collective',
      hint: 'Think: team, committee, flock...',
      explanation: "A COLLECTIVE noun names a group acting as a single unit. Examples: team, committee, flock, jury, class, army. They can take singular or plural verbs depending on context."
    },
    {
      type: 'mcq',
      q: "Which option correctly identifies ALL the nouns in: 'The team celebrated their victory with great joy.'?",
      options: ['Team, victory','Team, celebrated, joy','Team, victory, joy','Victory, great, joy'],
      answer: 2,
      explanation: "'Team' (collective), 'victory' (abstract), and 'joy' (abstract) are all nouns. 'Their' is a possessive pronoun, 'celebrated' is a verb, and 'great' is an adjective."
    },
    {
      type: 'mcq',
      q: 'Which noun is formed by adding a suffix to a verb?',
      options: ['Freedom','Childhood','Employment','Friendship'],
      answer: 2,
      explanation: "'Employment' is formed from the verb 'employ' + suffix '-ment'. 'Freedom' comes from the adjective 'free', 'childhood' from the noun 'child', and 'friendship' from the noun 'friend'."
    },
    {
      type: 'tf',
      q: "Proper nouns are always capitalised regardless of where they appear in a sentence.",
      answer: true,
      explanation: "True. Proper nouns — names of specific people, places, organisations, or things — are always capitalised, whether at the beginning or middle of a sentence. 'I visited paris' is incorrect; it must be 'Paris'."
    },
    {
      type: 'mcq',
      q: "Identify the error in: 'She gave me an advise about my career.'",
      options: [
        "'An' should be 'a'",
        "'Advise' should be 'advice' — advice is the noun, advise is the verb",
        "'Gave' should be 'give'",
        "No error — the sentence is correct"
      ],
      answer: 1,
      explanation: "'Advice' is the noun (uncountable); 'advise' is the verb. This is a common error. Also, 'advice' is uncountable, so 'an advice' is wrong — it should be 'some advice' or simply 'advice'."
    },
    {
      type: 'mcq',
      q: "Which sentence uses a noun in the possessive case correctly?",
      options: [
        "The dogs bone was buried in the garden.",
        "The dog's bone was buried in the garden.",
        "The dogs' bone was buried in the garden.",
        "The dogs bone' was buried in the garden."
      ],
      answer: 1,
      explanation: "For a singular noun, the possessive is formed with apostrophe + s: 'dog's bone'. 'dogs bone' has no apostrophe. 'dogs'' would indicate multiple dogs. 'bone'' is not a valid possessive form."
    },
    {
      type: 'fill',
      q: "The noun 'laughter' is an example of an ________ noun because it cannot be seen or touched.",
      answer: 'abstract',
      hint: 'Opposite of concrete...',
      explanation: "ABSTRACT nouns name things that exist as ideas, emotions, or concepts — things you cannot perceive with your five senses. Other examples: justice, courage, beauty, knowledge, time."
    },
    {
      type: 'mcq',
      q: "Which sentence demonstrates the most sophisticated use of nouns?",
      options: [
        "The dog ran fast.",
        "A committee of experts recommended the abolition of the outdated regulation.",
        "She has many things.",
        "The boy went to a place."
      ],
      answer: 1,
      explanation: "This sentence uses 'committee' (collective noun), 'experts' (plural common noun), 'abolition' (abstract noun formed from a verb), and 'regulation' (abstract/common noun) — demonstrating varied, precise noun use."
    },
    {
      type: 'mcq',
      q: "In which sentence is a noun used as an appositive?",
      options: [
        "Shakespeare wrote many plays.",
        "Shakespeare, the playwright, wrote many plays.",
        "He is a famous playwright.",
        "Many plays were written in the 16th century."
      ],
      answer: 1,
      explanation: "An appositive is a noun or noun phrase placed next to another noun to identify or describe it. 'The playwright' is an appositive — it renames and identifies 'Shakespeare' by being placed directly beside it."
    }
  ]
};

let current = 0;
let correct = 0;
let answered = false;

function getData2() { try{return JSON.parse(localStorage.getItem('grammar_app')||'{}');}catch(e){return{};} }

function renderQuestion() {
  const q = QUIZ.questions[current];
  answered = false;
  questionStartTime = Date.now();

  const pct = (current / QUIZ.questions.length) * 100;
  document.getElementById('progressFill').style.width = pct + '%';
  document.getElementById('qCounter').textContent = `Q ${current+1} of ${QUIZ.questions.length}`;

  const area = document.getElementById('quizArea');

  // Determine type label
  const typeLabels = { mcq:'Multiple Choice', tf:'True or False', fill:'Fill in the Blank' };
  const typeLabel = typeLabels[q.type] || 'Question';

  let optionsHTML = '';

  if (q.type === 'mcq') {
    optionsHTML = `<div class="options-list">` +
      q.options.map((opt, i) => `
        <button class="option-btn" onclick="selectOption(${i})" data-idx="${i}">
          <div class="option-key">${String.fromCharCode(65+i)}</div>
          <div class="option-text">${opt}</div>
          <div class="option-indicator">${i === q.answer ? '✓' : '✗'}</div>
        </button>
      `).join('') +
    `</div>`;
  } else if (q.type === 'tf') {
    optionsHTML = `<div class="tf-options">
      <button class="option-btn" onclick="selectTF(true)" data-val="true">
        <div class="option-key">T</div>
        <div class="option-text">True</div>
        <div class="option-indicator">${q.answer ? '✓' : '✗'}</div>
      </button>
      <button class="option-btn" onclick="selectTF(false)" data-val="false">
        <div class="option-key">F</div>
        <div class="option-text">False</div>
        <div class="option-indicator">${!q.answer ? '✓' : '✗'}</div>
      </button>
    </div>`;
  } else if (q.type === 'fill') {
    optionsHTML = `<div class="fill-blank-wrap">
      <input class="fill-input" id="fillInput" type="text"
        placeholder="Type your answer..." autocomplete="off"
        autocapitalize="none" spellcheck="false"
        onkeydown="if(event.key==='Enter')submitFill()">
      ${q.hint ? `<div style="font-size:0.7em;color:var(--text-faint);margin-top:6px;padding-left:2px;">💡 Hint: ${q.hint}</div>` : ''}
      <button class="fill-submit" id="fillSubmit" onclick="submitFill()">Check Answer</button>
    </div>`;
  }

  area.innerHTML = `
    <div class="question-card">
      <div class="question-area">
        <div class="q-type-badge">${typeLabel}</div>
        <div class="q-text">${q.q}</div>
      </div>
      ${optionsHTML}
      <div class="explanation-box" id="explanationBox"></div>
      <button class="next-btn" id="nextBtn" onclick="nextQuestion()">
        ${current + 1 < QUIZ.questions.length ? 'Next Question →' : 'See Results 🎯'}
      </button>
    </div>
  `;

  // Focus fill input
  if (q.type === 'fill') {
    setTimeout(() => { const el = document.getElementById('fillInput'); if(el) el.focus(); }, 100);
  }

  // Mute state
  const d = getData();
  document.getElementById('muteBtn').textContent = d.muted ? '🔇' : '🔊';
}

function selectOption(idx) {
  if (answered) return;
  answered = true;
  const q = QUIZ.questions[current];
  const isCorrect = idx === q.answer;
  if (isCorrect) correct++;
  playTone(isCorrect ? 'correct' : 'wrong');
  showFeedback(isCorrect, idx, q);
}

function selectTF(val) {
  if (answered) return;
  answered = true;
  const q = QUIZ.questions[current];
  const isCorrect = val === q.answer;
  if (isCorrect) correct++;
  playTone(isCorrect ? 'correct' : 'wrong');

  // Highlight buttons
  document.querySelectorAll('.option-btn').forEach(btn => {
    const bVal = btn.dataset.val === 'true';
    if (bVal === q.answer) btn.classList.add('correct');
    else if (bVal === val && !isCorrect) btn.classList.add('wrong');
    else btn.classList.add('dimmed');
    btn.disabled = true;
  });

  showExplanation(isCorrect, q.explanation);
  document.getElementById('nextBtn').classList.add('show');
}

function submitFill() {
  if (answered) return;
  const input = document.getElementById('fillInput');
  if (!input) return;
  const val = input.value.trim().toLowerCase();
  if (!val) return;
  answered = true;

  const q = QUIZ.questions[current];
  const answers = q.answer.toLowerCase().split('|');
  const isCorrect = answers.some(a => val === a || val === a.trim());
  if (isCorrect) correct++;
  playTone(isCorrect ? 'correct' : 'wrong');

  input.classList.add(isCorrect ? 'correct' : 'wrong');
  input.disabled = true;
  document.getElementById('fillSubmit').disabled = true;

  if (!isCorrect) {
    // Show correct answer
    const correctDiv = document.createElement('div');
    correctDiv.style.cssText = 'font-size:0.78em;color:var(--correct);margin-top:6px;padding-left:2px;';
    correctDiv.textContent = `✓ Correct: ${q.answer}`;
    input.parentNode.insertBefore(correctDiv, document.getElementById('fillSubmit'));
    input.classList.add('shake');
  }

  showExplanation(isCorrect, q.explanation);
  document.getElementById('nextBtn').classList.add('show');
}

function showFeedback(isCorrect, selectedIdx, q) {
  document.querySelectorAll('.option-btn').forEach((btn, i) => {
    if (i === q.answer) btn.classList.add('correct');
    else if (i === selectedIdx && !isCorrect) { btn.classList.add('wrong'); btn.classList.add('shake'); }
    else btn.classList.add('dimmed');
    btn.disabled = true;
  });
  showExplanation(isCorrect, q.explanation);
  document.getElementById('nextBtn').classList.add('show');
}

function showExplanation(isCorrect, text) {
  const box = document.getElementById('explanationBox');
  box.innerHTML = `
    <div class="expl-label ${isCorrect ? 'correct' : 'wrong'}">
      ${isCorrect ? '✓ Correct!' : '✗ Incorrect'}
    </div>
    <div class="expl-text">${text}</div>
  `;
  box.classList.add('show');
  // Scroll explanation into view
  setTimeout(() => box.scrollIntoView({behavior:'smooth', block:'nearest'}), 100);
}

function nextQuestion() {
  current++;
  if (current >= QUIZ.questions.length) {
    showResults();
  } else {
    renderQuestion();
    window.scrollTo({top:0, behavior:'smooth'});
  }
}

function showResults() {
  playTone('complete');
  document.getElementById('progressFill').style.width = '100%';
  document.getElementById('quizArea').style.display = 'none';
  document.getElementById('qCounter').textContent = 'Complete!';

  const total = QUIZ.questions.length;
  const pct = Math.round((correct / total) * 100);
  const timeTaken = Math.round((Date.now() - startTime) / 1000);

  // Save score
  const d = getData2();
  if (!d.progress) d.progress = {};
  const prev = d.progress[QUIZ.storageKey];
  const isImprovement = prev !== undefined && pct > prev;
  const isFirst = prev === undefined;
  d.progress[QUIZ.storageKey] = Math.max(pct, prev || 0);

  // Badges
  if (!d.badges) d.badges = [];
  let newBadges = [];
  if (isFirst && !d.badges.includes('first_quiz')) { d.badges.push('first_quiz'); newBadges.push({icon:'⭐',name:'First Step'}); }
  if (pct === 100 && !d.badges.includes('perfect_score')) { d.badges.push('perfect_score'); newBadges.push({icon:'💯',name:'Perfect Score!'}); }
  if (isImprovement && !d.badges.includes('comeback')) { d.badges.push('comeback'); newBadges.push({icon:'💪',name:'Comeback!'}); }
  if (timeTaken < 120 && !d.badges.includes('speed_demon')) { d.badges.push('speed_demon'); newBadges.push({icon:'⚡',name:'Speed Run!'}); }
  saveData(d);

  // Trophy emoji by score
  const trophy = pct >= 90 ? '🏆' : pct >= 70 ? '🎖️' : pct >= 50 ? '🥈' : '📚';
  const msg = pct >= 90 ? 'Outstanding!' : pct >= 70 ? 'Great work!' : pct >= 50 ? 'Good effort!' : 'Keep practising!';
  const wrong = total - correct;

  const badgeHTML = newBadges.map(b => `
    <div class="new-badge-pop">
      <div class="nbp-icon">${b.icon}</div>
      <div class="nbp-info">
        <div class="nbp-title">Badge Unlocked!</div>
        <div class="nbp-name">${b.name}</div>
      </div>
    </div>
  `).join('');

  const screen = document.getElementById('resultsScreen');
  screen.innerHTML = `
    <div class="results-trophy">${trophy}</div>
    <div class="results-score-big">${pct}%</div>
    <div class="results-label">${msg} ${correct}/${total} correct</div>
    ${badgeHTML}
    <div class="results-breakdown">
      <div class="breakdown-row">
        <span>Correct answers</span>
        <span class="bd-correct">✓ ${correct}</span>
      </div>
      <div class="breakdown-row">
        <span>Incorrect answers</span>
        <span class="bd-wrong">✗ ${wrong}</span>
      </div>
      <div class="breakdown-row">
        <span>Score</span>
        <span style="font-weight:700;font-family:'JetBrains Mono',monospace">${pct}%</span>
      </div>
      <div class="breakdown-row">
        <span>Time taken</span>
        <span style="font-family:'JetBrains Mono',monospace;color:var(--text-dim)">${Math.floor(timeTaken/60)}m ${timeTaken%60}s</span>
      </div>
    </div>
    <div class="results-btns">
      <a class="btn-primary" href="${QUIZ.nextQuiz}">Next Lesson →</a>
      <button class="btn-secondary" onclick="retryQuiz()">↺ Retry this quiz</button>
      <a class="btn-secondary" href="${QUIZ.moduleHub}">← Back to Module 1</a>
    </div>
  `;
  screen.classList.add('show');
  window.scrollTo({top:0, behavior:'smooth'});
}

function retryQuiz() {
  current = 0; correct = 0; answered = false;
  startTime = Date.now();
  document.getElementById('resultsScreen').classList.remove('show');
  document.getElementById('quizArea').style.display = '';
  renderQuestion();
  window.scrollTo({top:0, behavior:'smooth'});
}

// Init
const d0 = getData();
document.getElementById('muteBtn').textContent = d0.muted ? '🔇' : '🔊';
renderQuestion();
</script>
</body>
</html>
