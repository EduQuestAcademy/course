<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Lesson 1.7 — Conjunctions: Joining Words and Ideas | Grammar Mastery</title>
<style>
  /* ═══════════════════════════════════════════════════════════
     GRAMMAR MASTERY — DESIGN SYSTEM
     Responsive: Mobile → Tablet → Desktop (two-panel)
     Fonts: Inter (UI) + JetBrains Mono (numbers/code)
  ═══════════════════════════════════════════════════════════ */
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@500;600;700&display=swap');

  :root {
    /* Colours */
    --bg:         #eef2ff;
    --surface:    #ffffff;
    --surface2:   #f5f3ff;
    --border:     #ddd6fe;
    --border-md:  #c4b5fd;

    /* Text */
    --tx:         #1e1b4b;
    --tx-md:      #374151;
    --tx-sm:      #6b7280;
    --tx-xs:      #9ca3af;

    /* Brand */
    --accent:     #5b21b6;
    --accent-mid: #7c3aed;
    --accent-lt:  #ede9fe;
    --accent-glow:rgba(124,58,237,0.18);

    /* Feedback */
    --ok:         #059669;
    --ok-lt:      #d1fae5;
    --ok-dk:      #065f46;
    --no:         #dc2626;
    --no-lt:      #fee2e2;
    --no-dk:      #991b1b;

    /* Geometry */
    --r-sm:   8px;
    --r-md:   12px;
    --r-lg:   16px;
    --r-xl:   20px;
    --r-full: 999px;

    /* Shadows */
    --sh-xs: 0 1px 2px rgba(0,0,0,0.05);
    --sh-sm: 0 1px 4px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
    --sh-md: 0 4px 16px rgba(0,0,0,0.08), 0 2px 4px rgba(0,0,0,0.04);
    --sh-lg: 0 8px 32px rgba(0,0,0,0.10), 0 2px 8px rgba(0,0,0,0.06);
    --sh-accent: 0 4px 20px rgba(91,33,182,0.25);

    /* Layout */
    --sidebar-w: 300px;
    --content-max: 660px;
  }

  /* ── RESET & BASE ── */
  *, *::before, *::after {
    box-sizing: border-box; margin: 0; padding: 0;
    -webkit-tap-highlight-color: transparent;
  }
  html { scroll-behavior: smooth; height: 100%; }
  body {
    font-family: 'Inter', system-ui, sans-serif;
    background: var(--bg);
    color: var(--tx);
    min-height: 100vh;
    font-size: 16px;
    line-height: 1.5;
    -webkit-font-smoothing: antialiased;
  }

  /* ── LAYOUT: MOBILE (default) ── */
  .quiz-shell {
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }
  .quiz-sidebar {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    box-shadow: var(--sh-sm);
    position: sticky; top: 0; z-index: 50;
  }
  .quiz-main {
    flex: 1;
    padding-bottom: 48px;
  }

  /* ── LAYOUT: TABLET (640px+) ── */
  @media (min-width: 640px) {
    body { font-size: 17px; }
    .quiz-shell {
      max-width: 720px;
      margin: 0 auto;
    }
  }

  /* ── LAYOUT: DESKTOP (1024px+) ── */
  @media (min-width: 1024px) {
    body {
      font-size: 16px;
      background: linear-gradient(135deg, #eef2ff 0%, #f5f3ff 50%, #ede9fe 100%);
      background-attachment: fixed;
    }
    .quiz-shell {
      max-width: 1080px;
      margin: 32px auto;
      flex-direction: row;
      align-items: flex-start;
      gap: 0;
      border-radius: var(--r-xl);
      overflow: hidden;
      box-shadow: var(--sh-lg);
      min-height: calc(100vh - 64px);
    }
    .quiz-sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      flex-shrink: 0;
      position: sticky;
      top: 32px;
      height: calc(100vh - 64px);
      border-bottom: none;
      border-right: 1px solid var(--border);
      box-shadow: none;
      display: flex;
      flex-direction: column;
      overflow-y: auto;
    }
    .quiz-main {
      flex: 1;
      min-width: 0;
      background: var(--surface);
      min-height: calc(100vh - 64px);
      padding-bottom: 64px;
    }
  }

  /* ── SIDEBAR CONTENT ── */
  .sb-top {
    padding: 20px 20px 16px;
    border-bottom: 1px solid var(--border);
  }
  .sb-back {
    display: inline-flex; align-items: center; gap: 6px;
    color: var(--accent-mid); font-size: 0.82em; font-weight: 700;
    text-decoration: none; background: none; border: none;
    cursor: pointer; font-family: inherit;
    padding: 6px 10px; border-radius: var(--r-sm);
    transition: background 0.15s;
    margin-bottom: 16px;
  }
  .sb-back:hover { background: var(--accent-lt); }

  .sb-lesson-tag {
    display: inline-flex; align-items: center;
    background: var(--accent-lt); border: 1.5px solid var(--border-md);
    border-radius: var(--r-full); padding: 4px 12px;
    font-size: 0.65em; font-weight: 700; letter-spacing: 0.07em;
    color: var(--accent); text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 8px;
  }
  .sb-title {
    font-size: 0.95em; font-weight: 800;
    color: var(--tx); line-height: 1.3;
  }

  /* Progress in sidebar */
  .sb-progress {
    padding: 16px 20px;
    border-bottom: 1px solid var(--border);
  }
  .sb-prog-row {
    display: flex; justify-content: space-between; align-items: center;
    margin-bottom: 8px;
  }
  .sb-prog-label { font-size: 0.72em; font-weight: 600; color: var(--tx-sm); }
  .sb-prog-count {
    font-size: 0.78em; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; color: var(--accent-mid);
  }
  .sb-prog-track {
    height: 6px; background: var(--border);
    border-radius: var(--r-full); overflow: hidden;
  }
  .sb-prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-mid));
    border-radius: var(--r-full);
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Question dots in sidebar (desktop only) */
  .sb-dots {
    padding: 16px 20px;
    flex: 1;
    display: none;
  }
  @media (min-width: 1024px) { .sb-dots { display: block; } }
  .sb-dots-label {
    font-size: 0.65em; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; color: var(--tx-xs);
    margin-bottom: 12px;
  }
  .sb-dots-grid {
    display: grid; grid-template-columns: repeat(5, 1fr); gap: 6px;
  }
  .sb-dot {
    aspect-ratio: 1; border-radius: var(--r-sm);
    background: var(--border); border: 1.5px solid transparent;
    display: flex; align-items: center; justify-content: center;
    font-size: 0.65em; font-weight: 700;
    font-family: 'JetBrains Mono', monospace; color: var(--tx-xs);
    transition: all 0.2s;
    cursor: default;
  }
  .sb-dot.active {
    background: var(--accent); color: white;
    border-color: var(--accent);
    box-shadow: var(--sh-accent);
    transform: scale(1.08);
  }
  .sb-dot.done-ok  { background: var(--ok-lt);  color: var(--ok);  border-color: var(--ok); }
  .sb-dot.done-no  { background: var(--no-lt);  color: var(--no);  border-color: var(--no); }

  /* Mute + score in sidebar bottom */
  .sb-bottom {
    padding: 16px 20px;
    border-top: 1px solid var(--border);
    margin-top: auto;
    display: flex; align-items: center; justify-content: space-between;
  }
  .sb-score-wrap { display: flex; flex-direction: column; gap: 1px; }
  .sb-score-num {
    font-size: 1.5em; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), var(--accent-mid));
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1;
  }
  .sb-score-label { font-size: 0.65em; color: var(--tx-xs); font-weight: 600; }
  .mute-btn {
    background: var(--accent-lt); border: 1.5px solid var(--border-md);
    border-radius: var(--r-md); padding: 8px 12px;
    font-size: 1.1em; cursor: pointer; line-height: 1;
    transition: all 0.15s;
  }
  .mute-btn:hover { background: var(--border-md); }

  /* ── MOBILE HEADER (hidden on desktop) ── */
  .mobile-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 16px;
  }
  @media (min-width: 1024px) { .mobile-header { display: none; } }
  .mobile-back {
    color: var(--accent-mid); font-size: 0.85em; font-weight: 700;
    text-decoration: none; background: none; border: none;
    cursor: pointer; font-family: inherit;
  }
  .mobile-counter {
    text-align: center;
  }
  .mobile-count-num {
    font-size: 0.78em; font-family: 'JetBrains Mono', monospace;
    color: var(--accent-mid); font-weight: 700;
  }
  .mobile-count-sub {
    font-size: 0.62em; color: var(--tx-xs); margin-top: 1px;
  }

  /* Progress bar — top on mobile, in sidebar on desktop */
  .top-prog {
    height: 4px; background: var(--border);
  }
  @media (min-width: 1024px) { .top-prog { display: none; } }
  .top-prog-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--accent), var(--accent-mid));
    transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ── QUESTION AREA ── */
  .q-wrap { padding: 28px 24px 16px; }
  @media (min-width: 640px) { .q-wrap { padding: 32px 32px 20px; } }
  @media (min-width: 1024px) { .q-wrap { padding: 40px 44px 24px; } }

  .q-type-badge {
    display: inline-flex; align-items: center;
    background: var(--accent-lt); border: 1.5px solid var(--border-md);
    border-radius: var(--r-full); padding: 5px 14px;
    font-size: 0.65em; font-weight: 700; letter-spacing: 0.07em;
    color: var(--accent); text-transform: uppercase;
    font-family: 'JetBrains Mono', monospace;
    margin-bottom: 16px;
  }
  .q-text {
    font-size: 1.15em; font-weight: 700;
    line-height: 1.6; color: var(--tx);
    letter-spacing: -0.01em;
  }
  @media (min-width: 1024px) { .q-text { font-size: 1.2em; } }

  /* ── ANSWER OPTIONS ── */
  .opt-list {
    display: flex; flex-direction: column; gap: 10px;
    padding: 0 24px;
  }
  @media (min-width: 640px) { .opt-list { padding: 0 32px; } }
  @media (min-width: 1024px) { .opt-list { padding: 0 44px; gap: 12px; } }

  .opt-btn {
    display: flex; align-items: center; gap: 14px;
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--r-lg); padding: 14px 16px;
    cursor: pointer; text-align: left; width: 100%;
    font-family: inherit; color: var(--tx);
    box-shadow: var(--sh-sm);
    transition: border-color 0.15s, background 0.15s,
                box-shadow 0.15s, transform 0.1s;
    position: relative; overflow: hidden;
  }
  .opt-btn::before {
    content: '';
    position: absolute; inset: 0;
    background: linear-gradient(135deg, rgba(124,58,237,0.04), transparent);
    opacity: 0; transition: opacity 0.2s;
  }
  .opt-btn:hover {
    border-color: var(--border-md);
    background: var(--surface2);
    box-shadow: 0 3px 14px var(--accent-glow);
  }
  .opt-btn:hover::before { opacity: 1; }
  .opt-btn:active { transform: scale(0.985); }
  .opt-btn:disabled { cursor: default; transform: none; }

  .opt-key {
    width: 34px; height: 34px; flex-shrink: 0;
    border-radius: var(--r-sm);
    background: var(--accent-lt);
    display: flex; align-items: center; justify-content: center;
    font-size: 0.75em; font-weight: 700;
    font-family: 'JetBrains Mono', monospace;
    color: var(--accent); transition: all 0.15s;
    letter-spacing: 0;
  }
  .opt-text {
    flex: 1; font-size: 0.95em; line-height: 1.45;
    font-weight: 500; color: var(--tx);
  }
  .opt-icon {
    font-size: 1em; opacity: 0;
    transition: opacity 0.2s, transform 0.2s;
    transform: scale(0.6);
    flex-shrink: 0;
  }

  /* Answer states */
  .opt-btn.correct {
    border-color: var(--ok); background: var(--ok-lt);
    box-shadow: 0 0 0 3px rgba(5,150,105,0.12);
  }
  .opt-btn.correct .opt-key { background: var(--ok); color: white; }
  .opt-btn.correct .opt-icon { opacity: 1; transform: scale(1); }
  .opt-btn.wrong {
    border-color: var(--no); background: var(--no-lt);
    box-shadow: 0 0 0 3px rgba(220,38,38,0.12);
  }
  .opt-btn.wrong .opt-key { background: var(--no); color: white; }
  .opt-btn.wrong .opt-icon { opacity: 1; transform: scale(1); }
  .opt-btn.dimmed { opacity: 0.38; }

  /* T/F grid */
  .tf-grid {
    display: grid; grid-template-columns: 1fr 1fr;
    gap: 10px; padding: 0 24px;
  }
  @media (min-width: 640px) { .tf-grid { padding: 0 32px; } }
  @media (min-width: 1024px) { .tf-grid { padding: 0 44px; gap: 14px; } }

  /* Fill input */
  .fill-wrap { padding: 0 24px; }
  @media (min-width: 640px) { .fill-wrap { padding: 0 32px; } }
  @media (min-width: 1024px) { .fill-wrap { padding: 0 44px; } }

  .fill-input {
    width: 100%; background: var(--surface);
    border: 1.5px solid var(--border);
    border-radius: var(--r-lg); padding: 14px 18px;
    font-family: inherit; font-size: 1em; color: var(--tx);
    outline: none; transition: border-color 0.2s, box-shadow 0.2s;
    box-shadow: var(--sh-sm);
  }
  .fill-input:focus {
    border-color: var(--accent-mid);
    box-shadow: 0 0 0 3px rgba(124,58,237,0.12);
  }
  .fill-input.correct { border-color: var(--ok); background: var(--ok-lt); color: var(--ok-dk); }
  .fill-input.wrong   { border-color: var(--no); background: var(--no-lt); color: var(--no-dk); }
  .fill-hint { font-size: 0.75em; color: var(--tx-xs); margin-top: 6px; padding-left: 2px; }

  .fill-submit {
    margin-top: 10px; width: 100%;
    background: linear-gradient(135deg, var(--accent), var(--accent-mid));
    border: none; border-radius: var(--r-lg); padding: 14px;
    font-family: inherit; font-size: 0.95em; font-weight: 700;
    color: white; cursor: pointer;
    box-shadow: var(--sh-accent);
    transition: opacity 0.15s, transform 0.1s;
  }
  .fill-submit:hover   { opacity: 0.9; }
  .fill-submit:active  { transform: scale(0.98); }
  .fill-submit:disabled { opacity: 0.45; cursor: default; }

  /* ── EXPLANATION BOX ── */
  .expl-box {
    margin: 16px 24px 0;
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 4px solid var(--accent-mid);
    border-radius: var(--r-lg); padding: 16px 18px;
    font-size: 0.88em; line-height: 1.75; color: var(--tx-md);
    display: none; box-shadow: var(--sh-sm);
  }
  @media (min-width: 640px) { .expl-box { margin: 16px 32px 0; } }
  @media (min-width: 1024px) { .expl-box { margin: 20px 44px 0; font-size: 0.9em; } }
  .expl-box.show { display: block; animation: fadeIn 0.3s ease; }
  .expl-box.correct-box { border-left-color: var(--ok); }
  .expl-box.wrong-box   { border-left-color: var(--no); }

  .expl-label {
    font-size: 0.7em; font-weight: 700; letter-spacing: 0.08em;
    text-transform: uppercase; font-family: 'JetBrains Mono', monospace;
    margin-bottom: 6px;
  }
  .expl-label.correct { color: var(--ok); }
  .expl-label.wrong   { color: var(--no); }

  /* ── NEXT BUTTON ── */
  .next-btn {
    display: none; margin: 16px 24px 0;
    width: calc(100% - 48px);
    background: linear-gradient(135deg, var(--accent) 0%, var(--accent-mid) 100%);
    border: none; border-radius: var(--r-lg); padding: 16px;
    font-family: inherit; font-size: 1em; font-weight: 700;
    color: white; cursor: pointer;
    box-shadow: var(--sh-accent);
    transition: opacity 0.15s, transform 0.1s;
    letter-spacing: -0.01em;
  }
  .next-btn:hover   { opacity: 0.92; }
  .next-btn:active  { transform: scale(0.985); }
  .next-btn.show    { display: block; animation: fadeUp 0.3s ease; }
  @media (min-width: 640px) {
    .next-btn { margin: 16px 32px 0; width: calc(100% - 64px); }
  }
  @media (min-width: 1024px) {
    .next-btn { margin: 20px 44px 0; width: calc(100% - 88px); padding: 17px; }
  }

  /* ── RESULTS SCREEN ── */
  .results {
    display: none; flex-direction: column; align-items: center;
    padding: 48px 24px 40px;
  }
  .results.show { display: flex; animation: fadeUp 0.5s ease; }
  @media (min-width: 640px) { .results { padding: 48px 48px 40px; } }
  @media (min-width: 1024px) { .results { padding: 60px 80px 60px; } }

  .res-trophy { font-size: 5em; margin-bottom: 12px; animation: bounce 0.7s ease; }
  .res-score {
    font-size: 4em; font-weight: 800;
    font-family: 'JetBrains Mono', monospace;
    background: linear-gradient(135deg, var(--accent), #2563eb);
    -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    line-height: 1; margin-bottom: 6px;
  }
  .res-msg { font-size: 0.95em; color: var(--tx-sm); margin-bottom: 28px; font-weight: 500; }

  .res-badge-wrap {
    background: #fffbeb; border: 1.5px solid #fde68a;
    border-radius: var(--r-lg); padding: 14px 18px;
    width: 100%; display: flex; align-items: center;
    gap: 14px; margin-bottom: 14px; box-shadow: var(--sh-sm);
  }
  .res-stats {
    width: 100%; background: var(--surface);
    border: 1px solid var(--border); border-radius: var(--r-lg);
    padding: 4px 18px; margin-bottom: 24px; box-shadow: var(--sh-sm);
  }
  .res-stat-row {
    display: flex; justify-content: space-between; align-items: center;
    padding: 12px 0; border-bottom: 1px solid #f3f4f6;
    font-size: 0.88em; color: var(--tx-md);
  }
  .res-stat-row:last-child { border-bottom: none; }
  .res-correct { color: var(--ok); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .res-wrong   { color: var(--no); font-weight: 700; font-family: 'JetBrains Mono', monospace; }
  .res-mono    { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

  .res-actions { display: flex; flex-direction: column; gap: 10px; width: 100%; }
  .res-primary {
    background: linear-gradient(135deg, var(--accent), var(--accent-mid));
    border: none; border-radius: var(--r-lg); padding: 16px;
    font-family: inherit; font-size: 1em; font-weight: 700;
    color: white; cursor: pointer; text-align: center;
    text-decoration: none; display: block;
    box-shadow: var(--sh-accent);
    transition: opacity 0.15s;
  }
  .res-primary:hover { opacity: 0.9; }
  .res-secondary {
    background: var(--surface); border: 1.5px solid var(--border);
    border-radius: var(--r-lg); padding: 14px;
    font-family: inherit; font-size: 0.92em; font-weight: 600;
    color: var(--tx-sm); cursor: pointer; text-align: center;
    text-decoration: none; display: block; box-shadow: var(--sh-xs);
    transition: border-color 0.15s, background 0.15s;
  }
  .res-secondary:hover { border-color: var(--border-md); background: var(--surface2); }

  /* ── ANIMATIONS ── */
  @keyframes fadeUp  { from { opacity:0; transform:translateY(16px) } to { opacity:1; transform:translateY(0) } }
  @keyframes fadeIn  { from { opacity:0 } to { opacity:1 } }
  @keyframes bounce  { 0%,100%{transform:scale(1)} 40%{transform:scale(1.2)} 70%{transform:scale(0.95)} }
  @keyframes shake   { 0%,100%{transform:translateX(0)} 20%,60%{transform:translateX(-6px)} 40%,80%{transform:translateX(6px)} }
  .shake { animation: shake 0.35s ease; }

  /* Card entrance stagger */
  .opt-btn { animation: fadeUp 0.25s ease both; }
  .opt-btn:nth-child(1){animation-delay:.04s}
  .opt-btn:nth-child(2){animation-delay:.08s}
  .opt-btn:nth-child(3){animation-delay:.12s}
  .opt-btn:nth-child(4){animation-delay:.16s}

  /* ── MOBILE RESPONSIVE TWEAKS ── */
  @media (max-width: 400px) {
    body { font-size: 15px; }
    .q-wrap { padding: 20px 16px 12px; }
    .opt-list { padding: 0 16px; }
    .tf-grid  { padding: 0 16px; }
    .fill-wrap{ padding: 0 16px; }
    .expl-box { margin: 12px 16px 0; }
    .next-btn { margin: 12px 16px 0; width: calc(100% - 32px); }
  }

</style>
</head>
<body>
<div class="quiz-shell">

  <!-- ═══ SIDEBAR (desktop) / HEADER (mobile) ═══ -->
  <aside class="quiz-sidebar">

    <!-- Mobile header row -->
    <div class="mobile-header">
      <a class="mobile-back" href="../modules/module1.html">← Module 1</a>
      <div class="mobile-counter">
        <div class="mobile-count-num" id="mob-count">Q 1 of 20</div>
        <div class="mobile-count-sub">Lesson 1.7 — Conjunctions: Joining Words and Ideas</div>
      </div>
      <button class="mute-btn" id="mb" onclick="tM()">🔊</button>
    </div>

    <!-- Mobile progress bar -->
    <div class="top-prog"><div class="top-prog-fill" id="mob-bar" style="width:0%"></div></div>

    <!-- Desktop sidebar content -->
    <div class="sb-top">
      <a class="sb-back" href="../modules/module1.html">← Module 1</a>

        <span class="sb-prog-count" id="sb-count">0 / 20</span>

    <div class="sb-bottom">
      <div class="sb-score-wrap">
        <div class="sb-score-num" id="sb-score">0%</div>

</div>

<script>
var Q=[{"type": "mcq", "q": "Which of the following is a coordinating conjunction?", "options": ["Although", "Because", "But", "Moreover"], "answer": 2, "explanation": "Coordinating conjunctions (FANBOYS: For, And, Nor, But, Or, Yet, So) join two equal grammatical elements. 'But' is a coordinating conjunction. 'Although' and 'because' are subordinating conjunctions; 'moreover' is a conjunctive adverb."}, {"type": "mcq", "q": "Which sentence uses a subordinating conjunction correctly?", "options": ["She was tired and she continued working.", "Although she was tired, she continued working.", "She was tired but she continued working.", "She was tired so continued working."], "answer": 1, "explanation": "'Although' is a subordinating conjunction that introduces a subordinate clause of concession. It joins the dependent clause to the main clause. When the subordinate clause comes first, it is followed by a comma."}, {"type": "mcq", "q": "Which of the following is a correlative conjunction pair?", "options": ["And…but", "Either…or", "Because…so", "Not…only"], "answer": 1, "explanation": "Correlative conjunctions work in pairs: either…or, neither…nor, not only…but also, both…and, whether…or. 'And…but' are separate coordinating conjunctions. 'Not…only' is incomplete."}, {"type": "mcq", "q": "Identify the conjunction type in: 'She studied hard so that she could pass the exam.'", "options": ["Coordinating conjunction", "Correlative conjunction", "Subordinating conjunction of purpose", "Conjunctive adverb"], "answer": 2, "explanation": "'So that' is a subordinating conjunction of purpose — it introduces a subordinate clause explaining why the main clause action was performed. Other subordinating conjunctions of purpose: in order that, in case."}, {"type": "mcq", "q": "Which sentence uses 'neither…nor' correctly?", "options": ["Neither the manager nor the employees was informed.", "Neither the manager nor the employees were informed.", "Neither the manager or the employees were informed.", "Neither the manager nor the employees are informed yesterday."], "answer": 1, "explanation": "With 'neither…nor', the verb agrees with the nearest subject. 'Employees' (plural) is closest, so 'were' is correct. 'Neither…or' is wrong — the pair is always 'neither…nor'."}, {"type": "tf", "q": "A coordinating conjunction can join two independent clauses when placed between them with a comma.", "answer": true, "explanation": "True. A comma + coordinating conjunction (FANBOYS) correctly joins two independent clauses: 'She was tired, but she continued working.' Without the conjunction, the comma alone creates a comma splice error."}, {"type": "mcq", "q": "Which sentence uses 'not only…but also' correctly?", "options": ["Not only she sings but also plays.", "She not only sings but also plays the piano.", "She sings not only but also plays the piano.", "Not only she sings but also the piano."], "answer": 1, "explanation": "'Not only…but also' must link grammatically parallel elements. 'She not only [sings] but also [plays the piano]' correctly links two verb phrases. Note: when 'not only' starts the sentence, the subject and auxiliary invert: 'Not only does she sing, but she also plays.'"}, {"type": "mcq", "q": "What error appears in: 'I like both swimming and to run.'?", "options": ["'Both' should be 'either'", "The sentence lacks parallel structure — 'swimming' and 'to run' should be the same form", "'And' should be 'or'", "'Like' should be 'likes'"], "answer": 1, "explanation": "'Both…and' requires parallel structure. 'Swimming' (gerund) and 'to run' (infinitive) are not parallel. Correct: 'both swimming and running' OR 'both to swim and to run'. Parallelism is essential with all correlative conjunctions."}, {"type": "mcq", "q": "Which conjunction best completes: '___ the weather was poor, the event went ahead.'?", "options": ["Because", "So", "Although", "Despite"], "answer": 2, "explanation": "'Although' is a subordinating conjunction showing concession (contrast between poor weather and the event proceeding). 'Despite' is a preposition (needs a noun/gerund: 'despite the poor weather'). 'Because' shows reason; 'so' shows result."}, {"type": "fill", "q": "The conjunctions for, and, nor, but, or, yet, so are collectively remembered using the acronym ________.", "answer": "FANBOYS", "hint": "Each letter stands for a conjunction...", "explanation": "FANBOYS is the mnemonic for the seven coordinating conjunctions: For, And, Nor, But, Or, Yet, So. These join two grammatically equal elements — words, phrases, or independent clauses."}, {"type": "mcq", "q": "Which sentence uses a conjunction of concession correctly?", "options": ["She didn't get the job even though she was the most qualified candidate.", "She didn't get the job because she was the most qualified candidate.", "She got the job so she was the most qualified candidate.", "She didn't get the job since she was the most qualified candidate."], "answer": 0, "explanation": "'Even though' is a strong conjunction of concession — it highlights a surprising contrast between the subordinate and main clause. Being highly qualified yet not getting the job is the unexpected/contradictory result."}, {"type": "tf", "q": "The word 'however' is a conjunction and should be used the same way as 'but'.", "answer": false, "explanation": "False. 'However' is a conjunctive ADVERB, not a conjunction. 'But' joins clauses directly with a comma: 'She was tired, but she continued.' 'However' requires a semicolon before it: 'She was tired; however, she continued.' Using only a comma before 'however' creates a comma splice."}, {"type": "mcq", "q": "Which sentence demonstrates subject-verb agreement with correlative conjunctions?", "options": ["Neither the students nor the teacher are ready.", "Either the manager or the directors is responsible.", "Neither the teacher nor the students are ready.", "Both the teacher and the students is ready."], "answer": 2, "explanation": "With 'neither…nor' and 'either…or', the verb agrees with the NEAREST subject. In 'Neither the teacher nor the students ARE ready', 'students' (plural) is nearest, so 'are' is correct. 'Both' always takes a plural verb."}, {"type": "mcq", "q": "Which sentence uses a conjunction to show cause and effect?", "options": ["She studied hard; however, she failed.", "She studied hard, so she passed the exam.", "She studied hard, but she was nervous.", "Although she studied hard, she was nervous."], "answer": 1, "explanation": "'So' here is a coordinating conjunction showing result/consequence (cause: studied hard → effect: passed). Other conjunctions showing cause/effect: because, since, as, therefore, consequently, hence."}, {"type": "mcq", "q": "Which sentence uses 'while' as a conjunction of contrast (not time)?", "options": ["While she was sleeping, the phone rang.", "While I enjoy jazz, my sister prefers classical music.", "He called while I was having dinner.", "She arrived while we were still discussing the plan."], "answer": 1, "explanation": "'While' can show both time ('while she was sleeping') and contrast ('while I enjoy jazz…'). In option B, 'while' shows contrast between two different preferences — it functions like 'whereas'. Context determines the meaning."}, {"type": "mcq", "q": "Identify the error in: 'The plan failed due to we didn't prepare adequately.'", "options": ["'The plan' should be 'Our plan'", "'Due to' cannot introduce a clause — use 'because' or 'due to the fact that'", "'Adequately' should be 'adequate'", "'Didn't' should be 'did not'"], "answer": 1, "explanation": "'Due to' is a preposition, not a conjunction, and must be followed by a noun phrase: 'due to poor preparation'. To introduce a clause, use 'because' or 'because of the fact that'. This is a very common error."}, {"type": "fill", "q": "The conjunctions 'both…and', 'either…or', 'neither…nor', and 'not only…but also' are called ________ conjunctions.", "answer": "correlative", "hint": "They work in pairs — correl-...", "explanation": "CORRELATIVE conjunctions work in pairs to join grammatically equal elements. Each part of the pair must be followed by the same grammatical structure (parallelism). Other correlative conjunctions: whether…or, as…as, no sooner…than, hardly…when."}, {"type": "mcq", "q": "Which sentence correctly uses a conjunction to express condition?", "options": ["Unless you practise daily, you will improve.", "Unless you don't practise daily, you won't improve.", "If you won't practise, you will improve.", "Provided that you don't practise, you will improve."], "answer": 0, "explanation": "'Unless' means 'if not' — it already contains the negative, so adding 'don't' creates a double negative. 'Unless you practise' = 'if you do not practise'. The result should be negative: 'you won't improve'."}, {"type": "mcq", "q": "Which sentence uses multiple conjunctions with correct punctuation and parallelism?", "options": ["She is not only intelligent, but hardworking, and also she has a good personality.", "Not only is she intelligent, but she is also hardworking and personable.", "She is intelligent and hardworking, but also, she is personable, too.", "Although she is intelligent and hardworking but she is also personable."], "answer": 1, "explanation": "Option B correctly uses: 'Not only…but also' with inverted word order, two parallel adjectives ('intelligent', 'hardworking'), and a third ('personable') joined with 'and'. The structure is parallel throughout. Option D incorrectly uses 'although…but' (double conjunction of contrast)."}, {"type": "mcq", "q": "Which sentence demonstrates the most sophisticated use of conjunctions?", "options": ["He tried hard, and he failed, but he tried again, and he succeeded.", "Having tried and failed, he persisted nonetheless; not only did he overcome the initial setback, but he ultimately succeeded where others had given up.", "He tried hard but failed. Then he tried again. He succeeded.", "Although he tried, he failed, but although he tried again, he succeeded."], "answer": 1, "explanation": "Option B uses: 'nonetheless' (concessive conjunctive adverb), 'not only…but' with correct inversion and ellipsis, 'where' (relative conjunction of circumstance). It varies sentence structure, avoids conjunction repetition, and demonstrates high-level cohesive sophistication."}];
var SKEY="m1_l7",NEXT="q1-8.html",HUB="../modules/module1.html";
var cur=0,cor=0,answered=false,st=Date.now(),ac=null;
var dotStates=[]; // 'active','done-ok','done-no'

// ── AUDIO ──
function gAC(){if(!ac)ac=new(window.AudioContext||window.webkitAudioContext)();return ac;}
function gD(){try{return JSON.parse(localStorage.getItem('grammar_app')||'{}');}catch(e){return{};}}
function sD(d){try{localStorage.setItem('grammar_app',JSON.stringify(d));}catch(e){}}

function tM(){
  var d=gD();d.muted=!d.muted;sD(d);
  var ic=d.muted?'🔇':'🔊';
  document.getElementById('mb').textContent=ic;
  document.getElementById('mb2').textContent=ic;
}
function pT(t){
  var d=gD();if(d.muted)return;
  try{var c=gAC();if(c.state==='suspended')c.resume();
    if(t==='c')pC(c);else if(t==='w')pW(c);else pF(c);}catch(e){}
}
function pC(c){[[523,0],[659,.1],[784,.2]].forEach(function(a){
  var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.18,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+.3);o.start(t);o.stop(t+.3);});}
function pW(c){[[240,0],[200,.1]].forEach(function(a){
  var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.frequency.value=a[0];o.type='sawtooth';var t=c.currentTime+a[1];
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.08,t+.02);
  g.gain.exponentialRampToValueAtTime(.001,t+.25);o.start(t);o.stop(t+.25);});}
function pF(c){[[523,0],[659,.15],[784,.3],[1047,.45]].forEach(function(a){
  var o=c.createOscillator(),g=c.createGain();o.connect(g);g.connect(c.destination);
  o.frequency.value=a[0];o.type='sine';var t=c.currentTime+a[1];
  g.gain.setValueAtTime(0,t);g.gain.linearRampToValueAtTime(.2,t+.03);
  g.gain.exponentialRampToValueAtTime(.001,t+.5);o.start(t);o.stop(t+.5);});}

// ── PROGRESS UI ──
function updProgress(){
  var pct=Math.round(cur/Q.length*100);
  document.getElementById('mob-bar').style.width=pct+'%';
  document.getElementById('sb-bar').style.width=pct+'%';
  document.getElementById('mob-count').textContent='Q '+(cur+1)+' of '+Q.length;
  document.getElementById('sb-count').textContent=cur+' / '+Q.length;
  var scorePct=cur>0?Math.round(cor/cur*100):0;
  document.getElementById('sb-score').textContent=cur>0?scorePct+'%':'—';
  updDots();
}
function updDots(){
  var grid=document.getElementById('sb-dots-grid');
  if(!grid)return;
  var html='';
  for(var i=0;i<Q.length;i++){
    var cls='sb-dot '+(i===cur?'active':(dotStates[i]||''));
    html+='<div class="'+cls+'">'+(i+1)+'</div>';
  }
  grid.innerHTML=html;
}

// ── RENDER QUESTION ──
function rQ(){
  updProgress();
  var q=Q[cur];answered=false;
  var labels={mcq:'Multiple Choice',tf:'True or False',fill:'Fill in the Blank',transform:'Sentence Transformation'};
  var lbl=labels[q.type]||'Question';
  var opts='';

  if(q.type==='mcq'){
    opts='<div class="opt-list">'+q.options.map(function(o,i){
      return '<button class="opt-btn" onclick="selOpt('+i+')" data-i="'+i+'">'+
        '<div class="opt-key">'+String.fromCharCode(65+i)+'</div>'+
        '<div class="opt-text">'+o+'</div>'+
        '<div class="opt-icon">'+(i===q.answer?'✓':'✗')+'</div>'+
      '</button>';
    }).join('')+'</div>';
  } else if(q.type==='tf'){
    opts='<div class="tf-grid">'+
      '<button class="opt-btn" onclick="selTF(true)" data-v="true">'+
        '<div class="opt-key">T</div><div class="opt-text">True</div>'+
        '<div class="opt-icon">'+(q.answer?'✓':'✗')+'</div></button>'+
      '<button class="opt-btn" onclick="selTF(false)" data-v="false">'+
        '<div class="opt-key">F</div><div class="opt-text">False</div>'+
        '<div class="opt-icon">'+(!q.answer?'✓':'✗')+'</div></button>'+
    '</div>';
  } else {
    var ph=q.type==='transform'?'Rewrite the sentence...':'Type your answer...';
    opts='<div class="fill-wrap">'+
      '<input class="fill-input" id="fi" type="text" placeholder="'+ph+'" '+
        'autocomplete="off" autocapitalize="none" spellcheck="false" '+
        'onkeydown="if(event.keyCode===13)subFill()">'+
      (q.hint?'<div class="fill-hint">💡 '+q.hint+'</div>':'')+
      '<button class="fill-submit" id="fsb" onclick="subFill()">Check Answer</button>'+
    '</div>';
  }

  document.getElementById('qa').innerHTML=
    '<div class="q-wrap" style="animation:fadeUp .3s ease">'+
      '<div class="q-type-badge">'+lbl+'</div>'+
      '<div class="q-text">'+q.q+'</div>'+
    '</div>'+
    opts+
    '<div class="expl-box" id="eb"></div>'+
    '<button class="next-btn" id="nb" onclick="nextQ()">'+
      (cur+1<Q.length?'Next Question →':'See Results 🎯')+
    '</button>';

  if(q.type==='fill'||q.type==='transform'){
    setTimeout(function(){var e=document.getElementById('fi');if(e)e.focus();},150);
  }
  var d=gD();var ic=d.muted?'🔇':'🔊';
  document.getElementById('mb').textContent=ic;
  document.getElementById('mb2').textContent=ic;
}

// ── ANSWER HANDLERS ──
function selOpt(i){
  if(answered)return;answered=true;
  var q=Q[cur];var ok=i===q.answer;if(ok)cor++;pT(ok?'c':'w');
  dotStates[cur]=ok?'done-ok':'done-no';
  document.querySelectorAll('.opt-btn').forEach(function(b,j){
    if(j===q.answer)b.classList.add('correct');
    else if(j===i&&!ok){b.classList.add('wrong');b.classList.add('shake');}
    else b.classList.add('dimmed');
    b.disabled=true;
  });
  showExpl(ok,q.explanation);
  document.getElementById('nb').classList.add('show');
  updDots();
}

function selTF(v){
  if(answered)return;answered=true;
  var q=Q[cur];var ok=v===q.answer;if(ok)cor++;pT(ok?'c':'w');
  dotStates[cur]=ok?'done-ok':'done-no';
  document.querySelectorAll('.opt-btn').forEach(function(b){
    var bv=b.dataset.v==='true';
    if(bv===q.answer)b.classList.add('correct');
    else if(bv===v&&!ok)b.classList.add('wrong');
    else b.classList.add('dimmed');
    b.disabled=true;
  });
  showExpl(ok,q.explanation);
  document.getElementById('nb').classList.add('show');
  updDots();
}

function subFill(){
  if(answered)return;
  var inp=document.getElementById('fi');
  if(!inp||!inp.value.trim())return;
  answered=true;
  var q=Q[cur];var v=inp.value.trim().toLowerCase();
  var ans=(q.answer||'').toLowerCase().split('|');
  var ok=ans.some(function(a){return v===a.trim();});
  if(ok)cor++;pT(ok?'c':'w');
  dotStates[cur]=ok?'done-ok':'done-no';
  inp.classList.add(ok?'correct':'wrong');
  inp.disabled=true;document.getElementById('fsb').disabled=true;
  if(!ok){
    var cd=document.createElement('div');
    cd.style.cssText='font-size:.82em;color:var(--ok);margin-top:8px;font-weight:600;';
    cd.textContent='✓ Answer: '+q.answer;
    inp.parentNode.insertBefore(cd,document.getElementById('fsb'));
    inp.classList.add('shake');
  }
  showExpl(ok,q.explanation);
  document.getElementById('nb').classList.add('show');
  updDots();
}

function showExpl(ok,text){
  var b=document.getElementById('eb');
  b.className='expl-box '+(ok?'correct-box':'wrong-box');
  b.innerHTML='<div class="expl-label '+(ok?'correct':'wrong')+'">'+(ok?'✓ Correct!':'✗ Incorrect')+'</div><div>'+text+'</div>';
  b.classList.add('show');
  setTimeout(function(){b.scrollIntoView({behavior:'smooth',block:'nearest'});},120);
}

function nextQ(){
  cur++;
  if(cur>=Q.length)showResults();
  else{
    rQ();
    window.scrollTo({top:0,behavior:'smooth'});
    var m=document.querySelector('.quiz-main');
    if(m)m.scrollTo({top:0,behavior:'smooth'});
  }
}

// ── RESULTS ──
function showResults(){
  pT('complete');
  document.getElementById('qa').style.display='none';
  document.getElementById('mob-count').textContent='Complete!';
  document.getElementById('sb-count').textContent='20 / 20';
  document.getElementById('sb-bar').style.width='100%';
  document.getElementById('mob-bar').style.width='100%';

  var tot=Q.length,pct=Math.round(cor/tot*100),tt=Math.round((Date.now()-st)/1000);
  document.getElementById('sb-score').textContent=pct+'%';
  dotStates=dotStates.map(function(d){return d||'done-ok';});
  updDots();

  var d=gD();if(!d.progress)d.progress={};
  var prev=d.progress[SKEY];
  d.progress[SKEY]=Math.max(pct,prev||0);
  if(!d.badges)d.badges=[];var nb2=[];
  if(prev===undefined&&!d.badges.includes('first_quiz')){d.badges.push('first_quiz');nb2.push('⭐ First Step');}
  if(pct===100&&!d.badges.includes('perfect_score')){d.badges.push('perfect_score');nb2.push('💯 Perfect Score!');}
  if(prev!==undefined&&pct>prev&&!d.badges.includes('comeback')){d.badges.push('comeback');nb2.push('💪 Comeback!');}
  if(tt<120&&!d.badges.includes('speed_demon')){d.badges.push('speed_demon');nb2.push('⚡ Speed Run!');}
  sD(d);

  var trophy=pct>=90?'🏆':pct>=70?'🥇':pct>=50?'🥈':'📚';
  var msg=pct>=90?'Outstanding work!':pct>=70?'Great job!':pct>=50?'Good effort!':'Keep practising!';
  var bH=nb2.map(function(n){
    return '<div class="res-badge-wrap"><span style="font-size:1.8em">'+n.split(' ')[0]+'</span>'+
      '<div><div style="font-size:.82em;font-weight:700;color:#b45309">Badge Unlocked!</div>'+
      '<div style="font-size:.75em;color:#6b7280">'+n.split(' ').slice(1).join(' ')+'</div></div></div>';
  }).join('');

  var sc=document.getElementById('rs');
  sc.innerHTML=
    '<div class="res-trophy">'+trophy+'</div>'+
    '<div class="res-score">'+pct+'%</div>'+
    '<div class="res-msg">'+msg+' — '+cor+'/'+tot+' correct</div>'+
    bH+
    '<div class="res-stats">'+
      '<div class="res-stat-row"><span>Correct</span><span class="res-correct">✓ '+cor+'</span></div>'+
      '<div class="res-stat-row"><span>Incorrect</span><span class="res-wrong">✗ '+(tot-cor)+'</span></div>'+
      '<div class="res-stat-row"><span>Score</span><span class="res-mono">'+pct+'%</span></div>'+
      '<div class="res-stat-row"><span>Time</span><span class="res-mono">'+Math.floor(tt/60)+'m '+tt%60+'s</span></div>'+
    '</div>'+
    '<div class="res-actions">'+
      '<a class="res-primary" href="'+NEXT+'">Next Lesson →</a>'+
      '<button class="res-secondary" onclick="retryQuiz()">↺ Retry this quiz</button>'+
      '<a class="res-secondary" href="'+HUB+'">← Back to Module 1</a>'+
    '</div>';
  sc.classList.add('show');
  window.scrollTo({top:0,behavior:'smooth'});
}

function retryQuiz(){
  cur=0;cor=0;answered=false;st=Date.now();dotStates=[];
  document.getElementById('rs').classList.remove('show');
  document.getElementById('qa').style.display='';
  rQ();window.scrollTo({top:0,behavior:'smooth'});
}

// Init
updDots();
rQ();
</script>
</body>
